<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMARHANE // Mavi Randevu</title>
    <style>
        :root {
            --cyber-blue: #00f0ff;
            --matrix-green: #8CFFB0;
            --matrix-green-strong: #00ff66;
            --paper: #E8D8B8;
            --paper-dim: rgba(232, 216, 184, 0.64);
            --red-memory: #B64A35;
            --terminal-bg: rgba(10, 14, 23, 0.85);
            --nav-glass: rgba(3, 6, 8, 0.58);
        }
        body { margin: 0; background: #05070b; font-family: 'Courier New', monospace; color: #fff; min-height: 100vh; display: flex; align-items: center; overflow: hidden; }
        .cyber-universe-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: url('tape_1.png'); background-size: cover; z-index: 1; animation: streetGlimmer 8s infinite alternate; }
        .neon-pulse-engine { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; background: radial-gradient(circle at 75% 45%, rgba(0, 240, 255, 0.4) 0%, transparent 65%); opacity: 0; }
        .track-playing .neon-pulse-engine { opacity: 1; animation: cyberBeaconSTORM 2.5s steps(1, end) infinite; }
        #matrixCanvas { position: fixed; z-index: 3; opacity: 0.12; pointer-events: none; }

        .site-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 74px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5vw;
            background: linear-gradient(180deg, rgba(0,0,0,0.72), rgba(0,0,0,0.36) 58%, transparent);
            border-bottom: 1px solid rgba(140, 255, 176, 0.12);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            pointer-events: auto;
        }

        .nav-brand {
            display: inline-flex;
            align-items: center;
            gap: 18px;
            color: var(--paper-dim);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.34em;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(232,216,184,0.15);
            white-space: nowrap;
        }

        .nav-brand::before {
            content: "";
            width: 42px;
            height: 1px;
            background: var(--red-memory);
            opacity: 0.8;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: clamp(18px, 2vw, 34px);
        }

        .top-nav-link {
            color: rgba(140, 255, 176, 0.72);
            text-decoration: none;
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            padding: 10px 0;
            border-bottom: 1px solid transparent;
            opacity: 0.82;
            transition: color 220ms ease, opacity 220ms ease, border-color 220ms ease, text-shadow 220ms ease;
            white-space: nowrap;
        }

        .top-nav-link:hover,
        .top-nav-link.active {
            color: var(--paper);
            opacity: 1;
            border-color: rgba(182, 74, 53, 0.85);
            text-shadow: 0 0 10px rgba(140,255,176,0.22);
        }

        .top-nav-link.disabled {
            opacity: 0.34;
            cursor: not-allowed;
            pointer-events: none;
        }



        .menu-toggle {
            display: none;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 42px;
            border: 1px solid rgba(140, 255, 176, 0.36);
            background: rgba(0,0,0,0.42);
            color: var(--paper);
            font-family: inherit;
            cursor: pointer;
            position: relative;
        }

        .menu-toggle span,
        .menu-toggle::before,
        .menu-toggle::after {
            content: "";
            position: absolute;
            display: block;
            width: 20px;
            height: 1px;
            background: currentColor;
            transition: transform 220ms ease, opacity 220ms ease;
        }

        .menu-toggle span { transform: translateY(0); }
        .menu-toggle::before { transform: translateY(-7px); }
        .menu-toggle::after { transform: translateY(7px); }

        body.menu-open .menu-toggle span { opacity: 0; }
        body.menu-open .menu-toggle::before { transform: rotate(45deg); }
        body.menu-open .menu-toggle::after { transform: rotate(-45deg); }

        .main-interface { width: 100%; max-width: 530px; margin-left: 5%; padding: 24px; background: var(--terminal-bg); border: 1px solid rgba(0, 240, 255, 0.2); backdrop-filter: blur(8px); z-index: 10; border-radius: 4px; }
        .sys-title { font-size: 1.35rem; color: var(--cyber-blue); font-weight: bold; letter-spacing: 3px; margin-bottom: 20px; }
        .audio-wrapper { background: rgba(0,0,0,0.6); padding: 12px; margin: 15px 0; border: 1px solid var(--matrix-green); }
        audio { width: 100%; filter: invert(1) hue-rotate(180deg); }
        .lyrics-container { height: 280px; overflow: hidden; position: relative; }
        .scroller-engine { position: absolute; width: 100%; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .lyrics-block { margin-bottom: 24px; opacity: 0.3; transition: 0.3s; font-size: 0.95rem; }
        .lyrics-block.active { opacity: 1; color: var(--cyber-blue); font-weight: bold; text-shadow: 0 0 8px var(--cyber-blue); }

        @media (max-width: 900px) {
            body {
                display: block;
                min-height: 100svh;
                overflow-y: auto;
                padding-top: 112px;
            }

            .cyber-universe-bg {
                background-position: center top;
                filter: brightness(0.82) contrast(1.05);
            }

            .neon-pulse-engine {
                background: radial-gradient(circle at 50% 28%, rgba(0, 240, 255, 0.24) 0%, transparent 62%);
            }

            #matrixCanvas {
                opacity: 0.05;
            }

            .site-nav {
                height: auto;
                min-height: 94px;
                align-items: flex-start;
                flex-direction: column;
                gap: 13px;
                padding: 16px 20px 14px;
            }

            .nav-brand {
                font-size: 0.68rem;
                letter-spacing: 0.20em;
                line-height: 1.5;
            }

            .nav-brand::before {
                width: 28px;
            }

            .nav-links {
                width: 100%;
                overflow-x: auto;
                white-space: nowrap;
                gap: 22px;
                padding-bottom: 4px;
                scrollbar-width: none;
            }

            .nav-links::-webkit-scrollbar {
                display: none;
            }

            .top-nav-link {
                flex: 0 0 auto;
                font-size: 0.64rem;
                letter-spacing: 0.12em;
            }

            .main-interface {
                margin: 0 18px 40px;
                max-width: calc(100vw - 36px);
                padding: 18px;
                background: rgba(10, 14, 23, 0.88);
            }

            .sys-title {
                font-size: 1rem;
                letter-spacing: 0.18em;
                line-height: 1.45;
            }

            .audio-wrapper {
                padding: 10px;
            }

            .lyrics-container {
                height: 360px;
            }

            .lyrics-block {
                font-size: 0.90rem;
                line-height: 1.55;
            }
        }

        @keyframes streetGlimmer { 0% { filter: brightness(0.9); } 100% { filter: brightness(1.1); } }
        @keyframes cyberBeaconSTORM { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    

        @media (max-width: 760px) {
            body {
                overflow-y: auto;
                display: block;
                padding-top: 92px;
                min-height: 100vh;
            }

            .site-nav {
                height: 68px;
                min-height: 68px;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 0 18px;
            }

            .nav-brand {
                max-width: calc(100vw - 92px);
                overflow: hidden;
                text-overflow: ellipsis;
                font-size: 0.68rem;
                letter-spacing: 0.20em;
            }

            .nav-brand::before {
                width: 24px;
                margin-right: 10px;
            }

            .menu-toggle {
                display: inline-flex;
                flex: 0 0 auto;
            }

            .nav-links {
                position: fixed;
                z-index: 19;
                top: 68px;
                left: 0;
                right: 0;
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: stretch;
                gap: 0;
                padding: 8px 22px 22px;
                background: rgba(0,0,0,0.90);
                border-bottom: 1px solid rgba(140,255,176,0.20);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                transform: translateY(-120%);
                opacity: 0;
                pointer-events: none;
                transition: transform 260ms ease, opacity 220ms ease;
            }

            body.menu-open .nav-links {
                transform: translateY(0);
                opacity: 1;
                pointer-events: auto;
            }

            .top-nav-link {
                display: block;
                padding: 18px 0;
                border-bottom: 1px solid rgba(140,255,176,0.16);
                font-size: 0.88rem;
                letter-spacing: 0.20em;
            }

            .main-interface {
                margin: 0 18px 44px;
                max-width: calc(100vw - 36px);
                padding: 18px;
            }

            .lyrics-container {
                height: 380px;
            }

            #matrixCanvas {
                opacity: 0.05;
            }
        }



        /* MOBILE PLAYER FIX — keep the audio interface visible on phones/tablets */
        @media (max-width: 980px) {
            html, body {
                width: 100%;
                min-height: 100svh;
                overflow-x: hidden;
            }

            body {
                display: block !important;
                align-items: initial !important;
                overflow-y: auto !important;
                padding-top: 0 !important;
                padding-bottom: max(32px, env(safe-area-inset-bottom));
                background: #05070b;
            }

            .cyber-universe-bg {
                background-position: center top;
                filter: brightness(0.58) contrast(1.08) saturate(0.96);
            }

            .cyber-universe-bg::after {
                content: "";
                position: fixed;
                inset: 0;
                background: linear-gradient(180deg, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.42) 36%, rgba(0,0,0,0.82) 100%);
                pointer-events: none;
            }

            #matrixCanvas {
                opacity: 0.035;
            }

            .site-nav {
                height: 68px !important;
                min-height: 68px !important;
                flex-direction: row !important;
                align-items: center !important;
                justify-content: space-between !important;
                padding: 0 18px !important;
                background: linear-gradient(180deg, rgba(0,0,0,0.88), rgba(0,0,0,0.52));
            }

            .nav-brand {
                max-width: calc(100vw - 92px);
                overflow: hidden;
                text-overflow: ellipsis;
                font-size: 0.68rem !important;
                letter-spacing: 0.20em !important;
                line-height: 1.4;
            }

            .nav-brand::before {
                width: 24px !important;
                margin-right: 10px !important;
            }

            .menu-toggle {
                display: inline-flex !important;
                flex: 0 0 auto;
            }

            .nav-links {
                position: fixed !important;
                z-index: 19;
                top: 68px;
                left: 0;
                right: 0;
                width: 100%;
                display: flex !important;
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 0 !important;
                padding: 8px 22px 22px !important;
                overflow: visible !important;
                white-space: normal !important;
                background: rgba(0,0,0,0.92);
                border-bottom: 1px solid rgba(140,255,176,0.20);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                transform: translateY(-120%);
                opacity: 0;
                pointer-events: none;
                transition: transform 260ms ease, opacity 220ms ease;
            }

            body.menu-open .nav-links {
                transform: translateY(0);
                opacity: 1;
                pointer-events: auto;
            }

            .top-nav-link {
                display: block;
                padding: 18px 0;
                border-bottom: 1px solid rgba(140,255,176,0.16);
                font-size: 0.88rem !important;
                letter-spacing: 0.20em !important;
            }

            .main-interface {
                position: relative;
                z-index: 12;
                width: auto !important;
                max-width: none !important;
                margin: 92px 16px max(44px, env(safe-area-inset-bottom)) !important;
                padding: 18px !important;
                background: rgba(5, 8, 12, 0.86) !important;
                border: 1px solid rgba(140, 255, 176, 0.28);
                box-shadow: 0 22px 80px rgba(0,0,0,0.54);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
            }

            .sys-title {
                font-size: 1rem !important;
                letter-spacing: 0.18em !important;
                line-height: 1.45;
                margin-bottom: 14px;
            }

            .audio-wrapper {
                margin: 12px 0 16px;
                padding: 10px;
            }

            audio {
                display: block;
                width: 100%;
                min-height: 42px;
            }

            .lyrics-container {
                height: min(46svh, 360px) !important;
                min-height: 240px;
            }

            .lyrics-block {
                font-size: 0.92rem;
                line-height: 1.55;
                margin-bottom: 22px;
            }
        }

    </style>
</head>
<body id="cyberBody">
    <div class="cyber-universe-bg"></div>
    <div class="neon-pulse-engine"></div>
    <canvas id="matrixCanvas"></canvas>

    <nav class="site-nav" aria-label="Ana navigasyon">
        <a class="nav-brand" href="home.html">SİSTEM DIŞI FREKANS</a>
        <button class="menu-toggle" type="button" aria-label="Menüyü aç" aria-expanded="false" aria-controls="songMenu"><span></span></button>
        <div class="nav-links" id="songMenu">
            <a class="top-nav-link" href="home.html">Core</a>
            <a class="top-nav-link active" href="frekans.html">Frekans_101</a>
            <a class="top-nav-link" href="#">Sentetik Anılar</a>
            <a class="top-nav-link" href="#">Veri Mahzeni</a>
            <a class="top-nav-link disabled" href="#" aria-disabled="true">Senkron: Kopuk</a>
        </div>
    </nav>

    <div class="main-interface">
        <header><div class="sys-title">TIMARHANE_OS v7.0</div></header>
        <div class="audio-wrapper"><audio id="cyberPlayer" controls src="Onno v3.mp3"></audio></div>
        <div class="lyrics-container"><div class="scroller-engine" id="scrollerEngine"></div></div>
    </div>

    <script>

        (function () {
            const toggle = document.querySelector('.menu-toggle');
            const drawer = document.getElementById('songMenu');
            if (!toggle || !drawer) return;
            toggle.addEventListener('click', () => {
                const open = document.body.classList.toggle('menu-open');
                toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
                toggle.setAttribute('aria-label', open ? 'Menüyü kapat' : 'Menüyü aç');
            });
            drawer.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    document.body.classList.remove('menu-open');
                    toggle.setAttribute('aria-expanded', 'false');
                    toggle.setAttribute('aria-label', 'Menüyü aç');
                });
            });
        })();

const lyrics = [
    { t: 32, text: "Sabah erkenden kalktık yine," },
    { t: 36, text: "Cebimiz dar ama gülümsemek bedava." },
    { t: 40, text: "Trafik çıldırmış, ekmek pahalanmış," },
    { t: 45, text: "Bu açık hava tımarhanesinde..." },
    { t: 47, text: "Sistem mi çökmüş? Veriler mi çalınmış?" },
    { t: 55, text: "Aşk bu be güzelim, siber dinler mi hiç?" },
    { t: 62, text: "Din! Din! Din!" },
    { t: 70, text: "Dinlemez dinler!" },
    { t: 73, text: "Şehirleri dar etseler de," },
    { t: 77, text: "Uydudan, Mobese'ye hepimizi izleseler de..." },
    { t: 81, text: "Yine daldık o muzip bilmeceye..." },
    { t: 85, text: "İster iste, isteme — Yapaya doğru evriliyoruz!" },
    { t: 92, text: "Dur! bir saniye... Etrafına bir bak... Gerçek mi bu?" },
    { t: 102, text: "Birileri nefes alma dediği için nefes almayacak değiliz —" },
    { t: 110, text: "Nefes alıyoruz! Hâlâ sevebiliyoruz!" },
    { t: 119, text: "İnsanız biz ve boyun eğmiyoruz!" },
    { t: 140, text: "Uyuyan güzeller, uyandırılamayacak kadar reziller." },
    { t: 149, text: "Rüyalarında bile dünyayı fethetme peşindeler." },
    { t: 157, text: "Cehalet mutluluktur — Kafası basmayana, biat kültüründe, kurban olana." },
    { t: 168, text: "Dur! bir saniye... Etrafına bir bak... Gerçek mi bu?" },
    { t: 188, text: "Ne zaman baktık ki yüzüne, bu toprağın... bu yağmurun..." },
    { t: 196, text: "Cırılçıplak duruyordu hep, biz giydirdik üstüne." },
    { t: 204, text: "Birileri nefes alma dediği için nefes almayacak değiliz —" },
    { t: 212, text: "Nefes alıyoruz! Hâlâ sevebiliyoruz! İnsanız biz ve boyun eğmiyoruz!" },
    { t: 227, text: "Hadi gel... Kodları kıralım..." },
    { t: 230, text: "Saksafon gibi çın-lı-yo-ruz... Bu si-mü-las-yon-da..." },
    { t: 236, text: "Aaaah-yaaa... Çınlarız biz!" },
    { t: 248, text: "Gülümse şimdi... Tam da böyle..." },
    { t: 288, text: "Sabah erkenden kalktık yine," },
    { t: 290, text: "Cebimiz dar ama gülümsemek bedava." },
    { t: 294, text: "Trafik çıldırmış, ekmek pahalanmış," },
    { t: 300, text: "Bu açık hava tımarhanesinde..." },
    { t: 306, text: "Sistem mi çökmüş? Veriler mi çalınmış?" },
    { t: 311, text: "Aşk bu be güzelim, siber dinler mi hiç?" },
    { t: 318, text: "Din! Din! Din!" },
    { t: 320, text: "Dinlemez dinler!" },
    { t: 323, text: "Şehirleri dar etseler de," },
    { t: 326, text: "Uydudan, Mobese'ye hepimizi izleseler de..." },
    { t: 330, text: "Yine daldık o muzip bilmeceye..." },
    { t: 332, text: "İster iste, isteme — Yapaya doğru evriliyoruz!" },
    { t: 338, text: "Dur! bir saniye... Etrafına bir bak... Gerçek mi bu?" },
    { t: 348, text: "Dinlemez dinler!" },

    { t: 356, text: "Uydudan, Mobese'ye hepimizi izleseler de..." },
    { t: 360, text: "Yine daldık o muzip bilmeceye..." },
    { t: 368, text: "İster iste, isteme — Yapaya doğru evriliyoruz!" },
    { t: 371, text: "Dur! bir saniye... Etrafına bir bak... Gerçek mi bu?" },
    { t: 384, text: "Dinler ah dinler!" },
    { t: 386, text: "Şehirleri dar etseler de," },
    { t: 389, text: "Uydudan, Mobese'ye hepimizi izleseler de..." },
    { t: 392, text: "Dur! bir saniye... Etrafına bir bak... Gerçek mi bu?" },
    { t: 394, text: "Yine daldık o muzip bilmeceye..." },
    { t: 398, text: "İster iste, isteme — Yapaya doğru evriliyoruz!" },
    { t: 479, text: "Sistem kapanıyor..." }
];

        const p = document.getElementById('cyberPlayer'), sc = document.getElementById('scrollerEngine'), b = document.getElementById('cyberBody');
        lyrics.forEach((l, i) => {
            const d = document.createElement('div');
            d.className = 'lyrics-block';
            d.innerHTML = l.text; d.dataset.time = l.t; sc.appendChild(d);
        });
        p.onplay = () => b.classList.add('track-playing');
        p.onpause = () => b.classList.remove('track-playing');
        p.ontimeupdate = () => {
            lyrics.forEach((item, i) => {
                const el = sc.children[i];
                if (p.currentTime >= item.t) {
                    Array.from(sc.children).forEach(d => d.classList.remove('active'));
                    el.classList.add('active');
                    sc.style.transform = `translateY(-${el.offsetTop}px)`;
                }
            });
        };
        const canvas = document.getElementById('matrixCanvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        const alphabet = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎ1023456789".split("");
        const drops = Array(Math.floor(canvas.width / 14)).fill(1);
        setInterval(() => {
            ctx.fillStyle = 'rgba(5, 7, 11, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff66';
            drops.forEach((d, i) => {
                ctx.fillText(alphabet[Math.floor(Math.random() * alphabet.length)], i * 14, d * 14);
                if (d * 14 > canvas.height) drops[i] = 0; drops[i]++;
            });
        }, 30);
    </script>
