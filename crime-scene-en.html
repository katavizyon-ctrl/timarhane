  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
        /* TIMARHANE standard vars */
        --void: #050505;
        --phosphor: #8CFFB0;
        --phosphor-soft: rgba(140, 255, 176, 0.78);
        --phosphor-dim: rgba(140, 255, 176, 0.26);
        --paper: #E8D8B8;

    --deep:       #06080a;
    --ink:        #0a0c10;
    --gold:       #d4a017;
    --gold-dim:   #6b5008;
    --gold-soft:  rgba(212,160,23,0.72);

    --text-muted: #6a6050;
    --blood:      #c0152a;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--deep);
    color: var(--text-main);
    display: flex;
    align-items: center;
    min-height: 100vh;
    padding-top: 72px;

    overflow-x: hidden;
    min-height: 100vh;
    padding-top: 72px;
  }

  /* ── BACKGROUND IMAGE ── */
  .bg-image {
    position: fixed;
    top: 52px; left: 0; right: 0; bottom: 0;
    z-index: 0;
    background-size: contain;
            background-position: top center;
            background: url('crime_scene_bg.webp') center center / cover no-repeat;
    filter: brightness(0.60) contrast(1.12) saturate(0.75) hue-rotate(10deg);
    
    transform-origin: center center;
    will-change: transform;
  }

  .bg-overlay {
    position: fixed;
            top: 52px; left: 0; right: 0; bottom: 0;
            z-index: 1;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.18) 40%, rgba(0,0,0,0.55) 100%),
      radial-gradient(ellipse at 50% 0%, rgba(212,160,23,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(192,21,42,0.05) 0%, transparent 55%);
  }

  .bg-color-shift {
    position: fixed;
            top: 52px; left: 0; right: 0; bottom: 0;
            z-index: 1;
    pointer-events: none;
    mix-blend-mode: color;
    animation: colorShift 20s ease-in-out infinite;
    opacity: 0.18;
  }

  @keyframes kenBurns {
    0%   { transform: scale(1.00) translate(0%, 0%); }
    25%  { transform: scale(1.04) translate(-0.8%, 0.4%); }
    50%  { transform: scale(1.07) translate(0.4%, -0.8%); }
    75%  { transform: scale(1.03) translate(0.8%, 0.4%); }
    100% { transform: scale(1.00) translate(0%, 0%); }
  }

  @keyframes bgGlitch {
    0%,87%  { filter: brightness(0.60) contrast(1.12) saturate(0.75) hue-rotate(10deg); }
    88%     { filter: brightness(0.85) contrast(1.5) saturate(0.4) hue-rotate(25deg); transform: scale(1.04) translate(-3px,1px); }
    89%     { filter: brightness(0.55) contrast(1.7) saturate(1.3) hue-rotate(-12deg); transform: scale(1.04) translate(3px,-2px); }
    90%     { filter: brightness(0.60) contrast(1.12) saturate(0.75) hue-rotate(10deg); transform: scale(1.04) translate(0,0); }
    95%     { filter: brightness(0.78) contrast(1.3) saturate(0.5) hue-rotate(18deg); transform: scale(1.04) translate(2px,-1px); }
    96%     { filter: brightness(0.60) contrast(1.12) saturate(0.75) hue-rotate(10deg); }
    100%    { filter: brightness(0.60) contrast(1.12) saturate(0.75) hue-rotate(10deg); }
  }

  @keyframes bgBreathe {
    0%,100% { filter: brightness(0.60) contrast(1.12) saturate(0.75); }
    50%     { filter: brightness(0.68) contrast(1.16) saturate(0.84); }
  }

  @keyframes colorShift {
    0%   { background: rgba(212,160,23,1); }
    20%  { background: rgba(192,21,42,1); }
    45%  { background: rgba(212,160,23,1); }
    65%  { background: rgba(140,255,176,1); }
    80%  { background: rgba(192,21,42,1); }
    100% { background: rgba(212,160,23,1); }
  }

  /* ── CANVAS ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0.48;
    mix-blend-mode: screen;
  }

  /* ── SCANLINES ── */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.055) 3px,
      rgba(0,0,0,0.055) 4px
    );
  }

  /* ── NAV ── */
  .site-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 72px;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(18px, 5vw, 72px);
    background: rgba(6,8,10,0.88);
    border-bottom: 1px solid rgba(212,160,23,0.14);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .nav-brand {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    color: rgba(232,224,212,0.60);
    text-decoration: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.8rem, 1vw, 1rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .nav-brand::before {
    content: "";
    flex-shrink: 0;
    width: 36px;
    height: 1px;
    background: var(--gold);
    opacity: 0.72;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: clamp(14px, 2vw, 32px);
  }

  .top-nav-link {
    color: rgba(140,255,176,0.72);
    text-decoration: none;
    font-size: clamp(0.62rem, 0.8vw, 0.75rem);
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.72;
    padding: 8px 0;
    border-bottom: 1px solid transparent;
    transition: color 220ms ease, opacity 220ms ease, border-color 220ms ease;
    white-space: nowrap;
  }

  .top-nav-link:hover,
  .top-nav-link.active {
    color: #E8D8B8;
    opacity: 1;
    border-color: var(--gold);
  }

  .top-nav-link.disabled {
    opacity: 0.28;
    cursor: not-allowed;
    pointer-events: none;
  }

  .lang-switch {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 0.70rem;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .lang-switch a {
    color: rgba(212,160,23,0.55);
    text-decoration: none;
    transition: color 220ms ease;
  }

  .lang-switch a:hover,
  .lang-switch a.lang-active { color: #E8D8B8; }

  .menu-toggle {
    display: none;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 40px;
    border: 1px solid rgba(212,160,23,0.34);
    background: rgba(0,0,0,0.42);
    color: #E8D8B8;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }

  .menu-toggle span,
  .menu-toggle::before,
  .menu-toggle::after {
    content: "";
    position: absolute;
    display: block;
    width: 18px;
    height: 1px;
    background: currentColor;
    transition: transform 220ms ease, opacity 220ms ease;
  }

  .menu-toggle span { transform: translateY(0); }
  .menu-toggle::before { transform: translateY(-6px); }
  .menu-toggle::after  { transform: translateY(6px); }

  body.menu-open .menu-toggle span  { opacity: 0; }
  body.menu-open .menu-toggle::before { transform: rotate(45deg); }
  body.menu-open .menu-toggle::after  { transform: rotate(-45deg); }

  @media (min-width: 761px) { .menu-toggle { display: none; } }

  @media (max-width: 760px) {
    .site-nav { height: 66px; padding: 0 18px; }
    .nav-brand { max-width: calc(100vw - 88px); overflow: hidden; text-overflow: ellipsis; }
    .nav-brand::before { width: 22px; }
    .menu-toggle { display: inline-flex; }
    .nav-links {
      position: fixed;
      z-index: 99;
      top: 66px; left: 0; right: 0;
      flex-direction: column;
      padding: 8px 22px 22px;
      background: rgba(6,8,10,0.97);
      border-bottom: 1px solid rgba(212,160,23,0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transform: translateY(-115%);
      opacity: 0;
      pointer-events: none;
      transition: transform 260ms ease, opacity 220ms ease;
    }
    body.menu-open .nav-links {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .top-nav-link {
      display: block;
      padding: 16px 0;
      border-bottom: 1px solid rgba(212,160,23,0.14);
      font-size: 0.86rem;
      opacity: 1;
    }
    .lang-switch { padding: 16px 0 4px; font-size: 0.80rem; }
  }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    position: relative;
    z-index: 10;
    padding: 0.8rem 2rem 0;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }
  .breadcrumb a { color: var(--text-muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--gold); }

  /* ── HERO ── */

  .hero-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--fuchsia);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.3s forwards;
  }

    94%  { clip-path: none; transform: translateX(0); opacity: 0; }
  }

  /* ── STYLE TAG ── */
  .style-tag {
    margin-top: 1.2rem;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: rgba(212,160,23,0.48);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
  }

  /* ── PLAYER SECTION ── */
  .player-section {
    position: relative;
    z-index: 10;
    max-width: 680px;
    margin: 2.5rem auto 0;
    padding: 0 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s forwards;
  }

  .player-label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--blood-dim);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    text-align: center;
  }

  .player-box {
    border: 1px solid var(--blood-dim);
    background: rgba(6,8,10,0.88);
    backdrop-filter: blur(8px);
    padding: 1.2rem 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .player-box::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(212,160,23,0.05) 0%, transparent 55%);
    pointer-events: none;
  }

  .player-box::after {
    content: '';
    position: absolute;
    top: -1px; right: -1px;
    width: 20px; height: 20px;
    border-top: 2px solid var(--blood);
    border-right: 2px solid var(--blood);
    pointer-events: none;
  }

  .player-title-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1rem;
  }

  .player-artist {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.72rem;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .player-time-in-title {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    font-family: 'Courier New', Courier, monospace;
  }

  .player-scrubber {
    position: relative;
    height: 3px;
    background: rgba(212,160,23,0.15);
    margin: 12px 0 14px;
    cursor: pointer;
  }
  .player-scrubber-fill {
    height: 100%; width: 0%;
    background: var(--gold);
    pointer-events: none;
    transition: width 0.25s linear;
  }
  .player-scrubber-thumb {
    position: absolute;
    top: 50%; left: 0%;
    width: 10px; height: 10px;
    background: var(--text-main);
    border: 1px solid var(--gold);
    transform: translate(-50%,-50%);
    pointer-events: none;
    transition: left 0.25s linear;
  }
  .player-controls { display: flex; align-items: center; gap: 12px; }
  .player-controls .player-vol { margin-left: auto; }
  .player-btn {
    background: none;
    border: 1px solid var(--blood-dim);
    color: var(--gold);
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    padding: 6px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .player-btn:hover { background: rgba(212,160,23,0.12); border-color: var(--gold); color: #fff; }
  .player-btn.is-playing { background: rgba(212,160,23,0.08); border-color: var(--gold); color: var(--gold); }

  .player-vol { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
  .vol-label { font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.14em; text-transform: uppercase; }
  .vol-track { position: relative; width: 58px; height: 3px; background: rgba(212,160,23,0.15); cursor: pointer; }
  .vol-fill { height: 100%; width: 80%; background: rgba(212,160,23,0.55); pointer-events: none; }
  .vol-thumb {
    position: absolute; top: 50%; left: 80%;
    width: 8px; height: 8px;
    background: var(--text-muted);
    border: 1px solid rgba(212,160,23,0.55);
    transform: translate(-50%,-50%);
    pointer-events: none;
  }

  /* ── SYNCED LYRICS ── */
  .lyrics-section {
    position: relative;
    z-index: 10;
    max-width: 680px;
    margin: 2rem auto 5rem;
    padding: 0 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
  }
  .lyrics-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
  .lyrics-label { font-size: 0.65rem; letter-spacing: 0.25em; color: var(--blood); text-transform: uppercase; flex-shrink: 0; }
  .lyrics-divider { flex: 1; height: 1px; background: linear-gradient(to right, var(--blood-dim), transparent); }
  .lyrics-container { height: 280px; overflow: hidden; position: relative; }
  .lyrics-container::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(transparent, rgba(6,8,10,0.95));
    pointer-events: none;
    z-index: 1;
  }
  .scroller-engine {
    position: absolute;
    width: 100%;
    transition: transform 0.42s cubic-bezier(0.16,1,0.3,1);
  }
  .lyric-block {
    margin-bottom: 14px;
    opacity: 0.28;
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    line-height: 1.65;
    color: #e8e0d4;
    transition: opacity 0.3s, color 0.3s, text-shadow 0.3s;
  }
  .lyric-block.active {
    opacity: 1;
    color: #ffffff;
    font-weight: 600;
    text-shadow: 0 0 14px rgba(212,160,23,0.40);
  }
  .lyric-block.spoken {
    font-style: italic;
    letter-spacing: 0.02em;
  }
  .lyric-block.spoken.active {
    color: #ffffff;
    text-shadow: 0 0 16px rgba(255,255,255,0.45);
  }
  .lyric-block.chorus.active {
    color: #ffffff;
    text-shadow: 0 0 16px rgba(255,255,255,0.50);
  }
  .lyric-tag-inline {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.58rem;
    color: var(--fuchsia);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
    opacity: 0.7;
  }

        /* ── Glitch Song Title ── */
        .song-title {
            font-size: clamp(1.5rem, 5vw, 4rem);
            font-weight: 800;
            letter-spacing: 0.06em;
            line-height: 0.88;
            color: var(--paper);
            position: relative;
            margin: 4px 0 22px;
            opacity: 0;
            animation: titleFadeUp 0.8s 0.4s forwards;
            text-shadow: 0 0 40px rgba(232,216,184,0.12);
            text-transform: uppercase;
        }
        .song-title span { color: var(--red-memory); }
        .song-title::before {
            content: attr(data-text);
            position: absolute; top: 0; left: 3px;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
            font-family: inherit; font-size: inherit;
            letter-spacing: inherit; line-height: inherit;
            color: var(--red-memory);
            animation: titleGlitchA 7s 2s infinite;
        }
        .song-title::after {
            content: attr(data-text);
            position: absolute; top: 0; left: -3px;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
            font-family: inherit; font-size: inherit;
            letter-spacing: inherit; line-height: inherit;
            color: var(--phosphor);
            animation: titleGlitchB 7s 2.5s infinite;
        }
        @keyframes titleFadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes titleGlitchA {
            0%,84%,100% { clip-path: none; transform: translateX(0); opacity: 0; }
            85%  { clip-path: inset(15% 0 70% 0); transform: translateX(-4px); opacity: 0.75; }
            87%  { clip-path: inset(55% 0 10% 0); transform: translateX(4px);  opacity: 0.75; }
            89%  { clip-path: inset(30% 0 45% 0); transform: translateX(-3px); opacity: 0.65; }
            91%  { clip-path: inset(70% 0 5%  0); transform: translateX(3px);  opacity: 0.75; }
            93%  { clip-path: none; transform: translateX(0); opacity: 0; }
        }

/* ══════════════════════════════════════════════
   CANVAS — THREE LAYERED SYSTEMS
   1. Gold drain particles (falling coins / $45T)
   2. Boomerang arcs (returning trajectories)
   3. Redacted text rain (classified docs)
══════════════════════════════════════════════ */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initAll(); });

/* ── 1. GOLD DRAIN PARTICLES ── */
class GoldCoin {
  constructor() { this.reset(true); }
  reset(initial) {
    this.x = Math.random() * (W || 800);
    this.y = initial ? Math.random() * (H || 600) : -12;
    this.r = 1.2 + Math.random() * 2.8;
    this.vy = 0.6 + Math.random() * 1.4;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.rot = Math.random() * Math.PI * 2;
    this.rotV = (Math.random() - 0.5) * 0.06;
    this.alpha = 0.3 + Math.random() * 0.55;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.02 + Math.random() * 0.02;
    const t = Math.random();
    if (t < 0.5)      this.color = '#d4a017';
    else if (t < 0.8) this.color = '#f0c040';
    else              this.color = '#c0152a';
  }
  update() {
    this.y += this.vy;
    this.x += this.vx + Math.sin(this.wobble) * 0.3;
    this.wobble += this.wobbleSpeed;
    this.rot += this.rotV;
    if (this.y > H + 14) this.reset(false);
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.beginPath();
    ctx.ellipse(0, 0, this.r, this.r * 0.45, 0, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,220,80,0.5)';
    ctx.lineWidth = 0.4;
    ctx.stroke();
    ctx.restore();
  }
}

/* ── 2. BOOMERANG ARCS ── */
class Boomerang {
  constructor() { this.reset(); }
  reset() {
    const side = Math.random() < 0.5;
    this.x = side ? -20 : W + 20;
    this.y = 80 + Math.random() * (H - 160);
    this.dir = side ? 1 : -1;
    this.speed = 1.2 + Math.random() * 1.6;
    this.amplitude = 60 + Math.random() * 120;
    this.freq = 0.008 + Math.random() * 0.006;
    this.phase = Math.random() * Math.PI * 2;
    this.len = 18 + Math.random() * 28;
    this.alpha = 0.18 + Math.random() * 0.32;
    this.t = 0;
    this.maxT = (W * 1.4) / this.speed;
    const r = Math.random();
    if (r < 0.45)      this.color = 'rgba(212,160,23,';
    else if (r < 0.75) this.color = 'rgba(192,21,42,';
    else               this.color = 'rgba(140,255,176,';
    this.history = [];
  }
  update() {
    this.t += 1;
    const x = this.x + this.dir * this.t * this.speed;
    const y = this.y + Math.sin(this.phase + this.t * this.freq) * this.amplitude;
    this.history.push({ x, y });
    if (this.history.length > this.len) this.history.shift();
    if (this.t > this.maxT) this.reset();
  }
  draw() {
    if (this.history.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(this.history[0].x, this.history[0].y);
    for (let i = 1; i < this.history.length; i++) {
      ctx.lineTo(this.history[i].x, this.history[i].y);
    }
    ctx.strokeStyle = this.color + this.alpha + ')';
    ctx.lineWidth = 0.8 + Math.random() * 0.4;
    ctx.lineCap = 'round';
    ctx.stroke();
    // tip glow
    const tip = this.history[this.history.length - 1];
    ctx.beginPath();
    ctx.arc(tip.x, tip.y, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = this.color + (this.alpha * 2.2) + ')';
    ctx.fill();
  }
}

/* ── 3. REDACTED TEXT RAIN ── */
const REDACT_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$%#@!?';
const REDACT_WORDS = ['COLONIAL','EXTRACT','TRILLION','LUMUMBA','OTTOMAN','RECEIPT','RECEIPT','BORDERS','RIGGED','CHAINS','DRAIN','TRAP','LOAN','DEBT','MAP'];

class TextColumn {
  constructor() { this.reset(true); }
  reset(initial) {
    this.x = 20 + Math.floor(Math.random() * Math.floor((W || 800) / 14)) * 14;
    this.y = initial ? Math.random() * (H || 600) : -60;
    this.speed = 0.5 + Math.random() * 0.9;
    this.chars = [];
    this.len = 4 + Math.floor(Math.random() * 8);
    this.redacted = Math.random() < 0.55;
    this.word = REDACT_WORDS[Math.floor(Math.random() * REDACT_WORDS.length)];
    this.wordPos = Math.floor(Math.random() * this.len);
    this.alpha = 0.08 + Math.random() * 0.16;
    for (let i = 0; i < this.len; i++) {
      this.chars.push(REDACT_CHARS[Math.floor(Math.random() * REDACT_CHARS.length)]);
    }
    this.glitchTimer = 0;
  }
  update() {
    this.y += this.speed;
    this.glitchTimer++;
    if (this.glitchTimer % 18 === 0) {
      const idx = Math.floor(Math.random() * this.chars.length);
      this.chars[idx] = REDACT_CHARS[Math.floor(Math.random() * REDACT_CHARS.length)];
    }
    if (this.y > H + this.len * 14) this.reset(false);
  }
  draw() {
    ctx.font = '10px "Share Tech Mono", monospace';
    for (let i = 0; i < this.chars.length; i++) {
      const cy = this.y + i * 13;
      if (cy < -10 || cy > H + 10) continue;
      if (this.redacted && i === this.wordPos) {
        // draw black redaction bar
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(this.x - 2, cy - 9, Math.min(this.word.length * 7, 58), 11);
        ctx.globalAlpha = this.alpha * 0.3;
        ctx.fillStyle = '#d4a017';
        ctx.fillText(this.word.substring(0, Math.floor(this.word.length * 0.6)), this.x, cy);
        ctx.globalAlpha = 1;
      } else {
        ctx.globalAlpha = this.alpha * (i === this.chars.length - 1 ? 1.8 : 1);
        ctx.fillStyle = i % 3 === 0 ? '#d4a017' : i % 3 === 1 ? '#c0152a' : 'rgba(140,255,176,0.7)';
        ctx.fillText(this.chars[i], this.x, cy);
        ctx.globalAlpha = 1;
      }
    }
  }
}

let coins = [], boomerangs = [], textCols = [];

function initAll() {
  coins      = Array.from({ length: 90 }, () => new GoldCoin());
  boomerangs = Array.from({ length: 14 }, () => new Boomerang());

}
initAll();

let rafT = 0;
function frame(ts) {
  ctx.clearRect(0, 0, W, H);

  // deep vignette
  const vg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.72);
  vg.addColorStop(0, 'rgba(10,8,4,0)');
  vg.addColorStop(1, 'rgba(6,8,10,0.8)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  textCols.forEach(c => { c.update(); c.draw(); });
  boomerangs.forEach(b => { b.update(); b.draw(); });
  coins.forEach(c => { c.update(); c.draw(); });

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ── PLAYER LOGIC ── */
const audio    = document.getElementById('cyberPlayer');
const playBtn  = document.getElementById('playBtn');
const timeEl   = document.getElementById('playerTime');
const scrubber = document.getElementById('scrubber');
const sFill    = document.getElementById('scrubberFill');
const sThumb   = document.getElementById('scrubberThumb');
const volTrack = document.getElementById('volTrack');
const vFill    = document.getElementById('volFill');
const vThumb   = document.getElementById('volThumb');

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return m + ':' + sec;
}

function updateProgress() {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  sFill.style.width = pct + '%';
  sThumb.style.left = pct + '%';
  scrubber.setAttribute('aria-valuenow', Math.round(pct));
  timeEl.textContent = fmt(audio.currentTime) + ' / 2:49';
}

function setVolume(pct) {
  pct = Math.max(0, Math.min(1, pct));
  audio.volume = pct;
  vFill.style.width = (pct * 100) + '%';
  vThumb.style.left = (pct * 100) + '%';
}

window.addEventListener('keydown', function(e) {
  const el = document.activeElement;
  if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) return;
  if (e.code === 'Space') { e.preventDefault(); audio.paused ? audio.play() : audio.pause(); }
}, true);

playBtn.addEventListener('click', () => { audio.paused ? audio.play() : audio.pause(); });
audio.addEventListener('play',  () => { playBtn.textContent = '⏸ PAUSE'; playBtn.classList.add('is-playing'); });
audio.addEventListener('pause', () => { playBtn.textContent = '▶ PLAY'; playBtn.classList.remove('is-playing'); });
audio.addEventListener('ended', () => { playBtn.textContent = '▶ PLAY'; playBtn.classList.remove('is-playing'); });
audio.addEventListener('timeupdate', updateProgress);
audio.addEventListener('loadedmetadata', updateProgress);

/* scrubber */
let scrubDown = false;
function seekTo(e) {
  const rect = scrubber.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  if (audio.duration) audio.currentTime = pct * audio.duration;
}
scrubber.addEventListener('mousedown', e => { scrubDown = true; seekTo(e); });
document.addEventListener('mousemove', e => { if (scrubDown) seekTo(e); });
document.addEventListener('mouseup', () => { scrubDown = false; });
scrubber.addEventListener('touchstart', e => { scrubDown = true; seekTo(e.touches[0]); }, { passive: true });
document.addEventListener('touchmove', e => { if (scrubDown) seekTo(e.touches[0]); }, { passive: true });
document.addEventListener('touchend', () => { scrubDown = false; });

/* volume */
let volDown = false;
function seekVol(e) {
  const rect = volTrack.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  setVolume(pct);
}
volTrack.addEventListener('mousedown', e => { volDown = true; seekVol(e); });
document.addEventListener('mousemove', e => { if (volDown) seekVol(e); });
document.addEventListener('mouseup', () => { volDown = false; });
volTrack.addEventListener('touchstart', e => { volDown = true; seekVol(e.touches[0]); }, { passive: true });

document.addEventListener('touchend', () => { volDown = false; });

trailCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;';
document.body.appendChild(trailCanvas);
const tCtx = trailCanvas.getContext('2d');
trailCanvas.width = window.innerWidth;
trailCanvas.height = window.innerHeight;
window.addEventListener('resize', () => { trailCanvas.width = window.innerWidth; trailCanvas.height = window.innerHeight; });

const trailParticles = [];
document.addEventListener('mousemove', e => {
  for (let i = 0; i < 3; i++) {
    const r = Math.random();
    trailParticles.push({
      x: e.clientX + (Math.random() - 0.5) * 6,
      y: e.clientY + (Math.random() - 0.5) * 6,
      r: 1.5 + Math.random() * 2.5,
      alpha: 0.7 + Math.random() * 0.3,
      vx: (Math.random() - 0.5) * 0.8,
      vy: -0.5 - Math.random() * 1.2,
      decay: 0.022 + Math.random() * 0.015,
      color: r < 0.5 ? '#d4a017' : r < 0.8 ? '#c0152a' : '#8cffb0'
    });
  }
});

function animateTrail() {
  tCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
  for (let i = trailParticles.length - 1; i >= 0; i--) {
    const p = trailParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.alpha -= p.decay; p.r *= 0.97;
    if (p.alpha <= 0) { trailParticles.splice(i, 1); continue; }
    tCtx.beginPath();
    tCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    tCtx.fillStyle = p.color;
    tCtx.globalAlpha = p.alpha;
    tCtx.fill();
  }
  tCtx.globalAlpha = 1;
  requestAnimationFrame(animateTrail);
}
animateTrail();

(function () {
  const toggle = document.querySelector('.menu-toggle');
  const drawer = document.getElementById('songMenu');
  if (!toggle || !drawer) return;
  toggle.addEventListener('click', () => {
    const open = document.body.classList.toggle('menu-open');
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    toggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
  });
  drawer.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      document.body.classList.remove('menu-open');
      toggle.setAttribute('aria-expanded', 'false');
      toggle.setAttribute('aria-label', 'Open menu');
    });
  });
})();

    <script>
    /* ── Ken Burns + Breathe + Parallax / Gyroscope on .bg-image ── */
    (function() {
        const bgImg = document.querySelector('.bg-image');
        if (!bgImg) return;

        const IS_MOB   = window.innerWidth <= 760;
        const KB_PERIOD = IS_MOB ? 13000 : 15000;
        const KB_MAX_X  = IS_MOB ? 7 : 9;
        const KB_MAX_Y  = IS_MOB ? 5  : 7;
        const KB_SCALE  = 1.02;
        const BR_PERIOD = 5000;
        const BR_EXTRA  = 0.03;

        if (!IS_MOB) {
            /* Desktop: KB + Breathe + mouse parallax */
            let mx = window.innerWidth / 2, my = window.innerHeight / 2;
            let px = 0, py = 0;
            document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

            (function animLoop() {
                const W = window.innerWidth, H = window.innerHeight;
                const tx = ((mx / W) - 0.5) * 16;
                const ty = ((my / H) - 0.5) * 16;
                px += (tx - px) * 0.04;
                py += (ty - py) * 0.04;
                const now    = performance.now();
                const kbX    = Math.sin((now / KB_PERIOD) * Math.PI * 2)         * KB_MAX_X;
                const kbY    = Math.sin((now / KB_PERIOD) * Math.PI * 2 * 0.618) * KB_MAX_Y;
                const breath = Math.sin((now / BR_PERIOD) * Math.PI * 2) * 0.5 + 0.5;
                const scale  = (KB_SCALE + breath * BR_EXTRA).toFixed(4);
                bgImg.style.transform = `scale(${scale}) translate(${(kbX - px * 0.5).toFixed(2)}px,${(kbY - py * 0.5).toFixed(2)}px)`;
                requestAnimationFrame(animLoop);
            })();
        } else {
            /* Mobile: KB + Breathe + Gyroscope */
            let gyroX = 0, gyroY = 0, rawGyroX = 0, rawGyroY = 0;

            function onOrientation(e) {
                if (e.gamma === null || e.beta === null) return;
                rawGyroX = (Math.max(-45, Math.min(45, e.gamma)) / 45) * 22;
                rawGyroY = (Math.max(-45, Math.min(45, e.beta - 90)) / 45) * 22;
            }
            function startGyro() {
                if (typeof DeviceOrientationEvent !== 'undefined' &&
                    typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(s => { if (s === 'granted') window.addEventListener('deviceorientation', onOrientation, { passive: true }); })
                        .catch(() => {});
                } else {
                    window.addEventListener('deviceorientation', onOrientation, { passive: true });
                }
            }
            let gyroStarted = false;
            function tryStartGyro() { if (!gyroStarted) { gyroStarted = true; startGyro(); } }
            document.addEventListener('touchstart', tryStartGyro, { once: true, passive: true });
            document.addEventListener('touchend',   tryStartGyro, { once: true, passive: true });
            window.addEventListener('scroll',       tryStartGyro, { once: true, passive: true });

            (function bgAnimate(ts) {
                const kbX    = Math.sin((ts / KB_PERIOD) * Math.PI * 2)         * KB_MAX_X;
                const kbY    = Math.sin((ts / KB_PERIOD) * Math.PI * 2 * 0.618) * KB_MAX_Y;
                const breath = Math.sin((ts / BR_PERIOD) * Math.PI * 2) * 0.5 + 0.5;
                const scale  = (KB_SCALE + breath * BR_EXTRA).toFixed(4);
                gyroX += (rawGyroX - gyroX) * 0.08;
                gyroY += (rawGyroY - gyroY) * 0.08;
                bgImg.style.transform = `scale(${scale}) translate(${(kbX + gyroX).toFixed(2)}px,${(kbY + gyroY).toFixed(2)}px)`;
                requestAnimationFrame(bgAnimate);
            })(0);
        }
    })();
    </script>
