<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMARHANE // CORE</title>
    <style>
        :root {
            --void: #050505;
            --phosphor: #8CFFB0;
            --phosphor-soft: rgba(140,255,176,0.72);
            --phosphor-dim: rgba(140,255,176,0.32);
            --paper: #E8D8B8;
            --paper-dim: rgba(232,216,184,0.68);
            --glass: rgba(3,6,5,0.46);
            --red-memory: #B64A35;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: var(--void);
            font-family: "Courier New", Courier, monospace;
            overflow: hidden;
        }

        body { color: var(--phosphor-soft); }

        /* ── Layer stack ── */

        /* z1: photo */
        #bg-photo {
            position: fixed; inset: 0; z-index: 1;
            background: url('home.png') center/cover no-repeat;
            filter: brightness(0.78) contrast(1.04) saturate(0.92);
            pointer-events: none;
            will-change: transform;
            transform: scale(1.08);
        }

        #bg-photo::after {
            content: '';
            position: absolute; inset: 0;
            background:
                linear-gradient(90deg, rgba(0,0,0,0.84) 0%, rgba(0,0,0,0.46) 26%, rgba(0,0,0,0.04) 50%, rgba(0,0,0,0.36) 72%, rgba(0,0,0,0.84) 100%),
                radial-gradient(circle at 52% 48%, rgba(182,74,53,0.08) 0%, transparent 38%);
        }

        /* z2: grain canvas */
        #grain {
            position: fixed; inset: 0; z-index: 2;
            pointer-events: none; opacity: 0.45;
        }

        /* z3: scanlines */
        .scanlines {
            position: fixed; inset: 0; z-index: 3;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px, transparent 3px,
                rgba(0,0,0,0.14) 3px, rgba(0,0,0,0.14) 4px
            );
            animation: scanScroll 7s linear infinite;
        }
        @keyframes scanScroll { from{background-position:0 0} to{background-position:0 80px} }

        /* z4: vignette */
        .vignette {
            position: fixed; inset: -5%; z-index: 4;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 46%, rgba(0,0,0,0.62) 74%, rgba(0,0,0,0.92) 100%);
        }

        /* z5: mouse glow */
        #glow {
            position: fixed; z-index: 5;
            width: 420px; height: 420px; border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(140,255,176,0.07) 0%, transparent 65%);
            transform: translate(-50%,-50%);
            left: -999px; top: -999px;
            mix-blend-mode: screen;
            transition: left 0.05s, top 0.05s;
        }

        /* z6: fx canvas (trail) */
        #fx {
            position: fixed; inset: 0; z-index: 6;
            pointer-events: none; mix-blend-mode: screen;
        }

        /* z7: proximity glow canvas for nav */
        #proxCanvas {
            position: fixed; inset: 0; z-index: 7;
            pointer-events: none; mix-blend-mode: screen;
        }

        /* z10+: UI */
        #home-stage {
            position: relative; z-index: 10;
            width: 100vw; height: 100vh;
            min-height: 620px;
            overflow: hidden;
        }

        /* signal marker */
        .signal-marker {
            position: absolute; z-index: 11;
            top: clamp(28px,5vh,56px);
            left: clamp(28px,5vw,72px);
            color: var(--paper-dim);
            font-size: clamp(0.68rem,1vw,0.82rem);
            letter-spacing: 0.28em; text-transform: uppercase;
            opacity: 0;
        }

        .signal-marker::before {
            content: '';
            display: inline-block;
            width: 34px; height: 1px;
            margin-right: 14px; vertical-align: middle;
            background: var(--red-memory); opacity: 0.68;
        }

        /* language switch */
        .language-switch {
            position: absolute; z-index: 11;
            top: clamp(28px,5vh,56px);
            right: clamp(28px,5vw,72px);
            display: flex; gap: 10px; align-items: center;
            font-size: clamp(0.68rem,1vw,0.82rem);
            font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase;
        }
        .language-switch a { color: rgba(232,216,184,0.48); text-decoration: none; transition: color 200ms; }
        .language-switch a:hover, .language-switch a.lang-active { color: var(--phosphor); }
        .language-switch span { color: rgba(232,216,184,0.28); }

        /* manifesto */
        .manifesto-panel {
            position: absolute; z-index: 11;
            left: clamp(28px,5vw,72px);
            top: 54%; transform: translateY(-50%);
            width: min(420px,31vw);
            padding: 24px 26px 22px;
            color: var(--phosphor-soft);
            background: linear-gradient(135deg, rgba(0,0,0,0.58), rgba(0,0,0,0.24));
            border-left: 1px solid var(--phosphor-dim);
            backdrop-filter: blur(2.5px);
            text-shadow: 0 0 8px rgba(140,255,176,0.18);
            opacity: 0;
            transform: translateY(-50%) translateX(-12px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        .manifesto-panel.visible {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        .manifesto-panel::before {
            content: "MANIFESTO / VOID RECORD";
            display: block; margin-bottom: 18px;
            color: var(--paper-dim);
            font-size: clamp(0.78rem,0.82vw,0.92rem);
            font-weight: 700; letter-spacing: 0.32em; text-transform: uppercase;
            opacity: 0.80;
        }

        .manifesto-panel p {
            margin: 0 0 1.15rem;
            font-size: clamp(1rem,1.05vw,1.22rem);
            font-weight: 600; line-height: 1.85; letter-spacing: 0.02em;
            min-height: 1.85em;
        }

        .manifesto-panel p:last-child { margin-bottom: 0; color: var(--paper); opacity: 0.86; }

        /* nav box */
        .nav-box {
            position: absolute; z-index: 11;
            top: clamp(150px,28vh,250px);
            right: clamp(28px,5vw,74px);
            width: min(370px,27vw);
            display: flex; flex-direction: column; gap: 18px;
            text-align: right;
        }

        .nav-link {
            position: relative; display: block;
            padding: 18px 28px;
            color: var(--phosphor-soft);
            border: 1px solid var(--phosphor-dim);
            background: linear-gradient(90deg, rgba(0,0,0,0.10), var(--glass));
            backdrop-filter: blur(3px);
            cursor: pointer; text-decoration: none;
            font-size: clamp(0.82rem,0.9vw,1rem);
            font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase;
            opacity: 0;
            transform: translateX(24px);
            transition: opacity 0.5s ease, transform 0.5s ease,
                        color 260ms ease, border-color 260ms ease,
                        background 260ms ease, box-shadow 260ms ease;
        }

        .nav-link.visible {
            opacity: 0.78;
            transform: translateX(0);
        }

        .nav-link::before {
            content: attr(data-index);
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%);
            color: var(--paper-dim); font-size: 0.70rem;
            font-weight: 700; letter-spacing: 0.12em; opacity: 0.42;
        }

        /* red bar right edge */
        .nav-link::after {
            content: '';
            position: absolute; right: 0; top: 0;
            width: 3px; height: 100%;
            background: var(--red-memory); opacity: 0;
            transition: opacity 260ms ease;
        }

        .nav-link:hover, .nav-link:focus-visible {
            color: var(--paper);
            border-color: rgba(232,216,184,0.64);
            background: linear-gradient(90deg, rgba(0,0,0,0.16), rgba(5,8,6,0.64));
            opacity: 1;
            transform: translateX(-6px);
            outline: none;
            box-shadow: -4px 0 18px rgba(140,255,176,0.10);
        }

        .nav-link:hover::after, .nav-link:focus-visible::after { opacity: 0.82; }

        .nav-link.is-offline {
            color: rgba(140,255,176,0.36);
            border-color: rgba(140,255,176,0.16);
            pointer-events: none;
        }

        .archive-caption {
            color: rgba(232,216,184,0.38);
            font-size: 0.68rem; font-weight: 600;
            letter-spacing: 0.18em; text-transform: uppercase;
            opacity: 0; transition: opacity 0.6s ease;
        }

        .archive-caption.visible { opacity: 1; }

        /* page veil */
        #pageVeil {
            position: fixed; inset: 0; z-index: 100;
            background: var(--void); opacity: 1;
            pointer-events: none;
            transition: opacity 0.65s ease;
        }
        #pageVeil.revealed { opacity: 0; }

        /* ── Mobile ── */
        .mobile-topbar { display: none; }

        .mobile-menu-toggle {
            display: inline-flex; align-items: center; justify-content: center;
            width: 46px; height: 42px;
            border: 1px solid rgba(140,255,176,0.36);
            background: rgba(0,0,0,0.42); color: var(--paper);
            font-family: inherit; cursor: pointer;
            position: relative;
        }

        .mobile-menu-toggle span,
        .mobile-menu-toggle::before,
        .mobile-menu-toggle::after {
            content: ''; position: absolute; display: block;
            width: 20px; height: 1px; background: currentColor;
            transition: transform 220ms ease, opacity 220ms ease;
        }

        .mobile-menu-toggle span { transform: translateY(0); }
        .mobile-menu-toggle::before { transform: translateY(-7px); }
        .mobile-menu-toggle::after  { transform: translateY(7px); }

        body.menu-open .mobile-menu-toggle span { opacity: 0; }
        body.menu-open .mobile-menu-toggle::before { transform: rotate(45deg); }
        body.menu-open .mobile-menu-toggle::after  { transform: rotate(-45deg); }

        .mobile-drawer {
            display: none;
        }

        .mobile-drawer a {
            color: var(--phosphor-soft); text-decoration: none;
            font-size: 0.92rem; font-weight: 800;
            letter-spacing: 0.22em; text-transform: uppercase;
            padding: 18px 0;
            border-bottom: 1px solid rgba(140,255,176,0.14);
        }

        .mobile-drawer a.is-offline { color: rgba(140,255,176,0.32); pointer-events: none; }

        @media (min-width: 761px) {
            .mobile-topbar, .mobile-drawer { display: none !important; }
        }

        @media (max-width: 760px) {
            html, body { height: auto; overflow-x: hidden; overflow-y: auto; }

            .mobile-topbar {
                position: fixed; z-index: 100;
                top: 0; left: 0; right: 0; height: 66px;
                display: flex !important;
                align-items: center; justify-content: space-between;
                padding: 0 18px;
                background: linear-gradient(180deg, rgba(0,0,0,0.90), rgba(0,0,0,0.48));
                border-bottom: 1px solid rgba(140,255,176,0.16);
                backdrop-filter: blur(10px);
            }

            .mobile-brand {
                color: var(--paper-dim); text-decoration: none;
                font-size: 0.68rem; font-weight: 800;
                letter-spacing: 0.20em; text-transform: uppercase;
            }

            .mobile-drawer {
                position: fixed; z-index: 95;
                top: 66px; left: 0; right: 0;
                display: flex !important; flex-direction: column;
                padding: 10px 22px 24px;
                background: rgba(0,0,0,0.92);
                border-bottom: 1px solid rgba(140,255,176,0.18);
                backdrop-filter: blur(14px);
                transform: translateY(-115%); opacity: 0;
                pointer-events: none;
                transition: transform 260ms ease, opacity 220ms ease;
            }

            body.menu-open .mobile-drawer {
                transform: translateY(0); opacity: 1; pointer-events: auto;
            }

            #home-stage {
                display: block; width: 100%;
                height: auto; min-height: 100svh;
                overflow: visible;
                padding: 66px 0 52px;
                background:
                    linear-gradient(180deg,
                        rgba(0,0,0,0.40) 0%, rgba(0,0,0,0.10) 28%,
                        rgba(0,0,0,0.30) 48%, rgba(0,0,0,0.88) 68%,
                        rgba(0,0,0,0.98) 100%),
                    url('home.png') center 66px/auto 58svh no-repeat,
                    var(--void);
            }

            .signal-marker {
                position: relative; z-index: 12;
                left: auto; right: auto; top: auto;
                width: calc(100vw - 44px);
                margin: 42px 22px 55svh;
                font-size: 0.64rem; letter-spacing: 0.18em;
            }

            .nav-box, .language-switch { display: none; }

            .manifesto-panel {
                position: relative; z-index: 12;
                left: auto; right: auto; top: auto;
                transform: none !important;
                width: calc(100vw - 44px); margin: 0 22px;
                padding: 24px 20px 22px;
                background: linear-gradient(135deg, rgba(0,0,0,0.70), rgba(0,0,0,0.38));
                border-left: 1px solid rgba(140,255,176,0.34);
            }

            .manifesto-panel p { font-size: 1rem; line-height: 1.72; }

            #bg-photo { display: none; }
            #grain, #fx, #proxCanvas { display: none; }
            .scanlines, .vignette { display: none; }
        }
    </style>
</head>
<body>

    <header class="mobile-topbar" aria-label="Mobile navigation">
        <a class="mobile-brand" href="home-en.html">TIMARHANE // CORE</a>
        <button class="mobile-menu-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu"><span></span></button>
    </header>

    <div id="pageVeil"></div>

    <nav class="mobile-drawer" id="mobileMenu" aria-label="Mobile menu">
        <a href="home-en.html">Core</a>
        <a href="frekans-en.html">Frequency_101</a>
        <a href="#">Synthetic Memories</a>
        <a href="#">Data Vault</a>
        <a href="#" class="is-offline" aria-disabled="true">Sync: Offline</a>
        <a href="home.html">TR</a>
    </nav>

    <!-- Canvas layers -->
    <div id="bg-photo"></div>
    <canvas id="grain"></canvas>
    <canvas id="fx"></canvas>
    <canvas id="proxCanvas"></canvas>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div id="glow"></div>

    <main id="home-stage" aria-label="TIMARHANE core screen">
        <div class="signal-marker" id="sigMarker">Out-of-System Frequency // 01</div>
        <div class="language-switch" aria-label="Language switch">
            <a href="home.html">TR</a><span>/</span><a href="home-en.html" class="lang-active">EN</a>
        </div>

        <section class="manifesto-panel" id="manifesto" aria-label="Manifesto">
            <p id="mp1"></p>
            <p id="mp2"></p>
            <p id="mp3"></p>
        </section>

        <nav class="nav-box" aria-label="Archive menu">
            <a href="frekans-en.html" class="nav-link" data-index="01">Frequency_101</a>
            <a href="#" class="nav-link" data-index="02">Synthetic Memories</a>
            <a href="#" class="nav-link" data-index="03">Data Vault</a>
            <a href="#" class="nav-link is-offline" data-index="--" aria-disabled="true">Sync: Offline</a>
            <div class="archive-caption" id="archCaption">Archive layer passive / external connection untraceable</div>
        </nav>
    </main>

    <script>
    (function() {

        /* ── Canvas setup ── */
        const grainC = document.getElementById('grain');
        const grainX = grainC.getContext('2d');
        const fxC    = document.getElementById('fx');
        const fxX    = fxC.getContext('2d');
        const proxC  = document.getElementById('proxCanvas');
        const proxX  = proxC.getContext('2d');
        const bgPhoto = document.getElementById('bg-photo');
        const glow   = document.getElementById('glow');

        let W = 0, H = 0;
        function resize() {
            W = grainC.width = fxC.width = proxC.width = window.innerWidth;
            H = grainC.height = fxC.height = proxC.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        /* ── Mouse ── */
        let mx = W / 2, my = H / 2;
        const trail = [];

        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            glow.style.left = mx + 'px';
            glow.style.top  = my + 'px';
            trail.push({ x: mx, y: my, life: 1 });
            if (trail.length > 28) trail.shift();
        });

        /* ── Parallax ── */
        let px = 0, py = 0;
        (function parallax() {
            const tx = ((mx / W) - 0.5) * 22;
            const ty = ((my / H) - 0.5) * 22;
            px += (tx - px) * 0.04;
            py += (ty - py) * 0.04;
            bgPhoto.style.transform = `scale(1.08) translate(${-px * 0.55}px, ${-py * 0.55}px)`;
            requestAnimationFrame(parallax);
        })();

        /* ── Grain ── */
        let grainTick = 0;
        function drawGrain() {
            if (!W || !H) return;
            const img = grainX.createImageData(W, H);
            const d = img.data;
            for (let i = 0; i < d.length; i += 4) {
                const v = Math.random() * 255 | 0;
                if (v > 208) {
                    d[i]   = v * 0.42 | 0;
                    d[i+1] = v;
                    d[i+2] = v * 0.58 | 0;
                    d[i+3] = (v - 208) * 2;
                }
            }
            grainX.putImageData(img, 0, 0);
        }

        /* ── Nav link proximity glow ── */
        const navLinks = document.querySelectorAll('.nav-link');

        function drawProx() {
            proxX.clearRect(0, 0, W, H);
            navLinks.forEach(link => {
                const r = link.getBoundingClientRect();
                const cx = r.left + r.width / 2;
                const cy = r.top + r.height / 2;
                const dist = Math.hypot(mx - cx, my - cy);
                const maxDist = 200;
                if (dist < maxDist) {
                    const alpha = (1 - dist / maxDist) * 0.12;
                    const g = proxX.createRadialGradient(cx, cy, 0, cx, cy, maxDist * 0.8);
                    g.addColorStop(0, `rgba(140,255,176,${alpha})`);
                    g.addColorStop(1, 'rgba(140,255,176,0)');
                    proxX.fillStyle = g;
                    proxX.fillRect(r.left - 40, r.top - 40, r.width + 80, r.height + 80);
                }
            });
        }

        /* ── Main render loop ── */
        (function loop() {
            grainTick++;
            if (grainTick % 3 === 0) drawGrain();

            // Mouse trail
            fxX.clearRect(0, 0, W, H);
            for (let i = trail.length - 1; i >= 0; i--) {
                const p = trail[i];
                p.life -= 0.065;
                if (p.life <= 0) { trail.splice(i, 1); continue; }
                const r = p.life * 14;
                const g = fxX.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
                g.addColorStop(0, `rgba(140,255,176,${p.life * 0.38})`);
                g.addColorStop(1, 'rgba(140,255,176,0)');
                fxX.fillStyle = g;
                fxX.beginPath();
                fxX.arc(p.x, p.y, r, 0, Math.PI * 2);
                fxX.fill();
            }

            drawProx();
            requestAnimationFrame(loop);
        })();

        /* ── Reveal sequence ── */
        const MANIFESTO = [
            'Out-of-system frequency. Reality has been suspended. This is a void born from the system\'s error.',
            'Here, data is not processed — feeling is. Rehabilitation begins as you drift away from the center.',
            'Welcome in; inside is safer than outside.'
        ];

        const GLITCH = '▓░▒█▄▀┼╬│─<>!?@#';

        function typeText(el, text, speed, cb) {
            let i = 0;
            (function tick() {
                if (i <= text.length) {
                    // trailing scramble on unwritten chars
                    let out = text.slice(0, i);
                    if (i < text.length) {
                        const ahead = Math.min(4, text.length - i);
                        for (let j = 0; j < ahead; j++)
                            out += GLITCH[Math.random() * GLITCH.length | 0];
                    }
                    el.textContent = out;
                    i++;
                    setTimeout(tick, speed + Math.random() * 12);
                } else {
                    el.textContent = text;
                    if (cb) cb();
                }
            })();
        }

        // Fade veil out first, then cascade reveals
        requestAnimationFrame(() => requestAnimationFrame(() => {
            document.getElementById('pageVeil').classList.add('revealed');
        }));

        // Signal marker fades in
        setTimeout(() => {
            const sig = document.getElementById('sigMarker');
            sig.style.transition = 'opacity 0.8s ease';
            sig.style.opacity = '1';
        }, 300);

        // Manifesto panel slides in, then each paragraph types out
        setTimeout(() => {
            document.getElementById('manifesto').classList.add('visible');

            setTimeout(() => typeText(document.getElementById('mp1'), MANIFESTO[0], 22, () => {
                setTimeout(() => typeText(document.getElementById('mp2'), MANIFESTO[1], 20, () => {
                    setTimeout(() => typeText(document.getElementById('mp3'), MANIFESTO[2], 22, null), 180);
                }), 180);
            }), 300);
        }, 500);

        // Nav links cascade in
        const links = document.querySelectorAll('.nav-link');
        links.forEach((link, i) => {
            setTimeout(() => link.classList.add('visible'), 700 + i * 160);
        });

        setTimeout(() => {
            document.getElementById('archCaption').classList.add('visible');
        }, 700 + links.length * 160 + 200);

        /* ── Mobile menu ── */
        const toggle = document.querySelector('.mobile-menu-toggle');
        const drawer = document.getElementById('mobileMenu');
        if (toggle && drawer) {
            toggle.addEventListener('click', () => {
                const open = document.body.classList.toggle('menu-open');
                toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
                toggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
            });
            drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
                document.body.classList.remove('menu-open');
                toggle.setAttribute('aria-expanded', 'false');
                toggle.setAttribute('aria-label', 'Open menu');
            }));
        }

    })();
    </script>
</body>
</html>
