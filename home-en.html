<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMARHANE // CORE</title>
    <style>
        :root {
            --void: #050505;
            --phosphor: #8CFFB0;
            --phosphor-soft: rgba(140,255,176,0.72);
            --phosphor-dim: rgba(140,255,176,0.28);
            --paper: #E8D8B8;
            --paper-dim: rgba(232,216,184,0.62);
            --red-memory: #B64A35;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; background: var(--void); font-family: "Courier New", Courier, monospace; color: var(--phosphor-soft); }

        /* Page veil */
        #pageVeil {
            position: fixed; inset: 0; z-index: 200;
            background: #000; opacity: 0;
            pointer-events: none;
            transition: opacity 0.7s ease;
        }

        /* Scanlines + vignette — always on */
        .scanlines {
            position: fixed; inset: 0; z-index: 50; pointer-events: none;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.13) 3px, rgba(0,0,0,0.13) 4px);
            animation: scanScroll 7s linear infinite;
        }
        @keyframes scanScroll { to { background-position: 0 80px; } }

        .vignette {
            position: fixed; inset: -5%; z-index: 51; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 44%, rgba(0,0,0,0.60) 72%, rgba(0,0,0,0.92) 100%);
        }

        /* ═══════════════════════════════
           DESKTOP  (> 760px)
        ═══════════════════════════════ */
        @media (min-width: 761px) {
            html, body { height: 100%; overflow: hidden; }
            .mobile-topbar, .mobile-drawer, #mobile-bg, .mobile-img-spacer { display: block; height: 45vw; }

            #bg-photo {
                position: fixed; inset: 0; z-index: 1;
                background: url('home.png') center/cover no-repeat;
                filter: brightness(0.78) contrast(1.04) saturate(0.92);
                pointer-events: none; will-change: transform; transform: scale(1.08);
            }
            #bg-photo::after {
                content: ''; position: absolute; inset: 0;
                background:
                    linear-gradient(90deg, rgba(0,0,0,0.84) 0%, rgba(0,0,0,0.46) 26%, rgba(0,0,0,0.04) 50%, rgba(0,0,0,0.36) 72%, rgba(0,0,0,0.84) 100%),
                    radial-gradient(circle at 52% 48%, rgba(182,74,53,0.08) 0%, transparent 38%);
            }

            #grain      { position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.45; }
            #fx         { position: fixed; inset: 0; z-index: 6; pointer-events: none; mix-blend-mode: screen; }
            #proxCanvas { position: fixed; inset: 0; z-index: 7; pointer-events: none; mix-blend-mode: screen; }
            #glow {
                position: fixed; z-index: 5; width: 420px; height: 420px; border-radius: 50%;
                pointer-events: none; mix-blend-mode: screen;
                background: radial-gradient(circle, rgba(140,255,176,0.07) 0%, transparent 65%);
                transform: translate(-50%,-50%); left: -999px; top: -999px;
            }

            #home-stage { position: relative; z-index: 10; width: 100vw; height: 100vh; min-height: 620px; overflow: hidden; }

            .signal-marker {
                position: absolute; z-index: 11;
                top: clamp(28px,5vh,56px); left: clamp(28px,5vw,72px);
                color: var(--paper-dim); font-size: clamp(0.68rem,1vw,0.82rem);
                letter-spacing: 0.28em; text-transform: uppercase;
                opacity: 0; transition: opacity 0.8s ease;
            }
            .signal-marker::before {
                content: ''; display: inline-block; width: 34px; height: 1px;
                margin-right: 14px; vertical-align: middle; background: var(--red-memory); opacity: 0.68;
            }

            .language-switch {
                position: absolute; z-index: 11;
                top: clamp(28px,5vh,56px); right: clamp(28px,5vw,72px);
                display: flex; gap: 10px; align-items: center;
                font-size: clamp(0.68rem,1vw,0.82rem); font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase;
            }
            .language-switch a { color: rgba(232,216,184,0.48); text-decoration: none; transition: color 200ms; }
            .language-switch a:hover, .language-switch a.lang-active { color: var(--phosphor); }
            .language-switch span { color: rgba(232,216,184,0.28); }

            .manifesto-panel {
                position: absolute; z-index: 11;
                left: clamp(28px,5vw,72px); top: 52%;
                width: min(420px,31vw); padding: 24px 26px 22px;
                color: var(--phosphor-soft);
                background: linear-gradient(135deg, rgba(0,0,0,0.58), rgba(0,0,0,0.24));
                border-left: 1px solid var(--phosphor-dim); backdrop-filter: blur(2.5px);
                opacity: 0; transform: translateY(-50%) translateX(-14px);
                transition: opacity 0.7s ease, transform 0.7s ease;
            }
            .manifesto-panel.visible { opacity: 1; transform: translateY(-50%) translateX(0); }
            .manifesto-panel::before {
                content: "MANIFESTO / VOID RECORD";
                display: block; margin-bottom: 18px; color: var(--paper-dim);
                font-size: 0.78rem; font-weight: 700; letter-spacing: 0.32em; text-transform: uppercase;
            }
            .manifesto-panel p { margin: 0 0 1.1rem; font-size: clamp(1rem,1.05vw,1.18rem); font-weight: 600; line-height: 1.85; min-height: 1.85em; }
            .manifesto-panel p:last-child { margin-bottom: 0; color: var(--paper); }

            .nav-box {
                position: absolute; z-index: 11;
                top: clamp(150px,28vh,250px); right: clamp(28px,5vw,74px);
                width: min(370px,27vw); display: flex; flex-direction: column; gap: 18px; text-align: right;
            }
            .nav-link {
                position: relative; display: block; padding: 18px 28px;
                color: var(--phosphor-soft); border: 1px solid var(--phosphor-dim);
                background: linear-gradient(90deg, rgba(0,0,0,0.10), rgba(3,6,5,0.46));
                backdrop-filter: blur(3px); cursor: pointer; text-decoration: none;
                font-size: clamp(0.82rem,0.9vw,1rem); font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase;
                opacity: 0; transform: translateX(24px);
                transition: opacity 0.5s ease, transform 0.5s ease, color 260ms, border-color 260ms, background 260ms, box-shadow 260ms;
            }
            .nav-link.visible { opacity: 0.78; transform: translateX(0); }
            .nav-link::before {
                content: attr(data-index); position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
                color: var(--paper-dim); font-size: 0.70rem; font-weight: 700; letter-spacing: 0.12em; opacity: 0.42;
            }
            .nav-link::after { content: ''; position: absolute; right: 0; top: 0; width: 3px; height: 100%; background: var(--red-memory); opacity: 0; transition: opacity 260ms; }
            .nav-link:hover, .nav-link:focus-visible { color: var(--paper); border-color: rgba(232,216,184,0.64); background: linear-gradient(90deg, rgba(0,0,0,0.16), rgba(5,8,6,0.64)); opacity: 1; transform: translateX(-6px); outline: none; box-shadow: -4px 0 18px rgba(140,255,176,0.10); }
            .nav-link:hover::after, .nav-link:focus-visible::after { opacity: 0.82; }
            .nav-link.is-offline { color: rgba(140,255,176,0.36); border-color: rgba(140,255,176,0.14); pointer-events: none; }
            .archive-caption { color: rgba(232,216,184,0.36); font-size: 0.68rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0; transition: opacity 0.6s ease; }
            .archive-caption.visible { opacity: 1; }
        }

        /* ═══════════════════════════════
           MOBILE  (≤ 760px)
        ═══════════════════════════════ */
        @media (max-width: 760px) {
            html, body { height: auto; overflow-x: hidden; overflow-y: auto; }

            /* hide desktop elements */
            #bg-photo, #grain, #fx, #proxCanvas, #glow { display: none; }
            .nav-box, .language-switch { display: none; }

            /* topbar */
            .mobile-topbar {
                position: fixed; z-index: 100;
                top: 0; left: 0; right: 0; height: 58px;
                display: flex; align-items: center; justify-content: space-between;
                padding: 0 18px;
                background: linear-gradient(180deg, rgba(0,0,0,0.90), rgba(0,0,0,0.44));
                border-bottom: 1px solid rgba(140,255,176,0.16);
                backdrop-filter: blur(10px);
            }
            .mobile-brand { color: var(--paper-dim); text-decoration: none; font-size: 0.68rem; font-weight: 800; letter-spacing: 0.20em; text-transform: uppercase; }
            .mobile-menu-toggle {
                display: flex; align-items: center; justify-content: center;
                width: 44px; height: 40px; border: 1px solid rgba(140,255,176,0.32);
                background: rgba(0,0,0,0.4); cursor: pointer; position: relative;
            }
            .mobile-menu-toggle span, .mobile-menu-toggle::before, .mobile-menu-toggle::after {
                content: ''; position: absolute; display: block;
                width: 18px; height: 1px; background: var(--paper-dim); transition: transform 220ms, opacity 220ms;
            }
            .mobile-menu-toggle span    { transform: translateY(0); }
            .mobile-menu-toggle::before { transform: translateY(-6px); }
            .mobile-menu-toggle::after  { transform: translateY(6px); }
            body.menu-open .mobile-menu-toggle span     { opacity: 0; }
            body.menu-open .mobile-menu-toggle::before  { transform: rotate(45deg); }
            body.menu-open .mobile-menu-toggle::after   { transform: rotate(-45deg); }

            .mobile-drawer {
                position: fixed; z-index: 95; top: 58px; left: 0; right: 0;
                display: flex; flex-direction: column; padding: 8px 22px 20px;
                background: rgba(0,0,0,0.96); border-bottom: 1px solid rgba(140,255,176,0.14);
                backdrop-filter: blur(16px); transform: translateY(-110%); opacity: 0;
                pointer-events: none; transition: transform 240ms ease, opacity 200ms ease;
            }
            body.menu-open .mobile-drawer { transform: translateY(0); opacity: 1; pointer-events: auto; }
            .mobile-drawer a { color: var(--phosphor-soft); text-decoration: none; font-size: 0.88rem; font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase; padding: 16px 0; border-bottom: 1px solid rgba(140,255,176,0.10); display: block; }
            .mobile-drawer a.is-offline { color: rgba(140,255,176,0.28); pointer-events: none; }

            /* stage: sits above fixed bg */
            #home-stage {
                position: relative; z-index: 10;
                display: block; width: 100%;
                min-height: 100svh; padding-top: 0;
                background: transparent;
            }

            /* mobile-bg: EXACT same pattern as index.html .bg-photo — position:fixed, inset:0, background-image, JS transform */
            #mobile-bg {
                position: fixed;
                inset: 0;
                z-index: 1;
                background: url('home.png') center 58px/80% auto no-repeat;
                filter: brightness(0.78) contrast(1.04) saturate(0.90);
                pointer-events: none;
            }
            #mobile-bg::after {
                content: ''; position: absolute; inset: 0;
                background:
                    linear-gradient(180deg,
                        rgba(0,0,0,0.48) 0%,
                        rgba(0,0,0,0.18) 30%,
                        rgba(0,0,0,0.32) 55%,
                        rgba(0,0,0,0.88) 75%,
                        rgba(0,0,0,0.99) 100%);
            }

            /* signal marker */
            .signal-marker {
                display: block; position: relative; z-index: 12;
                width: calc(100% - 44px); margin: 8px auto 0;
                color: var(--paper-dim); font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
                opacity: 0; transition: opacity 0.8s ease;
            }
            .signal-marker::before { content: ''; display: inline-block; width: 22px; height: 1px; margin-right: 10px; vertical-align: middle; background: var(--red-memory); opacity: 0.7; }

            /* spacer pushes manifesto to lower portion of screen, over the gradient */
            .mobile-img-spacer { display: block; height: 45vw; }

            /* manifesto */
            .manifesto-panel {
                display: block; position: relative; z-index: 12;
                width: calc(100% - 44px); margin: 14px auto 48px;
                padding: 22px 18px 20px; color: var(--phosphor-soft);
                background: rgba(3,5,4,0.82); border-left: 2px solid rgba(140,255,176,0.42);
                backdrop-filter: blur(8px); opacity: 0; transform: translateY(20px);
                transition: opacity 0.8s ease, transform 0.8s ease;
            }
            .manifesto-panel.visible { opacity: 1; transform: translateY(0); }
            .manifesto-panel::before { content: "MANIFESTO / VOID RECORD"; display: block; margin-bottom: 16px; color: var(--paper-dim); font-size: 0.64rem; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; }
            .manifesto-panel p { margin: 0 0 1rem; font-size: 0.96rem; font-weight: 600; line-height: 1.78; min-height: 1.4em; }
            .manifesto-panel p:last-child { margin-bottom: 0; color: var(--paper); }
        }
    </style>
</head>
<body>
    <div id="pageVeil"></div>

    <header class="mobile-topbar">
        <a class="mobile-brand" href="home-en.html">TIMARHANE // CORE</a>
        <button class="mobile-menu-toggle" id="menuToggle" type="button" aria-label="Open menu" aria-expanded="false"><span></span></button>
    </header>

    <nav class="mobile-drawer" id="mobileMenu">
        <a href="home-en.html">Core</a>
        <a href="frekans-en.html">Frequency_101</a>
        <a href="#">Synthetic Memories</a>
        <a href="#">Data Vault</a>
        <a href="#" class="is-offline">Sync: Offline</a>
        <a href="home.html">TR</a>
    </nav>

    <!-- Desktop canvas -->
    <div id="bg-photo"></div>
    <canvas id="grain"></canvas>
    <canvas id="fx"></canvas>
    <canvas id="proxCanvas"></canvas>
    <div id="glow"></div>

    <div class="scanlines"></div>
    <div class="vignette"></div>

    <main id="home-stage">
        <!-- Mobile bg: fixed div, same as index.html pattern -->
        <div id="mobile-bg"></div>

        <div class="signal-marker" id="sigMarker">Out-of-System Frequency // 01</div>
        <div class="language-switch">
            <a href="home.html">TR</a><span>/</span><a href="home-en.html" class="lang-active">EN</a>
        </div>
        <div class="mobile-img-spacer"></div>

        <section class="manifesto-panel" id="manifesto">
            <p id="mp1"></p>
            <p id="mp2"></p>
            <p id="mp3"></p>
        </section>

        <nav class="nav-box">
            <a href="frekans-en.html" class="nav-link" data-index="01">Frequency_101</a>
            <a href="#" class="nav-link" data-index="02">Synthetic Memories</a>
            <a href="#" class="nav-link" data-index="03">Data Vault</a>
            <a href="#" class="nav-link is-offline" data-index="--">Sync: Offline</a>
            <div class="archive-caption" id="archCaption">Archive layer passive / external connection untraceable</div>
        </nav>
    </main>

    <script>
    (function() {
        const IS_MOBILE = window.innerWidth <= 760;
        const GLITCH    = '▓░▒█▄▀┼╬│─<>!?@#';
        const MANIFESTO = [
            'Out-of-system frequency. Reality has been suspended. This is a void born from the system\'s error.',
            'Here, data is not processed — feeling is. Rehabilitation begins as you drift away from the center.',
            'Welcome in; inside is safer than outside.'
        ];

        function typeText(el, text, speed, cb) {
            let i = 0;
            (function tick() {
                if (i <= text.length) {
                    let out = text.slice(0, i);
                    if (i < text.length) { const ahead = Math.min(3, text.length - i); for (let j = 0; j < ahead; j++) out += GLITCH[Math.random() * GLITCH.length | 0]; }
                    el.textContent = out; i++;
                    setTimeout(tick, speed + Math.random() * 10);
                } else { el.textContent = text; if (cb) cb(); }
            })();
        }

        /* ── Reveal ── */
        function runReveal() {
            document.getElementById('pageVeil').style.opacity = '0';
            setTimeout(() => { document.getElementById('sigMarker').style.opacity = '1'; }, 200);
            setTimeout(() => {
                document.getElementById('manifesto').classList.add('visible');
                setTimeout(() => typeText(document.getElementById('mp1'), MANIFESTO[0], 22, () => {
                    setTimeout(() => typeText(document.getElementById('mp2'), MANIFESTO[1], 20, () => {
                        setTimeout(() => typeText(document.getElementById('mp3'), MANIFESTO[2], 22, null), 160);
                    }), 160);
                }), 400);
            }, 450);
            if (!IS_MOBILE) {
                document.querySelectorAll('.nav-link').forEach((l, i) => setTimeout(() => l.classList.add('visible'), 650 + i * 150));
                setTimeout(() => { const c = document.getElementById('archCaption'); if (c) c.classList.add('visible'); }, 1300);
            }
        }
        setTimeout(runReveal, 100);

        /* ── Mobile drift: same as index.html parallax — transform on the fixed bg div ── */
        if (IS_MOBILE) {
            const mobileBg = document.getElementById('mobile-bg');
            if (mobileBg) {
                let px = 0, py = 0;
                let tx = 0, ty = 0;
                const SCALE = 1.07;
                const MAX = 12;

                function newTarget() {
                    tx = (Math.random() - 0.5) * MAX * 2;
                    ty = (Math.random() - 0.5) * MAX * 2;
                    setTimeout(newTarget, 3000 + Math.random() * 3000);
                }
                newTarget();

                (function driftLoop() {
                    px += (tx - px) * 0.008;
                    py += (ty - py) * 0.008;
                    mobileBg.style.transform = `scale(${SCALE}) translate(${px * 0.5}px, ${py * 0.5}px)`;
                    requestAnimationFrame(driftLoop);
                })();
            }
        }

        /* ── Mobile menu ── */
        const toggle = document.getElementById('menuToggle');
        const drawer = document.getElementById('mobileMenu');
        if (toggle && drawer) {
            toggle.addEventListener('click', () => {
                const open = document.body.classList.toggle('menu-open');
                toggle.setAttribute('aria-expanded', String(open));
                toggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
            });
            drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
                document.body.classList.remove('menu-open');
                toggle.setAttribute('aria-expanded', 'false');
                toggle.setAttribute('aria-label', 'Open menu');
            }));
        }

        /* ── Desktop canvas ── */
        if (!IS_MOBILE) {
            const grainC = document.getElementById('grain'), grainX = grainC.getContext('2d');
            const fxC    = document.getElementById('fx'),    fxX    = fxC.getContext('2d');
            const proxC  = document.getElementById('proxCanvas'), proxX = proxC.getContext('2d');
            const bgPhoto = document.getElementById('bg-photo');
            const glow    = document.getElementById('glow');
            let W = 0, H = 0;
            function resize() { W = grainC.width = fxC.width = proxC.width = window.innerWidth; H = grainC.height = fxC.height = proxC.height = window.innerHeight; }
            resize(); window.addEventListener('resize', resize);
            let mx = W/2, my = H/2; const trail = [];
            document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; glow.style.left = mx+'px'; glow.style.top = my+'px'; trail.push({x:mx,y:my,life:1}); if(trail.length>28) trail.shift(); });
            let px = 0, py = 0;
            (function parallax() { const tx=((mx/W)-0.5)*22, ty=((my/H)-0.5)*22; px+=(tx-px)*0.04; py+=(ty-py)*0.04; bgPhoto.style.transform=`scale(1.08) translate(${-px*.55}px,${-py*.55}px)`; requestAnimationFrame(parallax); })();
            let gf = 0;
            function drawGrain() { if(!W||!H) return; const img=grainX.createImageData(W,H); const d=img.data; for(let i=0;i<d.length;i+=4){const v=Math.random()*255|0; if(v>210){d[i]=v*.42|0;d[i+1]=v;d[i+2]=v*.58|0;d[i+3]=(v-210)*2;}} grainX.putImageData(img,0,0); }
            const navLinks = document.querySelectorAll('.nav-link');
            function drawProx() { proxX.clearRect(0,0,W,H); navLinks.forEach(l=>{const r=l.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dist=Math.hypot(mx-cx,my-cy); if(dist<200){const a=(1-dist/200)*.12,g=proxX.createRadialGradient(cx,cy,0,cx,cy,160); g.addColorStop(0,`rgba(140,255,176,${a})`); g.addColorStop(1,'rgba(140,255,176,0)'); proxX.fillStyle=g; proxX.fillRect(r.left-40,r.top-40,r.width+80,r.height+80);}}); }
            (function loop() { if(++gf%3===0) drawGrain(); fxX.clearRect(0,0,W,H); for(let i=trail.length-1;i>=0;i--){const p=trail[i]; p.life-=0.065; if(p.life<=0){trail.splice(i,1);continue;} const r=p.life*14,g=fxX.createRadialGradient(p.x,p.y,0,p.x,p.y,r); g.addColorStop(0,`rgba(140,255,176,${p.life*.38})`); g.addColorStop(1,'rgba(140,255,176,0)'); fxX.fillStyle=g; fxX.beginPath(); fxX.arc(p.x,p.y,r,0,Math.PI*2); fxX.fill();} drawProx(); requestAnimationFrame(loop); })();
        }
    })();
    </script>
</body>
</html>
