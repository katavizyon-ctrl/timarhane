<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>

  <!-- Signal waves — upward, centered, escaping -->
  <path d="M12.5 13.5 Q16 9.5 19.5 13.5" fill="none" stroke="#8cffb0" stroke-width="1.4" stroke-linecap="round" opacity="0.95"/>
  <path d="M10 10.5 Q16 5 22 10.5"       fill="none" stroke="#8cffb0" stroke-width="1.1" stroke-linecap="round" opacity="0.60"/>
  <path d="M7.5 7.5  Q16 0.5 24.5 7.5"   fill="none" stroke="#8cffb0" stroke-width="0.85" stroke-linecap="round" opacity="0.32"/>

  <!-- Cassette body -->
  <rect x="3" y="16" width="26" height="13" rx="2.5" fill="#0e1210" stroke="#8cffb0" stroke-width="1.1"/>

  <!-- Cassette window -->
  <rect x="6.5" y="18.5" width="19" height="7" rx="1.5" fill="#050505" stroke="rgba(140,255,176,0.38)" stroke-width="0.7"/>

  <!-- Left reel -->
  <circle cx="11" cy="22" r="2.6" fill="none" stroke="rgba(140,255,176,0.60)" stroke-width="0.85"/>
  <circle cx="11" cy="22" r="1"   fill="#8cffb0" opacity="0.75"/>

  <!-- Right reel -->
  <circle cx="21" cy="22" r="2.6" fill="none" stroke="rgba(140,255,176,0.60)" stroke-width="0.85"/>
  <circle cx="21" cy="22" r="1"   fill="#8cffb0" opacity="0.75"/>

  <!-- Bottom notches -->
  <rect x="5"  y="28.2" width="3" height="1.8" rx="0.5" fill="rgba(140,255,176,0.20)"/>
  <rect x="24" y="28.2" width="3" height="1.8" rx="0.5" fill="rgba(140,255,176,0.20)"/>
</svg>
