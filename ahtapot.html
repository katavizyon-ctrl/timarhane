<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0a0e1a;
    --deep: #060910;
    --blood: #c0152a;
    --blood-dim: #6b0b17;
    --teal: #0ecfb0;
    --teal-dim: #085c50;
    --neon: #00ff9d;
    --navy: #0b1d3a;
    --fog: rgba(14,207,176,0.07);
    --text-main: #d4e8e0;
    --text-muted: #5a8070;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--deep);
    color: var(--text-main);
    font-family: 'Share Tech Mono', monospace;
    overflow-x: hidden;
    min-height: 100vh;
  }

  .bg-image {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: url('ahtapot.webp') center center / cover no-repeat;
    filter: brightness(0.72) contrast(1.08) saturate(0.88);
  }

  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      linear-gradient(90deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0.72) 75%, rgba(0,0,0,0.88) 100%),
      radial-gradient(circle at 50% 100%, rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.55) 100%);
  }

  /* ── CANVAS BACKGROUND ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0.45;
    mix-blend-mode: screen;
  }

  /* ── NAV ── */
  nav {
    position: relative;
    z-index: 10;
    display: flex;
    flex-wrap: wrap;
    gap: 0 2rem;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--teal-dim);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  nav a {
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  nav a:hover { color: var(--teal); }
  nav a.brand {
    color: var(--teal);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.2em;
    margin-right: 1rem;
  }

  /* ── LANG ── */
  .lang-toggle {
    position: relative;
    z-index: 10;
    text-align: right;
    padding: 0.5rem 2rem 0;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
  }
  .lang-toggle a { color: var(--teal-dim); text-decoration: none; }
  .lang-toggle a:hover { color: var(--teal); }
  .lang-toggle span { color: var(--teal); }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    position: relative;
    z-index: 10;
    padding: 0.8rem 2rem 0;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }
  .breadcrumb a { color: var(--text-muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--teal); }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 5;
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 4rem 2rem 2rem;
    text-align: center;
  }

  .hero-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--blood);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.3s forwards;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 12vw, 8rem);
    letter-spacing: 0.06em;
    line-height: 0.9;
    color: var(--text-main);
    text-shadow:
      0 0 40px rgba(14,207,176,0.15),
      0 0 80px rgba(192,21,42,0.1);
    opacity: 0;
    animation: fadeUp 0.8s 0.5s forwards;
  }

  h1 span { color: var(--blood); }

  /* ── PLAYER SECTION ── */
  .player-section {
    position: relative;
    z-index: 10;
    max-width: 680px;
    margin: 2.5rem auto 0;
    padding: 0 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s forwards;
  }

  .player-label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--teal-dim);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    text-align: center;
  }

  .player-box {
    border: 1px solid var(--teal-dim);
    background: rgba(6,9,16,0.85);
    backdrop-filter: blur(8px);
    padding: 1.2rem 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .player-box::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(14,207,176,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  /* corner accents */
  .player-box::after {
    content: '';
    position: absolute;
    top: -1px; right: -1px;
    width: 20px; height: 20px;
    border-top: 2px solid var(--blood);
    border-right: 2px solid var(--blood);
    pointer-events: none;
  }

  .player-title-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1rem;
  }

  .player-song-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: var(--teal);
  }

  .player-artist {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;

  .player-scrubber {
    position: relative;
    height: 3px;
    background: rgba(14,207,176,0.15);
    margin: 12px 0 14px;
    cursor: pointer;
  }
  .player-scrubber-fill {
    height: 100%; width: 0%;
    background: var(--teal);
    pointer-events: none;
    transition: width 0.25s linear;
  }
  .player-scrubber-thumb {
    position: absolute;
    top: 50%; left: 0%;
    width: 10px; height: 10px;
    background: #d4e8e0;
    border: 1px solid var(--teal);
    transform: translate(-50%,-50%);
    pointer-events: none;
    transition: left 0.25s linear;
  }
  .player-controls { display: flex; align-items: center; gap: 12px; }
  .player-btn {
    background: none;
    border: 1px solid var(--teal-dim);
    color: var(--teal);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    padding: 6px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .player-btn:hover { background: rgba(14,207,176,0.1); border-color: var(--teal); color: #fff; }
  .player-btn.is-playing { background: rgba(14,207,176,0.08); border-color: var(--teal); color: var(--teal); }
  .player-time-display { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.1em; margin-left: auto; }
  .player-vol { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
  .vol-label { font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.14em; text-transform: uppercase; }
  .vol-track { position: relative; width: 58px; height: 3px; background: rgba(14,207,176,0.15); cursor: pointer; }
  .vol-fill { height: 100%; width: 80%; background: rgba(14,207,176,0.5); pointer-events: none; }
  .vol-thumb {
    position: absolute; top: 50%; left: 80%;
    width: 8px; height: 8px;
    background: var(--text-muted);
    border: 1px solid rgba(14,207,176,0.5);
    transform: translate(-50%,-50%);
    pointer-events: none;

    display: inline-block;
    margin-top: 0.8rem;
    font-size: 0.65rem;

    text-decoration: none;
    text-transform: uppercase;
    border-bottom: 1px solid var(--blood-dim);
    transition: color 0.2s, border-color 0.2s;
  }
  .dl-link:hover { color: var(--neon); border-color: var(--neon); }

  /* ── SYNCED LYRICS ── */
  .lyrics-section {
    position: relative;
    z-index: 10;
    max-width: 680px;
    margin: 2rem auto 5rem;
    padding: 0 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
  }
  .lyrics-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
  .lyrics-label { font-size: 0.65rem; letter-spacing: 0.25em; color: var(--teal-dim); text-transform: uppercase; flex-shrink: 0; }
  .lyrics-divider { flex: 1; height: 1px; background: linear-gradient(to right, var(--teal-dim), transparent); }
  .lyrics-container { height: 280px; overflow: hidden; position: relative; }
  .lyrics-container::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(transparent, rgba(6,9,16,0.95));
    pointer-events: none;
    z-index: 1;
  }
  .scroller-engine {
    position: absolute;
    width: 100%;
    transition: transform 0.42s cubic-bezier(0.16,1,0.3,1);
  }
  .lyric-block {
    margin-bottom: 14px;
    opacity: 0.28;
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    line-height: 1.65;
    color: #d4e8e0;
    transition: opacity 0.3s, color 0.3s, text-shadow 0.3s;
  }
  .lyric-block.active {
    opacity: 1;
    color: var(--teal);
    font-weight: 600;
    text-shadow: 0 0 12px rgba(14,207,176,0.35);
  }
  .lyric-tag-inline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem;
    color: var(--blood);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
    opacity: 0.7;
  }

  /* ── HORON SVG FIGURE (foreground) ── */
  #horon-figure {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    pointer-events: none;
    opacity: 0.18;
    width: 260px;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes tentacleWave {
    0%   { d: path("M0,0 C30,-20 60,20 90,0 C120,-20 150,10 180,0"); }
    50%  { d: path("M0,0 C30,20 60,-20 90,0 C120,20 150,-10 180,0"); }
    100% { d: path("M0,0 C30,-20 60,20 90,0 C120,-20 150,10 180,0"); }
  }

  @keyframes horonBounce {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50%       { transform: translateY(-8px) rotate(2deg); }
  }

  @keyframes glitchX {
    0%,100% { clip-path: inset(0 0 95% 0); transform: translateX(0); }
    20%     { clip-path: inset(20% 0 60% 0); transform: translateX(-4px); }
    40%     { clip-path: inset(60% 0 20% 0); transform: translateX(4px); }
    60%     { clip-path: inset(40% 0 40% 0); transform: translateX(-2px); }
    80%     { clip-path: inset(80% 0 5% 0);  transform: translateX(3px); }
  }

  /* glitch overlay on h1 */
  h1::before, h1::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
    line-height: inherit;
    pointer-events: none;
  }
  .hero { position: relative; }
  h1 { position: relative; }
  h1::before {
    color: var(--blood);
    animation: glitchX 4s 2s infinite;
    opacity: 0.6;
    left: 2px;
  }
  h1::after {
    color: var(--teal);
    animation: glitchX 4s 2.5s infinite reverse;
    opacity: 0.4;
    left: -2px;
  }

  /* ── SCAN LINE OVERLAY ── */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.06) 3px,
      rgba(0,0,0,0.06) 4px
    );
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    nav { padding: 1rem; gap: 0 1rem; font-size: 0.68rem; }
    .player-section, .lyrics-section { padding: 0 1rem; }
    h1 { font-size: clamp(3rem, 16vw, 5rem); }
  }
</style>
</head>

<script>
/* ── TENTACLE BACKGROUND CANVAS ── */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

let W, H, tentacles = [], particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Tentacle {
  constructor(ox, oy, angle, len, color) {
    this.ox = ox; this.oy = oy;
    this.angle = angle; this.len = len;
    this.color = color;
    this.phase = Math.random() * Math.PI * 2;
    this.speed = 0.004 + Math.random() * 0.004;
    this.segments = Math.floor(len / 28);
    this.width = 2.5 + Math.random() * 2;
  }
  draw(t) {
    ctx.beginPath();
    let x = this.ox, y = this.oy;
    ctx.moveTo(x, y);
    const segLen = this.len / this.segments;
    let angle = this.angle;
    for (let i = 0; i < this.segments; i++) {
      const wave = Math.sin(this.phase + t * this.speed + i * 0.5) * (18 + i * 2.5);
      angle += wave * 0.045;
      const nx = x + Math.cos(angle) * segLen;
      const ny = y + Math.sin(angle) * segLen;
      const mx = (x + nx) / 2 + Math.cos(angle + Math.PI/2) * wave * 0.3;
      const my = (y + ny) / 2 + Math.sin(angle + Math.PI/2) * wave * 0.3;
      ctx.quadraticCurveTo(mx, my, nx, ny);
      x = nx; y = ny;
    }
    ctx.strokeStyle = this.color;
    ctx.lineWidth = this.width * (1 - 0.6 * (this.segments / 20));
    ctx.lineCap = 'round';
    ctx.stroke();

    // sucker dots
    x = this.ox; y = this.oy; angle = this.angle;
    for (let i = 0; i < this.segments; i++) {
      const wave = Math.sin(this.phase + t * this.speed + i * 0.5) * (18 + i * 2.5);
      angle += wave * 0.045;
      const nx = x + Math.cos(angle) * segLen;
      const ny = y + Math.sin(angle) * segLen;
      if (i % 2 === 0 && i > 1) {
        ctx.beginPath();
        ctx.arc(nx, ny, 1.8, 0, Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
      x = nx; y = ny;
    }
  }
}

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * (W || 800);
    this.y = Math.random() * (H || 600);
    this.r = 0.5 + Math.random() * 1;
    this.vx = (Math.random() - 0.5) * 0.2;
    this.vy = -0.1 - Math.random() * 0.2;
    this.alpha = 0.2 + Math.random() * 0.4;
    this.color = Math.random() > 0.5 ? '#0ecfb0' : '#c0152a';
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.y < -5) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function initTentacles() {
  tentacles = [];
  const origins = [
    { x: 0,   y: 0,   a: Math.PI * 0.15 },
    { x: W,   y: 0,   a: Math.PI * 0.85 },
    { x: 0,   y: H,   a: -Math.PI * 0.15 },
    { x: W,   y: H,   a: -Math.PI * 0.85 },
    { x: W*0.25, y: 0, a: Math.PI * 0.35 },
    { x: W*0.75, y: 0, a: Math.PI * 0.65 },
    { x: 0,   y: H*0.4, a: 0.2 },
    { x: W,   y: H*0.4, a: Math.PI - 0.2 },
  ];
  origins.forEach((o, i) => {
    const isBlood = i % 3 === 0;
    const isTeal  = i % 3 === 1;
    const color = isBlood ? 'rgba(192,21,42,0.18)' :
                  isTeal  ? 'rgba(14,207,176,0.14)' :
                            'rgba(0,255,157,0.08)';
    tentacles.push(new Tentacle(o.x, o.y, o.a, 350 + Math.random() * 200, color));
  });
  particles = Array.from({length: 60}, () => new Particle());
}
initTentacles();
window.addEventListener('resize', initTentacles);

let rafT = 0;
function frame(ts) {
  rafT = ts;
  ctx.clearRect(0, 0, W, H);

  // deep bg vignette
  const vg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
  vg.addColorStop(0, 'rgba(11,29,58,0.0)');
  vg.addColorStop(1, 'rgba(6,9,16,0.85)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  tentacles.forEach(t => t.draw(ts));
  particles.forEach(p => { p.update(); p.draw(); });

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ── PLAYER LOGIC ── */
const audio    = document.getElementById('cyberPlayer');
const playBtn  = document.getElementById('playBtn');
const timeEl   = document.getElementById('playerTime');
const scrubber = document.getElementById('scrubber');
const sFill    = document.getElementById('scrubberFill');
const sThumb   = document.getElementById('scrubberThumb');
const volTrack = document.getElementById('volTrack');
const vFill    = document.getElementById('volFill');
const vThumb   = document.getElementById('volThumb');

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return m + ':' + sec;
}

function updateProgress() {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  sFill.style.width = pct + '%';
  sThumb.style.left = pct + '%';
  scrubber.setAttribute('aria-valuenow', Math.round(pct));
  timeEl.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
}

function setVolume(pct) {
  pct = Math.max(0, Math.min(1, pct));
  audio.volume = pct;
  vFill.style.width = (pct * 100) + '%';
  vThumb.style.left = (pct * 100) + '%';
}

window.addEventListener('keydown', function(e) {
  if (e.code === 'Space') {
    const el = document.activeElement;
    if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) return;
    e.preventDefault();
    audio.paused ? audio.play() : audio.pause();
  }
}, true);

playBtn.addEventListener('click', () => { audio.paused ? audio.play() : audio.pause(); });

audio.addEventListener('play', () => {
  playBtn.textContent = '⏸ DURAKLAT';
  playBtn.classList.add('is-playing');
});
audio.addEventListener('pause', () => {
  playBtn.textContent = '▶ OYNAT';
  playBtn.classList.remove('is-playing');
});
audio.addEventListener('ended', () => {
  playBtn.textContent = '▶ OYNAT';
  playBtn.classList.remove('is-playing');
});
audio.addEventListener('timeupdate', updateProgress);
audio.addEventListener('loadedmetadata', updateProgress);

/* scrubber drag */
let scrubDown = false;
function seekTo(e) {
  const rect = scrubber.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  if (audio.duration) audio.currentTime = pct * audio.duration;
}
scrubber.addEventListener('mousedown', e => { scrubDown = true; seekTo(e); });
document.addEventListener('mousemove', e => { if (scrubDown) seekTo(e); });
document.addEventListener('mouseup', () => { scrubDown = false; });
scrubber.addEventListener('touchstart', e => { scrubDown = true; seekTo(e.touches[0]); }, { passive: true });
document.addEventListener('touchmove', e => { if (scrubDown) seekTo(e.touches[0]); }, { passive: true });
document.addEventListener('touchend', () => { scrubDown = false; });

/* volume drag */
let volDown = false;
function seekVol(e) {
  const rect = volTrack.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  setVolume(pct);
}
volTrack.addEventListener('mousedown', e => { volDown = true; seekVol(e); });
document.addEventListener('mousemove', e => { if (volDown) seekVol(e); });
document.addEventListener('mouseup', () => { volDown = false; });
volTrack.addEventListener('touchstart', e => { volDown = true; seekVol(e.touches[0]); }, { passive: true });
document.addEventListener('touchmove', e => { if (volDown) seekVol(e.touches[0]); }, { passive: true });
document.addEventListener('touchend', () => { volDown = false; });
setVolume(0.8);

/* ── LYRICS SYNC ── */
audio.addEventListener('timeupdate', () => {
  let activeIdx = -1;
  for (let i = 0; i < lyrics.length; i++) {
    if (audio.currentTime >= lyrics[i].t) activeIdx = i;
    else break;
  }
  Array.from(sc.children).forEach((el, i) => {
    el.classList.toggle('active', i === activeIdx);
  });
  if (activeIdx >= 0) {
    sc.style.transform = 'translateY(-' + sc.children[activeIdx].offsetTop + 'px)';
  }
});
</script>
