<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMARHANE // Terminal Boot</title>
    <style>
        :root {
            --void: #050505;
            --text-main: #efe3c9;
            --text-dim: rgba(239, 227, 201, 0.52);
            --phosphor: #8cffb0;
            --phosphor-dim: rgba(140, 255, 176, 0.62);
            --warning: #b64a35;
            --blue-dim: #8fdde3;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: clamp(24px, 4vw, 56px);
            background: var(--void);
            font-family: "Courier New", Courier, monospace;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            overflow: hidden;
            position: relative;
        }

        .collage-backdrop {
            position: fixed;
            inset: 0;
            background-image: url("landing_bg.png");
            background-size: cover;
            background-position: center;
            z-index: 1;
            filter: brightness(0.72) contrast(1.06) saturate(0.95);
            pointer-events: none;
        }

        .collage-backdrop::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 50% 50%, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0.10) 52%, rgba(0,0,0,0.42) 100%),
                linear-gradient(90deg, rgba(0,0,0,0.70) 0%, rgba(0,0,0,0.38) 34%, rgba(0,0,0,0.08) 58%, rgba(0,0,0,0.22) 100%);
            z-index: 2;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.20) 50%),
                linear-gradient(90deg, rgba(255,255,255,0.018), rgba(0,0,0,0.018));
            z-index: 20;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            mix-blend-mode: overlay;
            animation: crtHardwareFlicker 0.18s infinite;
            opacity: 0.55;
        }

        .terminal-container {
            width: min(760px, 92vw);
            min-height: 280px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 10;
            padding: clamp(18px, 2.4vw, 30px);
            background: rgba(0, 0, 0, 0.16);
            border-left: 1px solid rgba(140,255,176,0.42);
            box-shadow: 0 24px 90px rgba(0,0,0,0.48);
            backdrop-filter: blur(1.5px);
        }

        .terminal-tag {
            color: var(--text-dim);
            letter-spacing: 0.34em;
            font-weight: 700;
            font-size: clamp(0.74rem, 0.85vw, 0.9rem);
            margin-bottom: 14px;
        }

        .terminal-tag::before {
            content: "";
            display: inline-block;
            width: 44px;
            height: 1px;
            margin-right: 18px;
            vertical-align: middle;
            background: rgba(182,74,53,0.8);
        }

        .log-line,
        .input-line {
            text-shadow:
                0 2px 8px rgba(0,0,0,0.88),
                0 0 12px rgba(0,0,0,0.50);
        }

        .log-line {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            line-height: 1.7;
            font-size: clamp(0.86rem, 0.95vw, 1rem);
            margin-bottom: 2px;
            color: var(--text-main);
        }

        .dim { color: var(--text-dim); }
        .green { color: var(--phosphor); font-weight: 600; }
        .pink { color: var(--warning); font-weight: 700; }
        .blue { color: var(--blue-dim); font-weight: 600; }
        .main { color: var(--text-main); font-weight: 600; }

        .input-line {
            display: none;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
            color: var(--phosphor);
            font-weight: 700;
            font-size: clamp(0.9rem, 1vw, 1.05rem);
        }

        #typedCommand {
            color: var(--text-main);
            min-width: 2px;
        }

        .cursor {
            display: inline-block;
            background-color: var(--phosphor);
            width: 9px;
            height: 18px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        .interactive-btn {
            background: rgba(0,0,0,0.20);
            border: 1px solid rgba(140,255,176,0.64);
            color: var(--phosphor);
            font-family: inherit;
            font-size: clamp(0.82rem, 0.9vw, 0.96rem);
            padding: 9px 18px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.22em;
            opacity: 0;
            transform: translateY(4px);
            transition: all 0.32s cubic-bezier(0.16, 1, 0.3, 1);
            margin-left: 8px;
        }

        .interactive-btn.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .interactive-btn:hover {
            background: rgba(140,255,176,0.90);
            color: #020402;
            box-shadow: 0 0 18px rgba(140,255,176,0.32);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes crtHardwareFlicker {
            0% { opacity: 0.48; }
            50% { opacity: 0.58; }
            100% { opacity: 0.52; }
        }

        @media (max-width: 760px) {
            body {
                min-height: 100svh;
                padding: 18px;
                overflow-y: auto;
                align-items: flex-start;
            }

            .collage-backdrop {
                background-position: center top;
                filter: brightness(0.62) contrast(1.08) saturate(0.92);
            }

            .collage-backdrop::after {
                background:
                    radial-gradient(circle at 50% 32%, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.24) 58%, rgba(0,0,0,0.66) 100%),
                    linear-gradient(180deg, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.18) 42%, rgba(0,0,0,0.72) 100%);
            }

            .terminal-container {
                width: 100%;
                margin-top: 12px;
                padding: 20px;
                background: rgba(0,0,0,0.42);
                backdrop-filter: blur(2.5px);
            }

            .terminal-tag {
                letter-spacing: 0.20em;
                line-height: 1.55;
            }

            .terminal-tag::before {
                width: 28px;
                margin-right: 12px;
            }

            .log-line {
                display: block;
                font-size: 0.82rem;
                line-height: 1.55;
                overflow-wrap: anywhere;
            }

            .input-line {
                display: none;
                align-items: flex-start;
                flex-direction: column;
                gap: 8px;
            }

            .interactive-btn {
                width: 100%;
                margin-left: 0;
                margin-top: 8px;
                padding: 14px 16px;
                letter-spacing: 0.18em;
            }
        }
    </style>
</head>
<body>
    <div class="collage-backdrop"></div>

    <div class="terminal-container" id="terminalGrid">
        <div class="terminal-tag">SİSTEM DIŞI FREKANS // BOOT</div>
    </div>

    <script>
        const terminalGrid = document.getElementById("terminalGrid");

        const BOOT_SEQUENCE = [
            { type: "dim", text: "Karanlık alandan düşük seviyeli sinyal alınıyor..." },
            { type: "green", text: "✔ FREKANS_101: UYANDI" },
            { type: "green", text: "✔ BOŞLUK_KAYDI: AÇILDI" },
            { type: "blue", text: "ℹ SENTETİK ANILAR: PARÇALI AMA ERİŞİLEBİLİR" },
            { type: "main", text: ">> SİSTEM DIŞI FREKANS TESPİT EDİLDİ // 99.6 MHz" },
            { type: "main", text: ">> GERÇEKLİK ASKIYA ALINDI // MERKEZDEN UZAKLAŞILIYOR" },
            { type: "pink", text: ">> UYARI: DIŞ BAĞLANTI İZLENEMİYOR // İÇERİSİ DAHA GÜVENLİ" },
            { type: "dim", text: "Duygu işleme katmanı yükleniyor..." },
            { type: "progressBar", text: "" },
            { type: "green", text: "✔ TIMARHANE_OS: BOŞLUĞA GİRİŞ HAZIR." }
        ];

        let lineIndex = 0;

        function printNextLine() {
            if (lineIndex < BOOT_SEQUENCE.length) {
                const currentData = BOOT_SEQUENCE[lineIndex];

                if (currentData.type === "progressBar") {
                    renderProgressBar();
                    return;
                }

                const row = document.createElement("div");
                row.className = "log-line";

                let prefix = '<span class="dim">IST@void:~#</span>';
                if (currentData.type === "pink") prefix = '<span class="pink">[UYARI]</span>';
                if (currentData.type === "green") prefix = '<span class="green">[OK]</span>';
                if (currentData.type === "blue") prefix = '<span class="blue">[ARŞİV]</span>';

                row.innerHTML = `${prefix} <span class="${currentData.type}">${currentData.text}</span>`;
                terminalGrid.appendChild(row);

                lineIndex++;

                let speed = Math.floor(Math.random() * 220) + 90;
                if (currentData.type === "pink") speed = 650;

                setTimeout(printNextLine, speed);
            } else {
                triggerPromptInput();
            }
        }

        function renderProgressBar() {
            const row = document.createElement("div");
            row.className = "log-line";
            row.innerHTML = '<span class="dim">IST@void:~#</span> <span class="dim">[EŞİK] </span><span id="pBarText" class="blue"></span>';
            terminalGrid.appendChild(row);

            const pBarText = document.getElementById("pBarText");
            const maxBlocks = 28;
            let currentBlock = 0;

            function updateBlocks() {
                if (currentBlock <= maxBlocks) {
                    const blocksStr = "█".repeat(currentBlock);
                    const spacesStr = "░".repeat(maxBlocks - currentBlock);
                    const percent = Math.floor((currentBlock / maxBlocks) * 100);
                    pBarText.innerText = `[${blocksStr}${spacesStr}] ${percent}%`;
                    currentBlock++;
                    setTimeout(updateBlocks, 42);
                } else {
                    lineIndex++;
                    printNextLine();
                }
            }

            updateBlocks();
        }

        function triggerPromptInput() {
            const inputRow = document.createElement("div");
            inputRow.className = "input-line";
            inputRow.style.display = "flex";
            inputRow.innerHTML = `
                <span>TIMARHANE@OS:~#</span>
                <span id="typedCommand"></span><span class="cursor" id="promptCursor"></span>
                <button class="interactive-btn" id="execBtn" onclick="runRedirect()">[ FREKANSI AÇ ]</button>
            `;
            terminalGrid.appendChild(inputRow);

            const fullCommandText = "execute --enter-the-void";
            const typedCommandSpan = document.getElementById("typedCommand");
            let charIndex = 0;

            function typeCharacter() {
                if (charIndex < fullCommandText.length) {
                    typedCommandSpan.innerText += fullCommandText.charAt(charIndex);
                    charIndex++;
                    setTimeout(typeCharacter, 58);
                } else {
                    document.getElementById("execBtn").classList.add("visible");
                }
            }

            setTimeout(typeCharacter, 500);
        }

        function runRedirect() {
            const btn = document.getElementById("execBtn");
            document.getElementById("promptCursor").style.display = "none";
            btn.innerText = "[ AÇILIYOR... ]";
            btn.style.borderColor = "var(--blue-dim)";
            btn.style.color = "var(--blue-dim)";

            setTimeout(() => {
                window.location.href = "home.html";
            }, 800);
        }

        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(printNextLine, 600);
        });
    </script>
</body>
</html>
