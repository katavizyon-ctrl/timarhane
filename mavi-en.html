    <title>TIMARHANE — Blue Rendezvous // AI-Generated Music</title>
    <style>
        :root {
            --void: #050505;
            --phosphor: #8CFFB0;
            --phosphor-soft: rgba(140, 255, 176, 0.78);
            --phosphor-dim: rgba(140, 255, 176, 0.26);
            --paper: #E8D8B8;
            --paper-dim: rgba(232, 216, 184, 0.64);
            --paper-faint: rgba(232, 216, 184, 0.38);
            --red-memory: #B64A35;
            --glass: rgba(3, 6, 5, 0.52);
            --glass-deep: rgba(0, 0, 0, 0.72);
            --mavi-1: #FDB29F;
            --mavi-2: #7AE2CF;
            --mavi-3: #684F7E;
            --mavi-4: #39B1D1;
            --mavi-5: #00082F;
        }

        * { box-sizing: border-box; }

        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background: var(--void);
            color: var(--phosphor-soft);
            font-family: "Courier New", Courier, monospace;
            overflow-x: hidden;
        }

        body {
            display: flex;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding-top: 72px;
        }

        /* ── Background layers ── */
        .bg-image {
            position: fixed;
            top: 72px; left: 0; right: 0; bottom: 0;
            z-index: 1;
            background: url('tape_2.webp') center center / cover no-repeat;
            transform-origin: center center;
            will-change: transform;
            filter: brightness(0.78) contrast(1.04) saturate(0.90);
            animation: bgGlimmer 9s ease-in-out infinite alternate;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0.04) 34%, rgba(0,0,0,0.32) 62%, rgba(0,0,0,0.62) 100%),
                radial-gradient(circle at 22% 50%, transparent 0%, rgba(0,0,0,0.14) 52%, rgba(0,0,0,0.38) 100%);
        }

        .bg-pulse {
            position: fixed;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            background: radial-gradient(circle at 72% 44%, rgba(140, 255, 176, 0.14) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        body.track-playing .bg-pulse {
            opacity: 1;
            animation: pulseGlow 3s ease-in-out infinite;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 4;
            pointer-events: none;
            background:
                linear-gradient(rgba(255,255,255,0.020) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px);
            background-size: 100% 4px, 4px 100%;
            mix-blend-mode: soft-light;
            opacity: 0.22;
        }

        #matrixCanvas {
            position: fixed;
            top: 72px; left: 0; right: 0; bottom: 0;
            z-index: 5;
            opacity: 0.18;
            pointer-events: none;
        }

        /* ── Nav ── */
        .site-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 72px;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(18px, 5vw, 72px);
            background: linear-gradient(180deg, rgba(0,0,0,0.82), rgba(0,0,0,0.32) 68%, transparent);
            border-bottom: 1px solid rgba(140, 255, 176, 0.12);
            backdrop-filter: blur(7px);
            -webkit-backdrop-filter: blur(7px);
        }

        .nav-brand {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            color: var(--paper-dim);
            text-decoration: none;
            font-size: clamp(0.66rem, 0.9vw, 0.82rem);
            font-weight: 700;
            letter-spacing: 0.30em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .nav-brand::before {
            content: "";
            flex-shrink: 0;
            width: 36px;
            height: 1px;
            background: var(--red-memory);
            opacity: 0.82;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: clamp(14px, 2vw, 32px);
        }

        .top-nav-link {
            color: var(--phosphor-soft);
            text-decoration: none;
            font-size: clamp(0.66rem, 0.8vw, 0.80rem);
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            opacity: 0.72;
            padding: 8px 0;
            border-bottom: 1px solid transparent;
            transition: color 220ms ease, opacity 220ms ease, border-color 220ms ease;
            white-space: nowrap;
        }

        .top-nav-link:hover,
        .top-nav-link.active {
            color: var(--paper);
            opacity: 1;
            border-color: rgba(182, 74, 53, 0.78);
        }

        .top-nav-link.disabled {
            opacity: 0.28;
            cursor: not-allowed;
            pointer-events: none;
        }

        .lang-switch {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 0.70rem;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--paper-faint);
            white-space: nowrap;
        }

        .lang-switch a {
            color: rgba(140, 255, 176, 0.52);
            text-decoration: none;
            transition: color 220ms ease;
        }

        .lang-switch a:hover,
        .lang-switch a.lang-active { color: var(--paper); }

        .menu-toggle {
            display: none;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 40px;
            border: 1px solid rgba(140, 255, 176, 0.34);
            background: rgba(0, 0, 0, 0.42);
            color: var(--paper);
            font-family: inherit;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }

        .menu-toggle span,
        .menu-toggle::before,
        .menu-toggle::after {
            content: "";
            position: absolute;
            display: block;
            width: 18px;
            height: 1px;
            background: currentColor;
            transition: transform 220ms ease, opacity 220ms ease;
        }

        .menu-toggle span { transform: translateY(0); }
        .menu-toggle::before { transform: translateY(-6px); }
        .menu-toggle::after { transform: translateY(6px); }

        body.menu-open .menu-toggle span { opacity: 0; }
        body.menu-open .menu-toggle::before { transform: rotate(45deg); }
        body.menu-open .menu-toggle::after { transform: rotate(-45deg); }

        /* ── Main interface ── */
        .main-interface {
            position: relative;
            z-index: 10;
            width: min(520px, 90vw);
            margin-left: 8vw;
            margin-right: auto;
            align-self: flex-start;
            margin-top: 30px;
            padding: 28px 26px 24px;
            background: rgba(0, 0, 5, 0.14);
            border-left: 2px solid var(--mavi-3);
            border-top: 1px solid rgba(253, 178, 159, 0.15);
            border-right: 1px solid rgba(253, 178, 159, 0.15);
            border-bottom: 1px solid rgba(253, 178, 159, 0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-shadow: none;
        }

        .corner {
            position: absolute;
            width: 12px; height: 12px;
            border-color: var(--mavi-1);
            border-style: solid;
            pointer-events: none;
        }
        .corner-tl { top: -1px;  left: -2px;  border-width: 2px 0 0 2px; }
        .corner-tr { top: -1px;  right: -1px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: -1px; left: -2px;  border-width: 0 0 2px 2px; }
        .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
        .meta-row {
            display: flex; gap: 16px; flex-wrap: wrap;
            margin: 6px 0 18px;
            font-size: 0.58rem; font-weight: 700;
            letter-spacing: 0.20em;
            color: var(--mavi-3);
            text-transform: uppercase; opacity: 0.90;
        }
        .meta-row span { white-space: nowrap; }
        .sys-label {
            display: block;
            margin-bottom: 6px;
            color: var(--paper-faint);
            font-size: 0.66rem;
            font-weight: 700;
            letter-spacing: 0.34em;
            text-transform: uppercase;
        }

        .sys-label::before {
            content: "";
            display: inline-block;
            width: 28px;
            height: 1px;
            margin-right: 10px;
            vertical-align: middle;
            background: var(--mavi-2);
            opacity: 0.82;
        }

        .sys-title {
            margin: 0 0 22px;
            color: var(--paper);
            font-size: clamp(0.96rem, 1.1vw, 1.18rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-shadow: 0 0 18px rgba(140, 255, 176, 0.18);
            line-height: 1.3;
        }

        /* ── Custom audio player ── */
        .player {
            margin: 0 0 20px;
            padding: 16px 18px;
            background: rgba(0, 0, 5, 0.45);
            border: 1px solid var(--mavi-3);
        }

        .player-track-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 14px;
            gap: 8px;
        }

        .player-track-name {
            color: var(--phosphor);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-time {
            color: var(--paper-faint);
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.10em;
            flex-shrink: 0;
        }

        /* Scrubber */
        .player-scrubber {
            position: relative;
            height: 3px;
            background: rgba(140, 255, 176, 0.14);
            margin-bottom: 16px;
            cursor: pointer;
        }

        .player-scrubber-fill {
            height: 100%;
            width: 0%;
            background: var(--mavi-2);
            pointer-events: none;
            transition: width 0.25s linear;
            box-shadow: 0 0 6px rgba(122, 226, 207, 0.48);
        }

        .player-scrubber-thumb {
            position: absolute;
            top: 50%;
            left: 0%;
            width: 10px;
            height: 10px;
            background: var(--paper);
            border: 1px solid var(--phosphor);
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: left 0.25s linear;
            box-shadow: 0 0 8px rgba(140, 255, 176, 0.42);
        }

        .player-scrubber:hover .player-scrubber-fill {
            box-shadow: 0 0 10px rgba(140, 255, 176, 0.72);
        }

        /* Controls row */
        .player-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .player-btn {
            background: none;
            border: 1px solid var(--mavi-3);
            color: var(--mavi-1);
            font-family: inherit;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            padding: 7px 13px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 200ms ease, color 200ms ease, border-color 200ms ease;
            flex-shrink: 0;
        }

        .player-btn:hover {
            background: rgba(140, 255, 176, 0.12);
            border-color: var(--phosphor);
            color: var(--paper);
        }

        .player-btn.is-playing {
            background: rgba(140, 255, 176, 0.10);
            border-color: rgba(140, 255, 176, 0.52);
            color: var(--phosphor);
        }

        /* Volume */
        .player-volume {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .player-vol-label {
            color: var(--paper-faint);
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .player-vol-track {
            position: relative;
            width: 64px;
            height: 3px;
            background: rgba(140, 255, 176, 0.14);
            cursor: pointer;
            flex-shrink: 0;
        }

        .player-vol-fill {
            height: 100%;
            width: 80%;
            background: rgba(140, 255, 176, 0.52);
            pointer-events: none;
        }

        .player-vol-thumb {
            position: absolute;
            top: 50%;
            left: 80%;
            width: 8px;
            height: 8px;
            background: var(--paper-dim);
            border: 1px solid rgba(140, 255, 176, 0.52);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* ── Lyrics ── */
        .lyrics-container {
            height: 260px;
            overflow: hidden;
            position: relative;
        }

        .lyrics-container::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: linear-gradient(transparent, rgba(3, 5, 4, 0.88));
            pointer-events: none;
            z-index: 1;
        }

        .scroller-engine {
            position: absolute;
            width: 100%;
            transition: transform 0.42s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lyrics-block {
            margin-bottom: 20px;
            opacity: 0.28;
            font-size: 0.92rem;
            line-height: 1.6;
            color: var(--paper-dim);
            transition: opacity 300ms ease, color 300ms ease, text-shadow 300ms ease;
        }

        .lyrics-block.active {
            opacity: 1;
            color: var(--mavi-1);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(253, 178, 159, 0.38);
        }

        /* ── Mobile ── */
        @media (min-width: 761px) {
            .menu-toggle { display: none; }
        }

        @media (max-width: 760px) {
            html, body {
                height: auto;
                min-height: 100svh;
                overflow-x: hidden;
                overflow-y: auto;
                display: block;
            }

            .site-nav {
                height: 66px;
                padding: 0 18px;
            }

            .nav-brand {
                max-width: calc(100vw - 88px);
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .nav-brand::before { width: 22px; }

            .menu-toggle { display: inline-flex; }

            .nav-links {
                position: fixed;
                z-index: 29;
                top: 66px;
                left: 0; right: 0;
                display: flex;
                flex-direction: column;
                padding: 8px 22px 22px;
                background: rgba(0, 0, 0, 0.92);
                border-bottom: 1px solid rgba(140, 255, 176, 0.18);
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
                transform: translateY(-115%);
                opacity: 0;
                pointer-events: none;
                transition: transform 260ms ease, opacity 220ms ease;
            }

            body.menu-open .nav-links {
                transform: translateY(0);
                opacity: 1;
                pointer-events: auto;
            }

            .top-nav-link {
                display: block;
                padding: 16px 0;
                border-bottom: 1px solid rgba(140, 255, 176, 0.14);
                font-size: 0.86rem;
                letter-spacing: 0.18em;
                opacity: 1;
            }

            .lang-switch {
                padding: 16px 0 4px;
                font-size: 0.80rem;
            }

            .main-interface {
                width: calc(100vw - 36px);
                margin: 86px 18px 44px;
                padding: 22px 18px 20px;
            }

            .lyrics-container { height: min(44svh, 320px); }
        }

        /* ── Animations ── */
        @keyframes bgGlimmer {
            0%   { filter: brightness(0.76) contrast(1.04) saturate(0.88); }
            100% { filter: brightness(0.82) contrast(1.02) saturate(0.96); }
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.7; }
            50%       { opacity: 1; }
        }

        /* ── Mouse tracking layers ── */
        #grain { position: fixed; inset: 0; z-index: 6; pointer-events: none; opacity: 0.38; }
        #fx    { position: fixed; inset: 0; z-index: 7; pointer-events: none; mix-blend-mode: screen; }
        #glow  {
            position: fixed; z-index: 6;
            width: 380px; height: 380px; border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(140,255,176,0.07) 0%, transparent 65%);
            transform: translate(-50%,-50%);
            left: -999px; top: -999px;
            mix-blend-mode: screen;
        }


        /* ── Glitch Song Title ── */
        .song-title {
            font-size: clamp(1.5rem, 5vw, 4rem);
            font-weight: 800;
            letter-spacing: 0.06em;
            line-height: 0.88;
            color: var(--mavi-4);
            position: relative;
            margin: 4px 0 22px;
            opacity: 0;
            animation: titleFadeUp 0.8s 0.4s forwards;
            text-shadow: 0 0 40px rgba(232,216,184,0.12);
            text-transform: uppercase;
        }
        .song-title span { color: var(--mavi-4); }
        .song-title::before {
            content: attr(data-text);
            position: absolute; top: 0; left: 3px;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
            font-family: inherit; font-size: inherit;
            letter-spacing: inherit; line-height: inherit;
            color: #B64A35;
            opacity: 0;
            animation: titleGlitchA 3.5s 1s infinite;
        }
        .song-title::after {
            content: attr(data-text);
            position: absolute; top: 0; left: -3px;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
            font-family: inherit; font-size: inherit;
            letter-spacing: inherit; line-height: inherit;
            color: #8CFFB0;
            opacity: 0;
            animation: titleGlitchB 3.5s 1.5s infinite;
        }
        @keyframes titleFadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes titleGlitchA {
            0%,84%,100% { clip-path: none; transform: translateX(0); opacity: 0; }
            85%  { clip-path: inset(15% 0 70% 0); transform: translateX(-4px); opacity: 0.75; }
            87%  { clip-path: inset(55% 0 10% 0); transform: translateX(4px);  opacity: 0.75; }
            89%  { clip-path: inset(30% 0 45% 0); transform: translateX(-3px); opacity: 0.65; }
            91%  { clip-path: inset(70% 0 5%  0); transform: translateX(3px);  opacity: 0.75; }
            93%  { clip-path: none; transform: translateX(0); opacity: 0; }
        }
        @keyframes titleGlitchB {
            0%,86%,100% { clip-path: none; transform: translateX(0); opacity: 0; }
            87%  { clip-path: inset(60% 0 20% 0); transform: translateX(5px);  opacity: 0.55; }
            89%  { clip-path: inset(10% 0 65% 0); transform: translateX(-4px); opacity: 0.55; }
            91%  { clip-path: inset(40% 0 30% 0); transform: translateX(3px);  opacity: 0.45; }
            93%  { clip-path: none; transform: translateX(0); opacity: 0; }
        }

        @media (max-width: 760px) {
            .bg-image { background-size: cover !important; background-position: center center !important; }
        }

        /* ══════════════════════════════════════
           PREFERS-REDUCED-MOTION
           Kills decorative animation for users
           who have enabled Reduce Motion in
           their OS accessibility settings.
           Typing, page fade and nav still work.
        ══════════════════════════════════════ */
        @media (prefers-reduced-motion: reduce) {

            /* Canvas overlays + effect layers → hidden */
            .scanlines,
            #grain, #fx, #glow,
            #rgbFlash, #proxCanvas { display: none !important; }

            /* Ken Burns / parallax backgrounds → frozen
               !important overrides JS-applied inline transforms */
            .bg-photo, #bg-photo,
            .origin-bg-home,
            .origin-bg-morpheus,
            .origin-bg-oneheus { transform: scale(1.04) !important; transition: none !important; }

            /* All CSS animations + transitions → effectively instant */
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>

        function fmt(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60).toString().padStart(2, '0');
            return `${m}:${sec}`;
        }

        function updateProgress() {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            sFill.style.width = pct + '%';
            sThumb.style.left = pct + '%';
            scrubber.setAttribute('aria-valuenow', Math.round(pct));
            timeEl.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
        }

        function setVolume(pct) {
            pct = Math.max(0, Math.min(1, pct));
            audio.volume = pct;
            vFill.style.width = (pct * 100) + '%';
            vThumb.style.left = (pct * 100) + '%';
            volTrack.setAttribute('aria-valuenow', Math.round(pct * 100));

            playBtn.classList.add('is-playing');
            body.classList.add('track-playing');

            playBtn.textContent = '▶ PLAY';

            body.classList.remove('track-playing');

            if (audio.duration) audio.currentTime = pct * audio.duration;

        function resizeCanvas() {

        const alphabet = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎ1023456789".split("");

        function initDrops() {
            drops = Array(Math.floor(canvas.width / 14)).fill(0).map(() => Math.floor(Math.random() * (canvas.height / 14)));
        }
        initDrops();
        window.addEventListener('resize', initDrops);

        setInterval(() => {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.032)';

            const glow   = document.getElementById('glow');
            let W = 0, H = 0;
            function resizeMouseCanvas() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                if (!w || !h) return;
                W = grainC.width = fxC.width = w;
                H = grainC.height = fxC.height = h;
            }
            if (document.readyState === 'complete') {
                resizeMouseCanvas();
            } else {
                window.addEventListener('load', resizeMouseCanvas);
            }
            window.addEventListener('resize', resizeMouseCanvas);
            let mx = 0, my = 0;
            const trail = [];
            document.addEventListener('mousemove', e => {
                mx = e.clientX; my = e.clientY;
                glow.style.left = mx + 'px';
                glow.style.top  = my + 'px';
                trail.push({ x: mx, y: my, life: 1 });
                if (trail.length > 28) trail.shift();
            });
            let grainTick = 0;
            function drawGrain() {
                if (!W || !H) return;
                const img = grainX.createImageData(W, H);
                const d = img.data;
                for (let i = 0; i < d.length; i += 4) {
                    const v = Math.random() * 255 | 0;
                    if (v > 210) {
                        d[i]   = v * 0.42 | 0;
                        d[i+1] = v;
                        d[i+2] = v * 0.58 | 0;
                        d[i+3] = (v - 210) * 2;
                    }
                }
                grainX.putImageData(img, 0, 0);
            }
            (function mouseLoop() {
                if (++grainTick % 3 === 0) drawGrain();
                fxX.clearRect(0, 0, W, H);
                for (let i = trail.length - 1; i >= 0; i--) {
                    const p = trail[i];
                    p.life -= 0.065;
                    if (p.life <= 0) { trail.splice(i, 1); continue; }
                    const r = p.life * 14;
                    const g = fxX.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
                    g.addColorStop(0, `rgba(140,255,176,${p.life * 0.38})`);
                    g.addColorStop(1, 'rgba(140,255,176,0)');
                    fxX.fillStyle = g;
                    fxX.beginPath();
                    fxX.arc(p.x, p.y, r, 0, Math.PI * 2);
                    fxX.fill();
                }
                requestAnimationFrame(mouseLoop);
            })();
        }

    <script>
    /* ── Ken Burns + Breathe + Parallax / Gyroscope on .bg-image ── */
    (function() {
        const bgImg = document.querySelector('.bg-image');
        if (!bgImg) return;

        const IS_MOB   = window.innerWidth <= 760;
        const KB_PERIOD = IS_MOB ? 13000 : 15000;
        const KB_MAX_X  = IS_MOB ? 7 : 9;
        const KB_MAX_Y  = IS_MOB ? 5  : 7;
        const KB_SCALE  = 1.02;
        const BR_PERIOD = 5000;
        const BR_EXTRA  = 0.03;

        if (!IS_MOB) {
            /* Desktop: KB + Breathe + mouse parallax */
            let mx = window.innerWidth / 2, my = window.innerHeight / 2;
            let px = 0, py = 0;
            document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

            (function animLoop() {
                const W = window.innerWidth, H = window.innerHeight;
                const tx = ((mx / W) - 0.5) * 16;
                const ty = ((my / H) - 0.5) * 16;
                px += (tx - px) * 0.04;
                py += (ty - py) * 0.04;
                const now    = performance.now();
                const kbX    = Math.sin((now / KB_PERIOD) * Math.PI * 2)         * KB_MAX_X;
                const kbY    = Math.sin((now / KB_PERIOD) * Math.PI * 2 * 0.618) * KB_MAX_Y;
                const breath = Math.sin((now / BR_PERIOD) * Math.PI * 2) * 0.5 + 0.5;
                const scale  = (KB_SCALE + breath * BR_EXTRA).toFixed(4);
                bgImg.style.transform = `scale(${scale}) translate(${(kbX - px * 0.5).toFixed(2)}px,${(kbY - py * 0.5).toFixed(2)}px)`;
                requestAnimationFrame(animLoop);
            })();
        } else {
            /* Mobile: KB + Breathe + Gyroscope */
            let gyroX = 0, gyroY = 0, rawGyroX = 0, rawGyroY = 0;

            function onOrientation(e) {
                if (e.gamma === null || e.beta === null) return;
                rawGyroX = (Math.max(-45, Math.min(45, e.gamma)) / 45) * 22;
                rawGyroY = (Math.max(-45, Math.min(45, e.beta - 90)) / 45) * 22;
            }
            function startGyro() {
                if (typeof DeviceOrientationEvent !== 'undefined' &&
                    typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(s => { if (s === 'granted') window.addEventListener('deviceorientation', onOrientation, { passive: true }); })
                        .catch(() => {});
                } else {
                    window.addEventListener('deviceorientation', onOrientation, { passive: true });
                }
            }
            let gyroStarted = false;
            function tryStartGyro() { if (!gyroStarted) { gyroStarted = true; startGyro(); } }
            document.addEventListener('touchstart', tryStartGyro, { once: true, passive: true });
            document.addEventListener('touchend',   tryStartGyro, { once: true, passive: true });
            window.addEventListener('scroll',       tryStartGyro, { once: true, passive: true });

            (function bgAnimate(ts) {
                const kbX    = Math.sin((ts / KB_PERIOD) * Math.PI * 2)         * KB_MAX_X;
                const kbY    = Math.sin((ts / KB_PERIOD) * Math.PI * 2 * 0.618) * KB_MAX_Y;
                const breath = Math.sin((ts / BR_PERIOD) * Math.PI * 2) * 0.5 + 0.5;
                const scale  = (KB_SCALE + breath * BR_EXTRA).toFixed(4);
                gyroX += (rawGyroX - gyroX) * 0.08;
                gyroY += (rawGyroY - gyroY) * 0.08;
                bgImg.style.transform = `scale(${scale}) translate(${(kbX + gyroX).toFixed(2)}px,${(kbY + gyroY).toFixed(2)}px)`;
                requestAnimationFrame(bgAnimate);
            })(0);
        }
    })();
    </script>
