<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0a0e1a;
    --deep: #060910;
    --blood: #c0152a;
    --blood-dim: #6b0b17;
    --teal: #0ecfb0;
    --teal-dim: #085c50;
    --neon: #00ff9d;
    --navy: #0b1d3a;
    --fog: rgba(14,207,176,0.07);
    --text-main: #d4e8e0;
    --text-muted: #5a8070;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--deep);
    color: var(--text-main);
    font-family: 'Share Tech Mono', monospace;
    overflow-x: hidden;
    min-height: 100vh;
    padding-top: 72px;
  }

  .bg-image {
    position: fixed;
    inset: -8%;
    z-index: 0;
    background: url('ahtapot.webp') center center / cover no-repeat;
    filter: brightness(0.72) contrast(1.08) saturate(0.88);
    animation: kenBurns 24s ease-in-out infinite alternate, bgGlitch 12s step-end infinite, bgBreathe 6s ease-in-out infinite;
    transform-origin: center center;
    will-change: transform;
  }

  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      linear-gradient(90deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0.72) 75%, rgba(0,0,0,0.88) 100%),
      radial-gradient(circle at 50% 100%, rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.55) 100%);
  }

  /* colour pulse overlay */
  .bg-color-shift {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    mix-blend-mode: color;
    animation: colorShift 16s ease-in-out infinite;
    opacity: 0.22;
  }

  @keyframes kenBurns {
    0%   { transform: scale(1.00) translate(0%, 0%); }
    25%  { transform: scale(1.05) translate(-1%, 0.5%); }
    50%  { transform: scale(1.08) translate(0.5%, -1%); }
    75%  { transform: scale(1.04) translate(1%, 0.5%); }
    100% { transform: scale(1.00) translate(0%, 0%); }
  }

  @keyframes bgGlitch {
    0%,  88%  { transform: scale(1.04) translate(0, 0); filter: brightness(0.72) contrast(1.08) saturate(0.88); }
    89%        { transform: scale(1.04) translate(-3px, 1px); filter: brightness(0.9) contrast(1.4) saturate(0.5) hue-rotate(15deg); }
    90%        { transform: scale(1.04) translate(3px, -2px); filter: brightness(0.6) contrast(1.6) saturate(1.2) hue-rotate(-10deg); }
    91%        { transform: scale(1.04) translate(-2px, 2px); filter: brightness(0.72) contrast(1.08) saturate(0.88); }
    92%  { transform: scale(1.04) translate(0, 0); filter: brightness(0.72) contrast(1.08) saturate(0.88); }
    96%        { transform: scale(1.04) translate(2px, -1px); filter: brightness(0.85) contrast(1.3) saturate(0.6) hue-rotate(8deg); }
    97%        { transform: scale(1.04) translate(0, 0); filter: brightness(0.72) contrast(1.08) saturate(0.88); }
    100% { transform: scale(1.04) translate(0, 0); filter: brightness(0.72) contrast(1.08) saturate(0.88); }
  }

  @keyframes bgBreathe {
    0%, 100% { filter: brightness(0.72) contrast(1.08) saturate(0.88); }
    50%       { filter: brightness(0.80) contrast(1.12) saturate(0.96); }
  }

  @keyframes colorShift {
    0%   { background: rgba(14, 207, 176, 1); }
    25%  { background: rgba(192, 21, 42, 1);  }
    50%  { background: rgba(14, 207, 176, 1); }
    75%  { background: rgba(80, 0, 20, 1);    }
    100% { background: rgba(14, 207, 176, 1); }
  }

  /* ── CANVAS BACKGROUND ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0.45;
    mix-blend-mode: screen;
  }

  /* ── NAV ── */
  .site-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 72px;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(18px, 5vw, 72px);
    background: rgba(6,9,16,0.85);
    border-bottom: 1px solid rgba(140, 255, 176, 0.10);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .nav-brand {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    color: rgba(232, 216, 184, 0.64);
    text-decoration: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.8rem, 1vw, 1rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .nav-brand::before {
    content: "";
    flex-shrink: 0;
    width: 36px;
    height: 1px;
    background: #B64A35;
    opacity: 0.82;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: clamp(14px, 2vw, 32px);
  }

  .top-nav-link {
    color: rgba(140, 255, 176, 0.78);
    text-decoration: none;
    font-size: clamp(0.62rem, 0.8vw, 0.75rem);
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.72;
    padding: 8px 0;
    border-bottom: 1px solid transparent;
    transition: color 220ms ease, opacity 220ms ease, border-color 220ms ease;
    white-space: nowrap;
  }

  .top-nav-link:hover,
  .top-nav-link.active {
    color: #E8D8B8;
    opacity: 1;
    border-color: #B64A35;
  }

  .top-nav-link.disabled {
    opacity: 0.28;
    cursor: not-allowed;
    pointer-events: none;
  }

  .lang-switch {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 0.70rem;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .lang-switch a {
    color: rgba(140, 255, 176, 0.52);
    text-decoration: none;
    transition: color 220ms ease;
  }

  .lang-switch a:hover,
  .lang-switch a.lang-active { color: #E8D8B8; }

  .menu-toggle {
    display: none;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 40px;
    border: 1px solid rgba(140, 255, 176, 0.34);
    background: rgba(0,0,0,0.42);
    color: #E8D8B8;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }

  .menu-toggle span,
  .menu-toggle::before,
  .menu-toggle::after {
    content: "";
    position: absolute;
    display: block;
    width: 18px;
    height: 1px;
    background: currentColor;
    transition: transform 220ms ease, opacity 220ms ease;
  }

  .menu-toggle span { transform: translateY(0); }
  .menu-toggle::before { transform: translateY(-6px); }
  .menu-toggle::after { transform: translateY(6px); }

  body.menu-open .menu-toggle span { opacity: 0; }
  body.menu-open .menu-toggle::before { transform: rotate(45deg); }
  body.menu-open .menu-toggle::after { transform: rotate(-45deg); }

  @media (min-width: 761px) {
    .menu-toggle { display: none; }
  }

  @media (max-width: 760px) {
    .site-nav { height: 66px; padding: 0 18px; }
    .nav-brand { max-width: calc(100vw - 88px); overflow: hidden; text-overflow: ellipsis; }
    .nav-brand::before { width: 22px; }
    .menu-toggle { display: inline-flex; }
    .nav-links {
      position: fixed;
      z-index: 99;
      top: 66px; left: 0; right: 0;
      flex-direction: column;
      padding: 8px 22px 22px;
      background: rgba(6,9,16,0.96);
      border-bottom: 1px solid rgba(140, 255, 176, 0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transform: translateY(-115%);
      opacity: 0;
      pointer-events: none;
      transition: transform 260ms ease, opacity 220ms ease;
    }
    body.menu-open .nav-links {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .top-nav-link {
      display: block;
      padding: 16px 0;
      border-bottom: 1px solid rgba(140, 255, 176, 0.14);
      font-size: 0.86rem;
      opacity: 1;
    }
    .lang-switch { padding: 16px 0 4px; font-size: 0.80rem; }
  }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    position: relative;
    z-index: 10;
    padding: 0.8rem 2rem 0;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }
  .breadcrumb a { color: var(--text-muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--teal); }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 5;
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 4rem 2rem 2rem;
    text-align: center;
  }

  .hero-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--blood);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.3s forwards;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 12vw, 8rem);
    letter-spacing: 0.06em;
    line-height: 0.9;
    color: var(--text-main);
    text-shadow:
      0 0 40px rgba(14,207,176,0.15),
      0 0 80px rgba(192,21,42,0.1);
    opacity: 0;
    animation: fadeUp 0.8s 0.5s forwards;
  }

  h1 span { color: var(--blood); }

  /* ── PLAYER SECTION ── */
  .player-section {
    position: relative;
    z-index: 10;
    max-width: 680px;
    margin: 2.5rem auto 0;
    padding: 0 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s forwards;
  }

  .player-label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--teal-dim);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    text-align: center;
  }

  .player-box {
    border: 1px solid var(--teal-dim);
    background: rgba(6,9,16,0.85);
    backdrop-filter: blur(8px);
    padding: 1.2rem 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .player-box::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(14,207,176,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  /* corner accents */
  .player-box::after {
    content: '';
    position: absolute;
    top: -1px; right: -1px;
    width: 20px; height: 20px;
    border-top: 2px solid var(--blood);
    border-right: 2px solid var(--blood);
    pointer-events: none;
  }

  .player-title-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1rem;
  }

  .player-artist {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--teal);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .player-time-in-title {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    font-family: 'Share Tech Mono', monospace;
  }

  .player-scrubber {
    position: relative;
    height: 3px;
    background: rgba(14,207,176,0.15);
    margin: 12px 0 14px;
    cursor: pointer;
  }
  .player-scrubber-fill {
    height: 100%; width: 0%;
    background: var(--teal);
    pointer-events: none;
    transition: width 0.25s linear;
  }
  .player-scrubber-thumb {
    position: absolute;
    top: 50%; left: 0%;
    width: 10px; height: 10px;
    background: #d4e8e0;
    border: 1px solid var(--teal);
    transform: translate(-50%,-50%);
    pointer-events: none;
    transition: left 0.25s linear;
  }
  .player-controls { display: flex; align-items: center; gap: 12px; }
  .player-controls .player-vol { margin-left: auto; }
  .player-btn {
    background: none;
    border: 1px solid var(--teal-dim);
    color: var(--teal);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    padding: 6px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .player-btn:hover { background: rgba(14,207,176,0.1); border-color: var(--teal); color: #fff; }
  .player-btn.is-playing { background: rgba(14,207,176,0.08); border-color: var(--teal); color: var(--teal); }
  .player-vol { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
  .vol-label { font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.14em; text-transform: uppercase; }
  .vol-track { position: relative; width: 58px; height: 3px; background: rgba(14,207,176,0.15); cursor: pointer; }
  .vol-fill { height: 100%; width: 80%; background: rgba(14,207,176,0.5); pointer-events: none; }
  .vol-thumb {
    position: absolute; top: 50%; left: 80%;
    width: 8px; height: 8px;
    background: var(--text-muted);
    border: 1px solid rgba(14,207,176,0.5);
    transform: translate(-50%,-50%);
    pointer-events: none;
  }

  /* ── SYNCED LYRICS ── */
  .lyrics-section {
    position: relative;
    z-index: 10;
    max-width: 680px;
    margin: 2rem auto 5rem;
    padding: 0 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
  }
  .lyrics-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
  .lyrics-label { font-size: 0.65rem; letter-spacing: 0.25em; color: var(--teal-dim); text-transform: uppercase; flex-shrink: 0; }
  .lyrics-divider { flex: 1; height: 1px; background: linear-gradient(to right, var(--teal-dim), transparent); }
  .lyrics-container { height: 280px; overflow: hidden; position: relative; }
  .lyrics-container::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(transparent, rgba(6,9,16,0.95));
    pointer-events: none;
    z-index: 1;
  }
  .scroller-engine {
    position: absolute;
    width: 100%;
    transition: transform 0.42s cubic-bezier(0.16,1,0.3,1);
  }
  .lyric-block {
    margin-bottom: 14px;
    opacity: 0.28;
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    line-height: 1.65;
    color: #d4e8e0;
    transition: opacity 0.3s, color 0.3s, text-shadow 0.3s;
  }
  .lyric-block.active {
    opacity: 1;
    color: var(--teal);
    font-weight: 600;
    text-shadow: 0 0 12px rgba(14,207,176,0.35);
  }

  /* ── HORON SVG FIGURE (foreground) ── */

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes tentacleWave {
    0%   { d: path("M0,0 C30,-20 60,20 90,0 C120,-20 150,10 180,0"); }
    50%  { d: path("M0,0 C30,20 60,-20 90,0 C120,20 150,-10 180,0"); }
    100% { d: path("M0,0 C30,-20 60,20 90,0 C120,-20 150,10 180,0"); }
  }

    50%       { transform: translateY(-8px) rotate(2deg); }
  }

  @keyframes glitchX {
    0%,100% { clip-path: inset(0 0 95% 0); transform: translateX(0); }
    20%     { clip-path: inset(20% 0 60% 0); transform: translateX(-4px); }
    40%     { clip-path: inset(60% 0 20% 0); transform: translateX(4px); }
    60%     { clip-path: inset(40% 0 40% 0); transform: translateX(-2px); }
    80%     { clip-path: inset(80% 0 5% 0);  transform: translateX(3px); }
  }

  /* glitch overlay on h1 */
  h1::before, h1::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
    line-height: inherit;
    pointer-events: none;
    z-index: 2;
    opacity: 1;
  }
  .hero { position: relative; z-index: 10; }
  h1::before {
    color: var(--blood);
    animation: glitchBefore 5s 2s infinite;
    left: 3px;
  }
  h1::after {
    color: var(--teal);
    animation: glitchAfter 5s 2.5s infinite;
    left: -3px;
  }

  @keyframes glitchBefore {
    0%, 85%, 100% { clip-path: none; transform: translateX(0); opacity: 0; }
    86%  { clip-path: inset(15% 0 70% 0); transform: translateX(-4px); opacity: 0.7; }
    88%  { clip-path: inset(55% 0 10% 0); transform: translateX(4px);  opacity: 0.7; }
    90%  { clip-path: inset(30% 0 45% 0); transform: translateX(-3px); opacity: 0.6; }
    92%  { clip-path: inset(70% 0 5%  0); transform: translateX(3px);  opacity: 0.7; }
    94%  { clip-path: none; transform: translateX(0); opacity: 0; }
  }

  @keyframes glitchAfter {
    0%, 87%, 100% { clip-path: none; transform: translateX(0); opacity: 0; }
    88%  { clip-path: inset(60% 0 20% 0); transform: translateX(5px);  opacity: 0.5; }
    90%  { clip-path: inset(10% 0 65% 0); transform: translateX(-4px); opacity: 0.5; }
    92%  { clip-path: inset(40% 0 30% 0); transform: translateX(3px);  opacity: 0.4; }
    94%  { clip-path: none; transform: translateX(0); opacity: 0; }
  }

  /* ── SCAN LINE OVERLAY ── */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.06) 3px,
      rgba(0,0,0,0.06) 4px
    );
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    nav { padding: 1rem; gap: 0 1rem; font-size: 0.68rem; }
    .player-section, .lyrics-section { padding: 0 1rem; }
    h1 { font-size: clamp(3rem, 16vw, 5rem); }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="bg-image"></div>
<div class="bg-overlay"></div>
<div class="bg-color-shift"></div>
<div class="scanlines"></div>


<!-- NAV -->
<nav class="site-nav" aria-label="Main navigation">
  <a class="nav-brand" href="https://oneheus.com/home-en.html">AKA // TIMARHANE</a>
  <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="songMenu"><span></span></button>
  <div class="nav-links" id="songMenu">
    <a class="top-nav-link" href="https://oneheus.com/home-en.html">Core</a>
    <a class="top-nav-link active" href="https://oneheus.com/frekans-en.html">Frekans_101</a>
    <a class="top-nav-link" href="https://oneheus.com/sentetik.html">Synthetic Memories</a>
    <a class="top-nav-link" href="https://oneheus.com/veri.html">Data Vault</a>
    <a class="top-nav-link disabled" href="https://oneheus.com/senkron.html">Sync: Disconnected</a>
    <div class="lang-switch" aria-label="Language">
      <a href="https://oneheus.com/ahtapot.html">TR</a><span>/</span><a href="https://oneheus.com/ahtapot-en.html" class="lang-active">EN</a>
    </div>
  </div>
</nav>

<div class="breadcrumb"><div class="breadcrumb">
  <a href="https://oneheus.com/frekans-en.html">Frekans_101</a> // Record
</div>

<!-- HERO -->
<div class="hero">
  <p class="hero-eyebrow">— signal recording —</p>
  <h1 data-text="AHTAPOT">AH<span>TA</span>POT</h1>
</div>

<!-- PLAYER -->
<div class="player-section">
  <p class="player-label">// audio recording</p>
  <div class="player-box">
    <div class="player-title-row">
      <span class="player-artist">AKA — AHTAPOT</span>
      <span class="player-time-in-title" id="playerTime">0:00 / 2:11</span>
    </div>
    <div class="player-scrubber" id="scrubber" role="slider" aria-label="Progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
      <div class="player-scrubber-fill" id="scrubberFill"></div>
      <div class="player-scrubber-thumb" id="scrubberThumb"></div>
    </div>
    <div class="player-controls">
      <button class="player-btn" id="playBtn" aria-label="Play">▶ PLAY</button>
      <div class="player-vol">
        <span class="vol-label">VOL</span>
        <div class="vol-track" id="volTrack" role="slider" aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="80" tabindex="0">
          <div class="vol-fill" id="volFill"></div>
          <div class="vol-thumb" id="volThumb"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="cyberPlayer" src="ahtapot.mp3" preload="metadata"></audio>

<!-- LYRICS -->
<div class="lyrics-section">
  <div class="lyrics-header">
    <span class="lyrics-label">// lyrics</span>
    <div class="lyrics-divider"></div>
  </div>
  <div class="lyrics-container">
    <div class="scroller-engine" id="scrollerEngine"></div>
  </div>
</div>

<script>
/* ── LYRICS DATA (estimated — adjust t values after listening) ── */
const lyrics = [
  { t: 2,   text: "Let the kemençe wail!" },
  { t: 5,   text: "The octopus has wrapped its arms around everything." },
  { t: 8,   text: "We owe a horon to those who guard the gates!" },
  { t: 11,  text: "Let's go!" },
  { t: 15,  text: "Hollywood — just another tentacle of the octopus" },
  { t: 19,  text: "Media, finance, academia — all hollow, all a lie" },
  { t: 23,  text: "Every door is locked beneath the mask of quality" },
  { t: 27,  text: "You don't pass without permission in this system's design" },
  { t: 31,  text: "Zombified souls recite the same script every day" },
  { t: 35,  text: "Those they call gatekeepers — they forge our chains" },
  { t: 41,  text: "They said chaos would come — fed us fear to keep us still" },
  { t: 45,  text: "Laid dogma before us in the halls of academia" },
  { t: 49,  text: "What they call standard is nothing but a shackle" },
  { t: 53,  text: "They imprisoned the future inside that narrow closed loop" },
  { t: 59,  text: "Tear down those doors — this is no longer a locked room" },
  { t: 64,  text: "We owe no allegiance to any centralized power" },
  { t: 69,  text: "Is AI an axe — or just a new kind of warden?" },
  { t: 73,  text: "Another lie coiled inside the octopus's arms?" },
  { t: 77,  text: "Let the horon begin — let this architecture of permission shatter" },
  { t: 85,  text: "No diploma? Silence — what does cinema have to do with you?" },
  { t: 89,  text: "No crew? Don't even speak your dreams into the wind" },
  { t: 93,  text: "That's what they said — but AI kicked the door off its hinges" },
  { t: 97,  text: "The whole world shook to the sound of the kemençe" },
  { t: 101, text: "Those symbolic monopolies are trembling now" },
  { t: 105, text: "The age of locked rooms is coming to an end" },
  { t: 112, text: "Discernment is one thing — but holding the door shut is another" },
  { t: 116, text: "Real analysis is open — it doesn't fit behind closed love" },
  { t: 120, text: "History belongs to those who seek truth, not those who win" },
  { t: 124, text: "Those internalized walls — today they will fall" },
  { t: 131, text: "Either AI will break every door one by one" },
  { t: 135, text: "Or the octopus will make AI its newest gate" },
  { t: 140, text: "Silence the gatekeeper inside you" },
  { t: 144, text: "Trust your own mind" },
  { t: 148, text: "The key is in your hands" },
  { t: 152, text: "Leave the locked room behind" },
  { t: 157, text: "Break free!" }
];

/* ── BUILD LYRICS DOM ── */
const sc = document.getElementById('scrollerEngine');
lyrics.forEach(l => {
  const d = document.createElement('div');
  d.className = 'lyric-block';
  d.textContent = l.text;
  d.dataset.time = l.t;
  sc.appendChild(d);
});

/* ── PLAYER LOGIC ── */
const audio    = document.getElementById('cyberPlayer');
const playBtn  = document.getElementById('playBtn');
const timeEl   = document.getElementById('playerTime');
const scrubber = document.getElementById('scrubber');
const sFill    = document.getElementById('scrubberFill');
const sThumb   = document.getElementById('scrubberThumb');
const volTrack = document.getElementById('volTrack');
const vFill    = document.getElementById('volFill');
const vThumb   = document.getElementById('volThumb');

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return m + ':' + sec;
}
function updateProgress() {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  sFill.style.width = pct + '%';
  sThumb.style.left = pct + '%';
  scrubber.setAttribute('aria-valuenow', Math.round(pct));
  timeEl.textContent = fmt(audio.currentTime) + " / 2:11";
}
function setVolume(pct) {
  pct = Math.max(0, Math.min(1, pct));
  audio.volume = pct;
  vFill.style.width = (pct * 100) + '%';
  vThumb.style.left = (pct * 100) + '%';
}
window.addEventListener('keydown', function(e) {
  if (e.code === 'Space') {
    const el = document.activeElement;
    if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) return;
    e.preventDefault();
    audio.paused ? audio.play() : audio.pause();
  }
}, true);
playBtn.addEventListener('click', () => { audio.paused ? audio.play() : audio.pause(); });
audio.addEventListener('play', () => { playBtn.textContent = '⏸ PAUSE'; playBtn.classList.add('is-playing'); });
audio.addEventListener('pause', () => { playBtn.textContent = '▶ PLAY'; playBtn.classList.remove('is-playing'); });
audio.addEventListener('ended', () => { playBtn.textContent = '▶ PLAY'; playBtn.classList.remove('is-playing'); });
audio.addEventListener('timeupdate', updateProgress);
audio.addEventListener('loadedmetadata', updateProgress);

let scrubDown = false;
function seekTo(e) {
  const rect = scrubber.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  if (audio.duration) audio.currentTime = pct * audio.duration;
}
scrubber.addEventListener('mousedown', e => { scrubDown = true; seekTo(e); });
document.addEventListener('mousemove', e => { if (scrubDown) seekTo(e); });
document.addEventListener('mouseup', () => { scrubDown = false; });
scrubber.addEventListener('touchstart', e => { scrubDown = true; seekTo(e.touches[0]); }, { passive: true });
document.addEventListener('touchmove', e => { if (scrubDown) seekTo(e.touches[0]); }, { passive: true });
document.addEventListener('touchend', () => { scrubDown = false; });

let volDown = false;
function seekVol(e) {
  const rect = volTrack.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  setVolume(pct);
}
volTrack.addEventListener('mousedown', e => { volDown = true; seekVol(e); });
document.addEventListener('mousemove', e => { if (volDown) seekVol(e); });
document.addEventListener('mouseup', () => { volDown = false; });
volTrack.addEventListener('touchstart', e => { volDown = true; seekVol(e.touches[0]); }, { passive: true });
document.addEventListener('touchmove', e => { if (volDown) seekVol(e.touches[0]); }, { passive: true });
document.addEventListener('touchend', () => { volDown = false; });
setVolume(0.8);

/* ── LYRICS SYNC ── */
audio.addEventListener('timeupdate', () => {
  let activeIdx = -1;
  for (let i = 0; i < lyrics.length; i++) {
    if (audio.currentTime >= lyrics[i].t) activeIdx = i;
    else break;
  }
  Array.from(sc.children).forEach((el, i) => {
    el.classList.toggle('active', i === activeIdx);
  });
  if (activeIdx >= 0) {
    sc.style.transform = 'translateY(-' + sc.children[activeIdx].offsetTop + 'px)';
  }
});

/* ── TENTACLE BACKGROUND CANVAS ── */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

let W, H, tentacles = [], particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Tentacle {
  constructor(ox, oy, angle, len, color) {
    this.ox = ox; this.oy = oy;
    this.angle = angle; this.len = len;
    this.color = color;
    this.phase = Math.random() * Math.PI * 2;
    this.speed = 0.004 + Math.random() * 0.004;
    this.segments = Math.floor(len / 28);
    this.width = 2.5 + Math.random() * 2;
  }
  draw(t) {
    ctx.beginPath();
    let x = this.ox, y = this.oy;
    ctx.moveTo(x, y);
    const segLen = this.len / this.segments;
    let angle = this.angle;
    for (let i = 0; i < this.segments; i++) {
      const wave = Math.sin(this.phase + t * this.speed + i * 0.5) * (18 + i * 2.5);
      angle += wave * 0.045;
      const nx = x + Math.cos(angle) * segLen;
      const ny = y + Math.sin(angle) * segLen;
      const mx = (x + nx) / 2 + Math.cos(angle + Math.PI/2) * wave * 0.3;
      const my = (y + ny) / 2 + Math.sin(angle + Math.PI/2) * wave * 0.3;
      ctx.quadraticCurveTo(mx, my, nx, ny);
      x = nx; y = ny;
    }
    ctx.strokeStyle = this.color;
    ctx.lineWidth = this.width * (1 - 0.6 * (this.segments / 20));
    ctx.lineCap = 'round';
    ctx.stroke();

    // sucker dots
    x = this.ox; y = this.oy; angle = this.angle;
    for (let i = 0; i < this.segments; i++) {
      const wave = Math.sin(this.phase + t * this.speed + i * 0.5) * (18 + i * 2.5);
      angle += wave * 0.045;
      const nx = x + Math.cos(angle) * segLen;
      const ny = y + Math.sin(angle) * segLen;
      if (i % 2 === 0 && i > 1) {
        ctx.beginPath();
        ctx.arc(nx, ny, 1.8, 0, Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
      x = nx; y = ny;
    }
  }
}

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * (W || 800);
    this.y = Math.random() * (H || 600);
    this.r = 0.5 + Math.random() * 1;
    this.vx = (Math.random() - 0.5) * 0.2;
    this.vy = -0.1 - Math.random() * 0.2;
    this.alpha = 0.2 + Math.random() * 0.4;
    this.color = Math.random() > 0.5 ? '#0ecfb0' : '#c0152a';
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.y < -5) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function initTentacles() {
  tentacles = [];
  const origins = [
    { x: 0,   y: 0,   a: Math.PI * 0.15 },
    { x: W,   y: 0,   a: Math.PI * 0.85 },
    { x: 0,   y: H,   a: -Math.PI * 0.15 },
    { x: W,   y: H,   a: -Math.PI * 0.85 },
    { x: W*0.25, y: 0, a: Math.PI * 0.35 },
    { x: W*0.75, y: 0, a: Math.PI * 0.65 },
    { x: 0,   y: H*0.4, a: 0.2 },
    { x: W,   y: H*0.4, a: Math.PI - 0.2 },
  ];
  origins.forEach((o, i) => {
    const isBlood = i % 3 === 0;
    const isTeal  = i % 3 === 1;
    const color = isBlood ? 'rgba(192,21,42,0.18)' :
                  isTeal  ? 'rgba(14,207,176,0.14)' :
                            'rgba(0,255,157,0.08)';
    tentacles.push(new Tentacle(o.x, o.y, o.a, 350 + Math.random() * 200, color));
  });
  particles = Array.from({length: 60}, () => new Particle());
}
initTentacles();
window.addEventListener('resize', initTentacles);

let rafT = 0;
function frame(ts) {
  rafT = ts;
  ctx.clearRect(0, 0, W, H);

  // deep bg vignette
  const vg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
  vg.addColorStop(0, 'rgba(11,29,58,0.0)');
  vg.addColorStop(1, 'rgba(6,9,16,0.85)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  tentacles.forEach(t => t.draw(ts));
  particles.forEach(p => { p.update(); p.draw(); });

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);



/* ── MOUSE TRAIL ── */
const trailCanvas = document.createElement('canvas');
trailCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;';
document.body.appendChild(trailCanvas);
const tCtx = trailCanvas.getContext('2d');
trailCanvas.width = window.innerWidth;
trailCanvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  trailCanvas.width = window.innerWidth;
  trailCanvas.height = window.innerHeight;
});

const trailParticles = [];
let mouseX = -999, mouseY = -999;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  for (let i = 0; i < 3; i++) {
    trailParticles.push({
      x: mouseX + (Math.random() - 0.5) * 6,
      y: mouseY + (Math.random() - 0.5) * 6,
      r: 1.5 + Math.random() * 2.5,
      alpha: 0.7 + Math.random() * 0.3,
      vx: (Math.random() - 0.5) * 0.8,
      vy: -0.5 - Math.random() * 1.2,
      decay: 0.022 + Math.random() * 0.015,
      color: Math.random() > 0.35 ? '#c0152a' : '#8b0000'
    });
  }
});

function animateTrail() {
  tCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
  for (let i = trailParticles.length - 1; i >= 0; i--) {
    const p = trailParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.alpha -= p.decay;
    p.r *= 0.97;
    if (p.alpha <= 0) { trailParticles.splice(i, 1); continue; }
    tCtx.beginPath();
    tCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    tCtx.fillStyle = p.color;
    tCtx.globalAlpha = p.alpha;
    tCtx.fill();
  }
  tCtx.globalAlpha = 1;
  requestAnimationFrame(animateTrail);
}
animateTrail();


  /* ── Hamburger menu ── */
  (function () {
    const toggle = document.querySelector('.menu-toggle');
    const drawer = document.getElementById('songMenu');
    if (!toggle || !drawer) return;
    toggle.addEventListener('click', () => {
      const open = document.body.classList.toggle('menu-open');
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      toggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
    });
    drawer.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        document.body.classList.remove('menu-open');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.setAttribute('aria-label', 'Open menu');
      });
    });
  })();

</script>
