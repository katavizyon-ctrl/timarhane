<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" type="image/x-icon" href="favicon.ico">
    <title>TIMARHANE // Terminal Boot</title>
    <style>
        :root {
            --void: #050505;
            --text-main: #efe3c9;
            --text-dim: rgba(239,227,201,0.52);
            --phosphor: #8cffb0;
            --warning: #b64a35;
            --blue-dim: #8fdde3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--void);
            font-family: "Courier New", Courier, monospace;
            color: var(--text-main);
            min-height: 100vh;
            padding: clamp(24px, 4vw, 56px);
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            overflow: hidden;
            position: relative;
        }

        /* ── Layers bottom → top ── */

        /* z1: photo bg */
        .bg-photo {
            position: fixed; inset: 0; z-index: 1;
            background: url('landing_bg.png') center/cover no-repeat;
            filter: brightness(0.68) contrast(1.06) saturate(0.92);
            pointer-events: none;
        }

        .bg-photo::after {
            content: '';
            position: absolute; inset: 0;
            background:
                linear-gradient(90deg, rgba(0,0,0,0.76) 0%, rgba(0,0,0,0.38) 34%, rgba(0,0,0,0.06) 58%, rgba(0,0,0,0.28) 100%),
                radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
        }

        /* z2: canvas grain */
        #grain {
            position: fixed; inset: 0; z-index: 2;
            pointer-events: none;
            opacity: 0.55;
        }

        /* z3: scanlines */
        .scanlines {
            position: fixed; inset: 0; z-index: 3;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0,0,0,0.18) 3px,
                rgba(0,0,0,0.18) 4px
            );
            animation: scanScroll 6s linear infinite;
        }

        @keyframes scanScroll {
            from { background-position: 0 0; }
            to   { background-position: 0 80px; }
        }

        /* z4: mouse glow */
        #glow {
            position: fixed; z-index: 4;
            width: 380px; height: 380px;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(140,255,176,0.09) 0%, transparent 65%);
            transform: translate(-50%,-50%);
            transition: left 0.06s, top 0.06s;
            mix-blend-mode: screen;
            left: -999px; top: -999px;
        }

        /* z5: fx canvas (mouse trail) */
        #fx {
            position: fixed; inset: 0; z-index: 5;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* z6: rgb flash */
        #rgbFlash {
            position: fixed; inset: 0; z-index: 6;
            pointer-events: none;
            opacity: 0;
        }

        /* z10: terminal UI */
        .language-switch {
            position: fixed;
            top: clamp(18px,3vw,32px);
            right: clamp(18px,3vw,40px);
            z-index: 10;
            display: flex; gap: 10px; align-items: center;
            font-size: 0.72rem; font-weight: 800;
            letter-spacing: 0.18em; text-transform: uppercase;
        }
        .language-switch a { color: rgba(232,216,184,0.46); text-decoration: none; transition: color 200ms; }
        .language-switch a:hover, .language-switch a.lang-active { color: var(--phosphor); }
        .language-switch span { color: rgba(232,216,184,0.28); }

        .terminal-container {
            position: relative; z-index: 10;
            width: min(760px, 92vw);
            min-height: 280px;
            display: flex; flex-direction: column; gap: 5px;
            padding: clamp(18px, 2.4vw, 30px);
            background: rgba(0,0,0,0.28);
            border-left: 2px solid rgba(140,255,176,0.52);
            box-shadow: 0 24px 90px rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
        }

        /* Glowing left border */
        .terminal-container::before {
            content: '';
            position: absolute;
            left: -2px; top: 0; bottom: 0; width: 2px;
            background: var(--phosphor);
            filter: blur(5px);
            opacity: 0.6;
            animation: borderBreath 2.8s ease-in-out infinite;
        }

        @keyframes borderBreath {
            0%,100% { opacity: 0.3; }
            50%      { opacity: 0.85; }
        }

        .terminal-tag {
            color: var(--text-dim);
            letter-spacing: 0.34em; font-weight: 700;
            font-size: clamp(0.74rem, 0.85vw, 0.9rem);
            margin-bottom: 14px;
        }
        .terminal-tag::before {
            content: '';
            display: inline-block;
            width: 44px; height: 1px;
            margin-right: 18px; vertical-align: middle;
            background: rgba(182,74,53,0.8);
        }

        .log-line {
            display: flex; flex-wrap: wrap; gap: 8px;
            line-height: 1.7;
            font-size: clamp(0.86rem, 0.95vw, 1rem);
            margin-bottom: 2px;
            opacity: 0;
            animation: lineIn 0.28s ease forwards;
        }

        @keyframes lineIn {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .dim   { color: var(--text-dim); }
        .green { color: var(--phosphor); font-weight: 600; text-shadow: 0 0 8px rgba(140,255,176,0.4); }
        .pink  { color: var(--warning);  font-weight: 700; }
        .blue  { color: var(--blue-dim); font-weight: 600; }
        .main  { color: var(--text-main);font-weight: 600; }

        .input-line {
            display: none; align-items: center; flex-wrap: wrap;
            gap: 10px; margin-top: 18px;
            color: var(--phosphor); font-weight: 700;
            font-size: clamp(0.9rem, 1vw, 1.05rem);
        }

        #typedCommand { color: var(--text-main); min-width: 2px; }

        .cursor {
            display: inline-block;
            background: var(--phosphor);
            width: 9px; height: 18px;
            animation: blink 0.8s infinite;
            vertical-align: middle; margin-left: 2px;
            box-shadow: 0 0 6px var(--phosphor);
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .interactive-btn {
            position: relative; overflow: hidden;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(140,255,176,0.64);
            color: var(--phosphor);
            font-family: inherit;
            font-size: clamp(0.82rem, 0.9vw, 0.96rem);
            padding: 10px 22px; cursor: pointer;
            text-transform: uppercase; font-weight: 700;
            letter-spacing: 0.22em;
            opacity: 0; transform: translateY(6px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            margin-left: 8px;
        }

        .interactive-btn.visible {
            opacity: 1; transform: translateY(0);
            animation: btnPulse 2s ease-in-out infinite;
        }

        @keyframes btnPulse {
            0%,100% { box-shadow: 0 0 8px rgba(140,255,176,0.2); }
            50%      { box-shadow: 0 0 22px rgba(140,255,176,0.55), 0 0 45px rgba(140,255,176,0.15); }
        }

        .interactive-btn::after {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(140,255,176,0.18), transparent);
            transition: left 0.38s ease;
        }

        .interactive-btn:hover { background: rgba(140,255,176,0.1); color: #e8ffed; border-color: var(--phosphor); animation: none; box-shadow: 0 0 28px rgba(140,255,176,0.45); }
        .interactive-btn:hover::after { left: 160%; }

        /* Page veil */
        #pageVeil {
            position: fixed; inset: 0; z-index: 99;
            background: #000; opacity: 0; pointer-events: none;
            transition: opacity 500ms ease;
        }
        #pageVeil.fading { opacity: 1; }

        /* CRT shutoff */
        #crtOff {
            position: fixed; inset: 0; z-index: 98;
            background: #fff;
            transform: scaleY(0);
            pointer-events: none;
        }
        #crtOff.go {
            animation: crtShutoff 0.4s cubic-bezier(0.6,0,1,0.8) forwards;
        }
        @keyframes crtShutoff {
            0%  { transform: scaleY(0); opacity:0; }
            20% { transform: scaleY(0.06) scaleX(1); opacity:1; }
            60% { transform: scaleY(0.03) scaleX(1.5); opacity:1; }
            100%{ transform: scaleY(0) scaleX(2); opacity:0; }
        }

        @media (max-width: 760px) {
            body { min-height: 100svh; padding: 18px; overflow-y: auto; align-items: flex-start; }
            .bg-photo { background-position: center top; filter: brightness(0.58) contrast(1.08) saturate(0.88); }
            .terminal-container { width: 100%; margin-top: 12px; padding: 20px; }
            .log-line { display: block; font-size: 0.82rem; line-height: 1.55; overflow-wrap: anywhere; }
            .input-line { flex-direction: column; gap: 8px; }
            .interactive-btn { width: 100%; margin-left: 0; margin-top: 8px; padding: 14px 16px; }
        }
    </style>

<body>
    <div id="pageVeil"></div>
    <div id="crtOff"></div>
    <div id="rgbFlash"></div>
    <div id="glow"></div>

    <div class="bg-photo"></div>
    <canvas id="grain"></canvas>
    <canvas id="fx"></canvas>
    <div class="scanlines"></div>

    <div class="language-switch" aria-label="Language switch">
        <a href="index.html">TR</a>
        <span>/</span>
        <a href="index-en.html" class="lang-active">EN</a>
    </div>

    <div class="terminal-container" id="terminalGrid">
        <div class="terminal-tag">OUT-OF-SYSTEM FREQUENCY // BOOT</div>
    </div>

    <script>
    (function() {
        /* ── Canvas setup ── */
        const grainC = document.getElementById('grain');
        const grainX = grainC.getContext('2d');
        const fxC    = document.getElementById('fx');
        const fxX    = fxC.getContext('2d');
        const glow   = document.getElementById('glow');
        const bgPhoto = document.querySelector('.bg-photo');

        let W = 0, H = 0;
        function resize() {
            W = grainC.width = fxC.width = window.innerWidth;
            H = grainC.height = fxC.height = window.innerHeight;
        }
        window.addEventListener('load', resize);
        window.addEventListener('resize', resize);

        /* ── Mouse tracking ── */
        let mx = -999, my = -999;
        let bx = 0, by = 0; // parallax lerp targets
        const trail = [];

        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            glow.style.left = mx + 'px';
            glow.style.top  = my + 'px';
            trail.push({ x: mx, y: my, life: 1 });
            if (trail.length > 24) trail.shift();
        });

        /* ── Parallax ── */
        let px = 0, py = 0;
        function parallax() {
            const tx = ((mx / W) - 0.5) * 16;
            const ty = ((my / H) - 0.5) * 16;
            px += (tx - px) * 0.05;
            py += (ty - py) * 0.05;
            bgPhoto.style.transform = `scale(1.07) translate(${-px*0.5}px,${-py*0.5}px)`;
            requestAnimationFrame(parallax);
        }
        parallax();

        /* ── Grain: rebuild every 3 frames ── */
        let grainTick = 0;
        function drawGrain() {
            if (W === 0 || H === 0) return;
            const imgd = grainX.createImageData(W, H);
            const d = imgd.data;
            for (let i = 0; i < d.length; i += 4) {
                const v = Math.random() * 255 | 0;
                if (v > 210) { // sparse — only bright pixels
                    d[i]   = v * 0.45 | 0;
                    d[i+1] = v;
                    d[i+2] = v * 0.60 | 0;
                    d[i+3] = (v - 210) * 2;
                }
            }
            grainX.putImageData(imgd, 0, 0);
        }

        /* ── Roll artifact ── */
        let rollCD = 5000 + Math.random() * 8000;
        let lastRoll = 0;
        function maybeRoll(now) {
            if (now - lastRoll < rollCD) return;
            lastRoll = now;
            rollCD = 5000 + Math.random() * 9000;

            // Horizontal displacement glitch — canvas only, no DOM clone
            const snap = grainX.getImageData(0, 0, W, H);
            const sliceY = Math.random() * H | 0;
            const sliceH = 4 + Math.random() * 18 | 0;
            const offset = (Math.random() > 0.5 ? 1 : -1) * (8 + Math.random() * 28 | 0);
            const slice  = fxX.getImageData(0, sliceY, W, sliceH);
            fxX.putImageData(slice, offset, sliceY);
            setTimeout(() => fxX.clearRect(0, sliceY - 2, W + Math.abs(offset) + 2, sliceH + 4), 80);
        }

        /* ── Main loop ── */
        function loop(now) {
            grainTick++;
            if (grainTick % 3 === 0) drawGrain();

            // Mouse trail
            fxX.clearRect(0, 0, W, H);
            for (let i = trail.length - 1; i >= 0; i--) {
                const p = trail[i];
                p.life -= 0.07;
                if (p.life <= 0) { trail.splice(i, 1); continue; }
                const r = p.life * 16;
                const g = fxX.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
                g.addColorStop(0, `rgba(140,255,176,${p.life * 0.4})`);
                g.addColorStop(1, 'rgba(140,255,176,0)');
                fxX.fillStyle = g;
                fxX.beginPath();
                fxX.arc(p.x, p.y, r, 0, Math.PI * 2);
                fxX.fill();
            }

            maybeRoll(now);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);

        /* ── RGB split flash ── */
        function rgbSplit() {
            const el = document.getElementById('rgbFlash');
            const frames = [
                [0,   'rgba(182,74,53,0.28)',  '-5px,0'],
                [40,  'rgba(143,221,227,0.22)', '5px,0'],
                [80,  'rgba(182,74,53,0.20)',  '-3px,0'],
                [120, 'rgba(143,221,227,0.16)', '3px,0'],
                [160, 'rgba(182,74,53,0.10)',  '-2px,0'],
                [200, 'rgba(143,221,227,0.08)', '2px,0'],
                [260, null, null]
            ];
            frames.forEach(([delay, bg, xy]) => {
                setTimeout(() => {
                    if (bg) {
                        el.style.opacity   = '1';
                        el.style.background = bg;
                        el.style.transform  = `translate(${xy})`;
                        el.style.mixBlendMode = 'screen';
                    } else {
                        el.style.opacity = '0';
                        el.style.transform = 'translate(0,0)';
                    }
                }, delay);
            });
        }

        /* ── Terminal boot ── */
        const grid = document.getElementById('terminalGrid');
        const GLITCH = '▓░▒█▄▀┼╬╪╫│─<>!?@#';

        const SEQ = [
            { t: 'dim',  s: 'Receiving low-level signal from the dark field...' },
            { t: 'green',s: '✔ FREQUENCY_101: AWAKE' },
            { t: 'green',s: '✔ VOID_RECORD: OPENED' },
            { t: 'blue', s: 'ℹ SYNTHETIC MEMORIES: FRAGMENTED BUT ACCESSIBLE' },
            { t: 'main', s: '>> OUT-OF-SYSTEM FREQUENCY DETECTED // 99.6 MHz' },
            { t: 'main', s: '>> REALITY SUSPENDED // DRIFTING AWAY FROM THE CENTER' },
            { t: 'pink', s: '>> WARNING: EXTERNAL LINK CANNOT BE TRACED // INSIDE IS SAFER' },
            { t: 'dim',  s: 'Loading emotional processing layer...' },
            { t: 'bar',  s: '' },
            { t: 'green',s: '✔ TIMARHANE_OS: VOID ENTRY READY.' }
        ];

        let idx = 0;

        function scramble(span, text, frames) {
            let f = 0;
            (function tick() {
                if (f++ < frames) {
                    const done = Math.floor(text.length * f / frames);
                    let out = text.slice(0, done);
                    for (let i = done; i < text.length; i++)
                        out += Math.random() > 0.4 ? GLITCH[Math.random() * GLITCH.length | 0] : text[i];
                    span.textContent = out;
                    setTimeout(tick, 24);
                } else {
                    span.textContent = text;
                }
            })();
        }

        function next() {
            if (idx >= SEQ.length) { prompt(); return; }
            const d = SEQ[idx++];

            if (d.t === 'bar') { bar(); return; }

            const row = document.createElement('div');
            row.className = 'log-line';
            const pfx = { pink:'[WARNING]', green:'[OK]', blue:'[ARCHIVE]' }[d.t] || 'IST@void:~#';
            const cls = { pink:'pink', green:'green', blue:'blue' }[d.t] || 'dim';
            row.innerHTML = `<span class="${cls}">${pfx}</span> `;
            const span = document.createElement('span');
            span.className = d.t;
            row.appendChild(span);
            grid.appendChild(row);

            scramble(span, d.s, d.t === 'pink' ? 14 : d.t === 'green' ? 9 : 5);

            if (d.t === 'pink') setTimeout(rgbSplit, 100);

            setTimeout(next, d.t === 'pink' ? 700 : Math.random() * 200 + 90);
        }

        function bar() {
            const row = document.createElement('div');
            row.className = 'log-line';
            row.innerHTML = '<span class="dim">IST@void:~#</span> <span class="dim">[THRESHOLD] </span><span id="pb" class="blue"></span>';
            grid.appendChild(row);
            const pb = document.getElementById('pb');
            let cur = 0; const max = 28;
            (function tick() {
                pb.textContent = `[${'█'.repeat(cur)}${'░'.repeat(max-cur)}] ${Math.floor(cur/max*100)}%`;
                if (++cur <= max) setTimeout(tick, 40);
                else { idx++; next(); }  // skip bar entry, already consumed
            })();
        }

        function prompt() {
            const row = document.createElement('div');
            row.className = 'input-line';
            row.style.display = 'flex';
            row.innerHTML = `<span>TIMARHANE@OS:~#</span> <span id="cmd"></span><span class="cursor"></span> <button class="interactive-btn" id="execBtn">[ OPEN FREQUENCY ]</button>`;
            grid.appendChild(row);
            document.getElementById('execBtn').addEventListener('click', launch);

            const cmdEl = document.getElementById('cmd');
            const txt = 'execute --enter-the-void';
            let ci = 0;
            (function type() {
                if (ci < txt.length) { cmdEl.textContent += txt[ci++]; setTimeout(type, 55); }
                else document.getElementById('execBtn').classList.add('visible');
            })();
        }

        function launch() {
            const btn = document.getElementById('execBtn');
            btn.style.animation = 'none';
            btn.textContent = '[ OPENING... ]';
            btn.style.color = 'var(--blue-dim)';
            btn.style.borderColor = 'var(--blue-dim)';
            btn.style.opacity = '1';

            document.getElementById('crtOff').classList.add('go');

            setTimeout(() => {
                document.getElementById('pageVeil').classList.add('fading');
            }, 280);

            setTimeout(() => { window.location.href = 'home-en.html'; }, 650);
        }

        setTimeout(next, 600);
    })();
    </script>
</body>
