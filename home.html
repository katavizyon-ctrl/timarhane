<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMARHANE // CORE</title>
    <style>
        :root {
            --void: #050505;
            --phosphor: #8CFFB0;
            --phosphor-soft: rgba(140,255,176,0.72);
            --phosphor-dim: rgba(140,255,176,0.28);
            --paper: #E8D8B8;
            --paper-dim: rgba(232,216,184,0.62);
            --red-memory: #B64A35;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* ══════════════════════════════════════
           BASE — shared by both breakpoints
        ══════════════════════════════════════ */

        html, body { width: 100%; background: var(--void); font-family: "Courier New", Courier, monospace; }
        body { color: var(--phosphor-soft); }

        /* Page veil — starts opaque, JS fades it out */
        #pageVeil {
            position: fixed; inset: 0; z-index: 200;
            background: #000;
            opacity: 1;
            transition: opacity 0.7s ease;
            pointer-events: none;
        }

        /* Scanlines — always on */
        .scanlines {
            position: fixed; inset: 0; z-index: 3; pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px, transparent 3px,
                rgba(0,0,0,0.13) 3px, rgba(0,0,0,0.13) 4px
            );
            animation: scanScroll 7s linear infinite;
        }
        @keyframes scanScroll { to { background-position: 0 80px; } }

        /* Vignette — always on */
        .vignette {
            position: fixed; inset: -5%; z-index: 4; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 44%, rgba(0,0,0,0.60) 72%, rgba(0,0,0,0.92) 100%);
        }

        /* ══════════════════════════════════════
           DESKTOP (> 760px)
        ══════════════════════════════════════ */

        @media (min-width: 761px) {

            html, body { height: 100%; overflow: hidden; }

            /* hide mobile chrome */
            .mobile-topbar, .mobile-drawer { display: none; }
            .mobile-img-spacer { display: none; }
            #mobile-bg { display: none; }

            /* photo bg */
            #bg-photo {
                position: fixed; inset: 0; z-index: 1;
                background: url('home.png') center/cover no-repeat;
                filter: brightness(0.78) contrast(1.04) saturate(0.92);
                pointer-events: none;
                will-change: transform;
                transform: scale(1.08);
            }

            #bg-photo::after {
                content: '';
                position: absolute; inset: 0;
                background:
                    linear-gradient(90deg, rgba(0,0,0,0.84) 0%, rgba(0,0,0,0.46) 26%, rgba(0,0,0,0.04) 50%, rgba(0,0,0,0.36) 72%, rgba(0,0,0,0.84) 100%),
                    radial-gradient(circle at 52% 48%, rgba(182,74,53,0.08) 0%, transparent 38%);
            }

            /* canvas layers */
            #grain { position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.45; }
            #fx    { position: fixed; inset: 0; z-index: 6; pointer-events: none; mix-blend-mode: screen; }
            #proxCanvas { position: fixed; inset: 0; z-index: 7; pointer-events: none; mix-blend-mode: screen; }

            #glow {
                position: fixed; z-index: 5;
                width: 420px; height: 420px; border-radius: 50%;
                pointer-events: none;
                background: radial-gradient(circle, rgba(140,255,176,0.07) 0%, transparent 65%);
                transform: translate(-50%,-50%);
                left: -999px; top: -999px;
                mix-blend-mode: screen;
            }

            /* stage */
            #home-stage {
                position: relative; z-index: 10;
                width: 100vw; height: 100vh; min-height: 620px;
                overflow: hidden;
            }

            /* signal marker */
            .signal-marker {
                position: absolute; z-index: 11;
                top: clamp(28px,5vh,56px); left: clamp(28px,5vw,72px);
                color: var(--paper-dim);
                font-size: clamp(0.68rem,1vw,0.82rem);
                letter-spacing: 0.28em; text-transform: uppercase;
                opacity: 0; transition: opacity 0.8s ease;
            }
            .signal-marker::before {
                content: '';
                display: inline-block; width: 34px; height: 1px;
                margin-right: 14px; vertical-align: middle;
                background: var(--red-memory); opacity: 0.68;
            }

            /* language switch */
            .language-switch {
                position: absolute; z-index: 11;
                top: clamp(28px,5vh,56px); right: clamp(28px,5vw,72px);
                display: flex; gap: 10px; align-items: center;
                font-size: clamp(0.68rem,1vw,0.82rem);
                font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase;
            }
            .language-switch a { color: rgba(232,216,184,0.48); text-decoration: none; transition: color 200ms; }
            .language-switch a:hover, .language-switch a.lang-active { color: var(--phosphor); }
            .language-switch span { color: rgba(232,216,184,0.28); }

            /* manifesto */
            .manifesto-panel {
                position: absolute; z-index: 11;
                left: clamp(28px,5vw,72px); top: 52%; 
                width: min(420px,31vw);
                padding: 24px 26px 22px;
                color: var(--phosphor-soft);
                background: linear-gradient(135deg, rgba(0,0,0,0.58), rgba(0,0,0,0.24));
                border-left: 1px solid var(--phosphor-dim);
                backdrop-filter: blur(2.5px);
                opacity: 0;
                transform: translateY(-50%) translateX(-14px);
                transition: opacity 0.7s ease, transform 0.7s ease;
            }
            .manifesto-panel.visible {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
            .manifesto-panel::before {
                content: "MANİFESTO / BOŞLUK KAYDI";
                display: block; margin-bottom: 18px;
                color: var(--paper-dim);
                font-size: 0.78rem; font-weight: 700;
                letter-spacing: 0.32em; text-transform: uppercase;
            }
            .manifesto-panel p {
                margin: 0 0 1.1rem;
                font-size: clamp(1rem,1.05vw,1.18rem);
                font-weight: 600; line-height: 1.85;
                min-height: 1.85em;
            }
            .manifesto-panel p:last-child { margin-bottom: 0; color: var(--paper); }

            /* nav box */
            .nav-box {
                position: absolute; z-index: 11;
                top: clamp(150px,28vh,250px); right: clamp(28px,5vw,74px);
                width: min(370px,27vw);
                display: flex; flex-direction: column; gap: 18px;
                text-align: right;
            }

            .nav-link {
                position: relative; display: block;
                padding: 18px 28px;
                color: var(--phosphor-soft);
                border: 1px solid var(--phosphor-dim);
                background: linear-gradient(90deg, rgba(0,0,0,0.10), rgba(3,6,5,0.46));
                backdrop-filter: blur(3px);
                cursor: pointer; text-decoration: none;
                font-size: clamp(0.82rem,0.9vw,1rem);
                font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase;
                opacity: 0; transform: translateX(24px);
                transition: opacity 0.5s ease, transform 0.5s ease,
                            color 260ms, border-color 260ms, background 260ms, box-shadow 260ms;
            }
            .nav-link.visible { opacity: 0.78; transform: translateX(0); }
            .nav-link::before {
                content: attr(data-index);
                position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
                color: var(--paper-dim); font-size: 0.70rem; font-weight: 700;
                letter-spacing: 0.12em; opacity: 0.42;
            }
            .nav-link::after {
                content: ''; position: absolute; right: 0; top: 0;
                width: 3px; height: 100%;
                background: var(--red-memory); opacity: 0; transition: opacity 260ms;
            }
            .nav-link:hover, .nav-link:focus-visible {
                color: var(--paper); border-color: rgba(232,216,184,0.64);
                background: linear-gradient(90deg, rgba(0,0,0,0.16), rgba(5,8,6,0.64));
                opacity: 1; transform: translateX(-6px); outline: none;
                box-shadow: -4px 0 18px rgba(140,255,176,0.10);
            }
            .nav-link:hover::after, .nav-link:focus-visible::after { opacity: 0.82; }
            .nav-link.is-offline { color: rgba(140,255,176,0.36); border-color: rgba(140,255,176,0.14); pointer-events: none; }

            .archive-caption {
                color: rgba(232,216,184,0.36); font-size: 0.68rem; font-weight: 600;
                letter-spacing: 0.18em; text-transform: uppercase;
                opacity: 0; transition: opacity 0.6s ease;
            }
            .archive-caption.visible { opacity: 1; }
        }

        /* ══════════════════════════════════════
           MOBILE (≤ 760px)
        ══════════════════════════════════════ */

        @media (max-width: 760px) {

            html, body { height: auto; overflow-x: hidden; overflow-y: auto; }

            /* hide desktop-only elements */
            #bg-photo, #grain, #fx, #proxCanvas, #glow { display: none; }
            .nav-box, .language-switch { display: none; }

            /* ── Topbar ── */
            .mobile-topbar {
                position: fixed; z-index: 100;
                top: 0; left: 0; right: 0; height: 58px;
                display: flex; align-items: center; justify-content: space-between;
                padding: 0 18px;
                background: rgba(0,0,0,0.88);
                border-bottom: 1px solid rgba(140,255,176,0.16);
                backdrop-filter: blur(12px);
            }
            .mobile-brand {
                color: var(--paper-dim); text-decoration: none;
                font-size: 0.68rem; font-weight: 800;
                letter-spacing: 0.20em; text-transform: uppercase;
            }
            .mobile-menu-toggle {
                display: flex; align-items: center; justify-content: center;
                width: 44px; height: 40px;
                border: 1px solid rgba(140,255,176,0.32);
                background: rgba(0,0,0,0.4); cursor: pointer;
                position: relative;
            }
            .mobile-menu-toggle span,
            .mobile-menu-toggle::before,
            .mobile-menu-toggle::after {
                content: ''; position: absolute; display: block;
                width: 18px; height: 1px; background: var(--paper-dim);
                transition: transform 220ms, opacity 220ms;
            }
            .mobile-menu-toggle span    { transform: translateY(0); }
            .mobile-menu-toggle::before { transform: translateY(-6px); }
            .mobile-menu-toggle::after  { transform: translateY(6px); }
            body.menu-open .mobile-menu-toggle span     { opacity: 0; }
            body.menu-open .mobile-menu-toggle::before  { transform: rotate(45deg); }
            body.menu-open .mobile-menu-toggle::after   { transform: rotate(-45deg); }

            /* slide-down drawer */
            .mobile-drawer {
                position: fixed; z-index: 95;
                top: 58px; left: 0; right: 0;
                display: flex; flex-direction: column;
                padding: 8px 22px 20px;
                background: rgba(0,0,0,0.96);
                border-bottom: 1px solid rgba(140,255,176,0.14);
                backdrop-filter: blur(16px);
                transform: translateY(-110%); opacity: 0;
                pointer-events: none;
                transition: transform 240ms ease, opacity 200ms ease;
            }
            body.menu-open .mobile-drawer { transform: translateY(0); opacity: 1; pointer-events: auto; }
            .mobile-drawer a {
                color: var(--phosphor-soft); text-decoration: none;
                font-size: 0.88rem; font-weight: 800;
                letter-spacing: 0.22em; text-transform: uppercase;
                padding: 16px 0;
                border-bottom: 1px solid rgba(140,255,176,0.10);
                display: block;
            }
            .mobile-drawer a.is-offline { color: rgba(140,255,176,0.28); pointer-events: none; }

            /* ── Stage: just a scrollable container, bg is transparent ── */
            #home-stage {
                position: relative; z-index: 10;
                display: block; width: 100%;
                min-height: 100svh;
                background: transparent;
            }

            /* ── Mobile bg: absolute, sized to image natural ratio (16:9 → 56.25vw tall) ── */
            #mobile-bg {
                position: absolute;
                top: 58px; left: 0; right: 0;
                /* 16:9 image: height = width * 9/16 = 56.25vw */
                height: 61vw;
                z-index: 1;
                overflow: hidden;
                will-change: transform;
            }

            #mobile-bg img {
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                object-fit: cover;
                object-position: center 25%;
                display: block;
                will-change: transform;
                /* JS drives the transform for iOS-safe animation */
            }

            /* gradient overlay on image */
            #mobile-bg::after {
                content: '';
                position: absolute; inset: 0; z-index: 2;
                background: linear-gradient(
                    180deg,
                    rgba(0,0,0,0.10) 0%,
                    rgba(0,0,0,0.02) 35%,
                    rgba(0,0,0,0.60) 72%,
                    rgba(0,0,0,0.97) 100%
                );
            }

            /* signal marker: top-left, just below topbar */
            .signal-marker {
                position: fixed;
                top: 68px;
                left: 22px; right: auto;
                z-index: 12;
                color: var(--paper-dim);
                font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
                opacity: 0;
                transition: opacity 0.8s ease;
            }
            .signal-marker::before {
                content: '';
                display: inline-block; width: 22px; height: 1px;
                margin-right: 10px; vertical-align: middle;
                background: var(--red-memory); opacity: 0.7;
            }

            /* spacer: pushes manifesto below the image */
            .mobile-img-spacer {
                display: block;
                /* topbar(58) + image(56.25vw) + small gap(16px) */
                height: calc(58px + 61vw + 16px);
            }

            /* manifesto panel — draggable bottom sheet */
            .manifesto-panel {
                position: fixed;
                left: 0; right: 0;
                bottom: 0;
                z-index: 20;
                padding: 18px 22px 32px;
                color: var(--phosphor-soft);
                background: rgba(3,5,4,0.42);
                border-top: 1px solid rgba(140,255,176,0.32);
                border-left: none;
                backdrop-filter: blur(10px);
                max-height: 72svh;
                overflow-y: auto;
                opacity: 0;
                transform: translateY(60%);
                transition: opacity 0.8s ease, transform 0.8s ease;
                touch-action: none;
            }
            /* drag handle */
            .manifesto-panel::after {
                content: '';
                position: absolute;
                top: 10px; left: 50%;
                transform: translateX(-50%);
                width: 36px; height: 3px;
                background: rgba(140,255,176,0.38);
                border-radius: 2px;
            }
            .manifesto-panel.visible { opacity: 1; transform: translateY(60%); }
            .manifesto-panel.open    { transform: translateY(0) !important; }
            .manifesto-panel::before {
                content: "MANİFESTO / BOŞLUK KAYDI";
                display: block; margin-bottom: 16px;
                color: var(--paper-dim);
                font-size: 0.64rem; font-weight: 700;
                letter-spacing: 0.28em; text-transform: uppercase;
            }
            .manifesto-panel p {
                margin: 0 0 1rem;
                font-size: 0.96rem; font-weight: 600;
                line-height: 1.78; min-height: 1.4em;
            }
            .manifesto-panel p:last-child { margin-bottom: 0; color: var(--paper); }
        }
    </style>
</head>
<body>

    <div id="pageVeil"></div>

    <!-- Mobile chrome -->
    <header class="mobile-topbar">
        <a class="mobile-brand" href="home.html">TIMARHANE // CORE</a>
        <button class="mobile-menu-toggle" id="menuToggle" type="button" aria-label="Menüyü aç" aria-expanded="false"><span></span></button>
    </header>

    <nav class="mobile-drawer" id="mobileMenu">
        <a href="home.html">Core</a>
        <a href="frekans.html">Frekans_101</a>
        <a href="#">Sentetik Anılar</a>
        <a href="#">Veri Mahzeni</a>
        <a href="#" class="is-offline">Senkron: Kopuk</a>
        <a href="home-en.html">EN</a>
    </nav>

    <!-- Desktop canvas layers -->
    <div id="bg-photo"></div>
    <canvas id="grain"></canvas>
    <canvas id="fx"></canvas>
    <canvas id="proxCanvas"></canvas>
    <div id="glow"></div>

    <!-- Always-on layers -->
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <!-- Mobile image layer — fixed, independent of scroll -->
    <div id="mobile-bg"><img src="home.png" alt=""></div>

    <!-- Main content -->
    <main id="home-stage">
        <div class="signal-marker" id="sigMarker">Sistem Dışı Frekans // 01</div>
        <div class="language-switch">
            <a href="home.html" class="lang-active">TR</a><span>/</span><a href="home-en.html">EN</a>
        </div>
        <div class="mobile-img-spacer"></div>
        <section class="manifesto-panel" id="manifesto">
            <p id="mp1"></p>
            <p id="mp2"></p>
            <p id="mp3"></p>
        </section>
        <nav class="nav-box">
            <a href="frekans.html" class="nav-link" data-index="01">Frekans_101</a>
            <a href="#" class="nav-link" data-index="02">Sentetik Anılar</a>
            <a href="#" class="nav-link" data-index="03">Veri Mahzeni</a>
            <a href="#" class="nav-link is-offline" data-index="--">Senkron: Kopuk</a>
            <div class="archive-caption" id="archCaption">Arşiv katmanı pasif / dış bağlantı izlenemiyor</div>
        </nav>
    </main>

    <script>
    (function() {

        const IS_MOBILE = window.innerWidth <= 760;
        const GLITCH    = '▓░▒█▄▀┼╬│─<>!?@#';
        const MANIFESTO = [
            'Sistem dışı frekans. Gerçeklik askıya alındı. Burası, sistemin hatasından doğan bir boşluk.',
            'Burada veriler değil, hisler işleniyor. Rehabilitasyon, merkezden uzaklaştıkça başlar.',
            'Hoş geldin; içerisi, dışarıdan daha güvenli.'
        ];

        /* ── type text with glitch scramble ── */
        function typeText(el, text, speed, cb) {
            let i = 0;
            (function tick() {
                if (i <= text.length) {
                    let out = text.slice(0, i);
                    if (i < text.length) {
                        const ahead = Math.min(3, text.length - i);
                        for (let j = 0; j < ahead; j++)
                            out += GLITCH[Math.random() * GLITCH.length | 0];
                    }
                    el.textContent = out;
                    i++;
                    setTimeout(tick, speed + Math.random() * 10);
                } else {
                    el.textContent = text;
                    if (cb) cb();
                }
            })();
        }

        /* ── reveal sequence + mobile drift animation ── */
        function runReveal() {
            document.getElementById('pageVeil').style.opacity = '0';

            setTimeout(() => {
                document.getElementById('sigMarker').style.opacity = '1';
            }, 200);

            setTimeout(() => {
                const panel = document.getElementById('manifesto');
                panel.classList.add('visible');
                setTimeout(() => typeText(document.getElementById('mp1'), MANIFESTO[0], 22, () => {
                    setTimeout(() => typeText(document.getElementById('mp2'), MANIFESTO[1], 20, () => {
                        setTimeout(() => typeText(document.getElementById('mp3'), MANIFESTO[2], 22, null), 160);
                    }), 160);
                }), 400);
            }, 450);

            if (!IS_MOBILE) {
                document.querySelectorAll('.nav-link').forEach((link, i) => {
                    setTimeout(() => link.classList.add('visible'), 650 + i * 150);
                });
                setTimeout(() => {
                    const cap = document.getElementById('archCaption');
                    if (cap) cap.classList.add('visible');
                }, 1300);
            }
        }

        /* ── Mobile image drift — JS RAF, works on iOS ── */
        if (IS_MOBILE) {
            const bgImg = document.querySelector('#mobile-bg img');
            if (bgImg) {
                const PERIOD  = 18000; // ms for one full cycle
                const MAX_X   = 8;     // px horizontal travel
                const MAX_Y   = 6;     // px vertical travel
                const SCALE   = 1.08;  // keep edges hidden during movement

                function driftLoop(ts) {
                    const t  = ts / PERIOD;
                    const x  = Math.sin(t * Math.PI * 2)         * MAX_X;
                    const y  = Math.sin(t * Math.PI * 2 * 0.618) * MAX_Y; // golden ratio offset
                    bgImg.style.transform = `scale(${SCALE}) translate(${x}px, ${y}px)`;
                    requestAnimationFrame(driftLoop);
                }
                requestAnimationFrame(driftLoop);
            }
        }

        // Run reveal after a short paint delay
        setTimeout(runReveal, 100);

        /* ── Draggable manifesto panel (mobile) ── */
        if (IS_MOBILE) {
            const panel = document.getElementById('manifesto');
            let startY = 0, startTranslate = 60, currentTranslate = 60;
            const MIN_TRANSLATE = 0;    // fully open
            const MAX_TRANSLATE = 75;   // mostly hidden

            function getTranslateY() {
                const style = window.getComputedStyle(panel);
                const matrix = new DOMMatrix(style.transform);
                const pct = (matrix.m42 / window.innerHeight) * 100;
                return isNaN(pct) ? currentTranslate : pct;
            }

            panel.addEventListener('touchstart', e => {
                startY = e.touches[0].clientY;
                currentTranslate = getTranslateY();
                panel.style.transition = 'opacity 0.8s ease';
            }, { passive: true });

            panel.addEventListener('touchmove', e => {
                const dy = e.touches[0].clientY - startY;
                const dyPct = (dy / window.innerHeight) * 100;
                let next = currentTranslate + dyPct;
                next = Math.max(MIN_TRANSLATE, Math.min(MAX_TRANSLATE, next));
                panel.style.transform = `translateY(${next}%)`;
            }, { passive: true });

            panel.addEventListener('touchend', e => {
                const finalY = getTranslateY();
                // Snap: if dragged past midpoint, open fully; otherwise return to resting
                if (finalY < 35) {
                    panel.style.transition = 'transform 0.35s cubic-bezier(0.16,1,0.3,1)';
                    panel.style.transform = 'translateY(0%)';
                    currentTranslate = 0;
                } else {
                    panel.style.transition = 'transform 0.35s cubic-bezier(0.16,1,0.3,1)';
                    panel.style.transform = 'translateY(60%)';
                    currentTranslate = 60;
                }
            }, { passive: true });
        }

        /* ── Mobile menu toggle ── */
        const toggle = document.getElementById('menuToggle');
        const drawer = document.getElementById('mobileMenu');
        if (toggle && drawer) {
            toggle.addEventListener('click', () => {
                const open = document.body.classList.toggle('menu-open');
                toggle.setAttribute('aria-expanded', String(open));
                toggle.setAttribute('aria-label', open ? 'Menüyü kapat' : 'Menüyü aç');
            });
            drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
                document.body.classList.remove('menu-open');
                toggle.setAttribute('aria-expanded', 'false');
                toggle.setAttribute('aria-label', 'Menüyü aç');
            }));
        }

        /* ── Desktop canvas (only if not mobile) ── */
        if (!IS_MOBILE) {
            const grainC  = document.getElementById('grain');
            const grainX  = grainC.getContext('2d');
            const fxC     = document.getElementById('fx');
            const fxX     = fxC.getContext('2d');
            const proxC   = document.getElementById('proxCanvas');
            const proxX   = proxC.getContext('2d');
            const bgPhoto = document.getElementById('bg-photo');
            const glow    = document.getElementById('glow');

            let W = 0, H = 0;
            function resize() {
                W = grainC.width = fxC.width = proxC.width = window.innerWidth;
                H = grainC.height = fxC.height = proxC.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            let mx = W / 2, my = H / 2;
            const trail = [];

            document.addEventListener('mousemove', e => {
                mx = e.clientX; my = e.clientY;
                glow.style.left = mx + 'px';
                glow.style.top  = my + 'px';
                trail.push({ x: mx, y: my, life: 1 });
                if (trail.length > 28) trail.shift();
            });

            let px = 0, py = 0;
            (function parallax() {
                const tx = ((mx / W) - 0.5) * 22;
                const ty = ((my / H) - 0.5) * 22;
                px += (tx - px) * 0.04;
                py += (ty - py) * 0.04;
                bgPhoto.style.transform = `scale(1.08) translate(${-px * 0.55}px, ${-py * 0.55}px)`;
                requestAnimationFrame(parallax);
            })();

            let grainTick = 0;
            function drawGrain() {
                if (!W || !H) return;
                const img = grainX.createImageData(W, H);
                const d = img.data;
                for (let i = 0; i < d.length; i += 4) {
                    const v = Math.random() * 255 | 0;
                    if (v > 210) {
                        d[i]   = v * 0.42 | 0;
                        d[i+1] = v;
                        d[i+2] = v * 0.58 | 0;
                        d[i+3] = (v - 210) * 2;
                    }
                }
                grainX.putImageData(img, 0, 0);
            }

            const navLinks = document.querySelectorAll('.nav-link');
            function drawProx() {
                proxX.clearRect(0, 0, W, H);
                navLinks.forEach(link => {
                    const r = link.getBoundingClientRect();
                    const cx = r.left + r.width / 2;
                    const cy = r.top + r.height / 2;
                    const dist = Math.hypot(mx - cx, my - cy);
                    if (dist < 200) {
                        const alpha = (1 - dist / 200) * 0.12;
                        const g = proxX.createRadialGradient(cx, cy, 0, cx, cy, 160);
                        g.addColorStop(0, `rgba(140,255,176,${alpha})`);
                        g.addColorStop(1, 'rgba(140,255,176,0)');
                        proxX.fillStyle = g;
                        proxX.fillRect(r.left - 40, r.top - 40, r.width + 80, r.height + 80);
                    }
                });
            }

            let grainFrame = 0;
            (function loop() {
                if (++grainFrame % 3 === 0) drawGrain();
                fxX.clearRect(0, 0, W, H);
                for (let i = trail.length - 1; i >= 0; i--) {
                    const p = trail[i];
                    p.life -= 0.065;
                    if (p.life <= 0) { trail.splice(i, 1); continue; }
                    const r = p.life * 14;
                    const g = fxX.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
                    g.addColorStop(0, `rgba(140,255,176,${p.life * 0.38})`);
                    g.addColorStop(1, 'rgba(140,255,176,0)');
                    fxX.fillStyle = g;
                    fxX.beginPath();
                    fxX.arc(p.x, p.y, r, 0, Math.PI * 2);
                    fxX.fill();
                }
                drawProx();
                requestAnimationFrame(loop);
            })();
        }

    })();
    </script>
</body>
</html>
